workflow:
  id: asset_catalog
  version: "1.0.0"
  scope: global
  name: 资产提取
  description: 从剧本中提取角色、地点和道具资产，完成角色全名精确匹配、LLM语义匹配、变体匹配和配件检查，审核后按资产卡片上传或生成图像，并一键入库完成任务。
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_input
        name: P1 用户输入
        description: 收集剧本和世界背景，作为后续资产分析的业务输入。
        nodes:
          - collect_asset_catalog_input
      - id: p2_asset_analysis
        name: P2 资产分析
        description: 提取角色、地点、道具和角色变体，并完成已有资产、变体和配件匹配。
        nodes:
          - extract_characters
          - lookup_existing_assets
          - match_by_name
          - semantic_match_characters
          - enrich_characters
          - extract_scenes
          - lookup_scene_assets
          - match_scenes_by_name
          - prepare_scene_semantic_match
          - semantic_match_scenes
          - enrich_scenes
          - match_variants
          - resolve_character_variant_refs
          - check_accessories
          - resolve_accessory_asset_refs
          - extract_props
          - lookup_prop_assets
          - match_props_by_name
          - prepare_prop_semantic_match
          - semantic_match_props
          - enrich_props
      - id: p3_user_confirm
        name: P3 资产列表汇总
        description: 汇总识别到的角色、地点、道具及匹配结果，支持逐项补充图像。
        nodes:
          - review_assets
      - id: p4_asset_generation
        name: P4 资产生成
        description: 生成提示词，上传或在卡片中补生成图像，并一键入库。
        nodes:
          - filter_assets_for_generation
          - generate_prompt
          - upload_images
      - id: p5_final_confirm
        name: P5 任务完成
        description: 汇总集剧情概括、原剧本内容和完整资产目录，并保存为集元数据资产。
        nodes:
          - summarize_episode
          - finish_summary
          - finish_summary_existing_assets
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v2:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.asset_images"
              image_url_path: image_url
              label_path: asset_name
      tool.complete_asset_images.v1:
        controls:
          output:
            control_id: ui.interaction.asset_image_cards.v1
            variant: grouped_cards
            mode: readonly

nodes:
  - id: collect_asset_catalog_input
    ref: system.user_input.v1
    name: 剧本输入
    inputs:
      script:
        from_user: true
        schema:
          type: string
          minLength: 1
      episode_name:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集名称
      background:
        from_user: true
        schema:
          type: string
          minLength: 1
          default: 水浒传
    outputs:
      type: object
      required: ["script", "episode_name", "background"]
      properties:
        script:
          type: string
          minLength: 1
        episode_name:
          type: string
          minLength: 1
          title: 集名称
        background:
          type: string
          minLength: 1
          default: 水浒传
      additionalProperties: false
    config:
      title: 剧本输入
      description: 上传 Word/TXT 或直接粘贴剧本，并确认世界背景。
    ui:
      controls:
        input:
          control_id: ui.input.script_text.v1
          variant: default
          mode: input
          options:
            submit_placement: stage_header
      sections:
        input:
          wrapper: false
        output:
          visible: false
        events:
          visible: false

  # ===== P1: 角色资产匹配 =====

  - id: extract_characters
    ref: ai.deepseek_structured_json.v1
    name: 提取角色信息
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有角色信息。
          世界背景（原作）：{background}。

          请用提问式思维链步骤完成分析，并把每一步的结论摘要写入 reasoning 字段：
          1. 这段剧本中一共出现、在场、发言、行动或被明确提到的角色有哪些？先列出候选角色清单，并标明他们来自叙述、对话发言、在场描写、命令提及还是回忆/计划。
          2. 当前剧本属于原作的哪个剧情阶段？这会影响哪些人物身份、处境和常见装束？
          3. 哪些段落是叙述事实，哪些只是对话、计划、命令、提及或回忆？只有叙述事实可以作为角色出场依据。
          4. 哪些角色满足收录条件？条件是：叙述段中有动作、状态或场内职务行为描写，或作为对话段发言者且叙述段中在场的角色需要收录。说话者，有动作描述、外貌描述、接收禀报、回应、下令、增派、调拨、任命、带队、押送、审问、指挥等场内行为的角色必须收录。官职称谓、身份称谓或多人合称只要在当前场景中真实发言、被禀报、做出决定或执行命令，也必须作为角色资产收录；没有姓名时保留官职称谓、身份称谓或合称。仅被他人提及、计划派遣、回忆、传闻或命令中点名，但实际不在当前场合发言或行动的角色不收录。
          5. 这些角色的全名是什么？代称、绰号、非全名称呼需要结合原作推断全名；多人合称要拆成具体角色，没有名称的龙套可保留为合称。
          6. 每个角色的生平背景是什么？summary 只写长期身份、原作背景和人物定位，不写当前动作、被绑、受伤、押送、服装或临时处境。
          7. 每个角色当前剧情状态是什么？character_status 只写此刻/本段剧情中的身份、处境或状态，不写生平背景。
          8. 每个角色的长相是什么样的？有什么面部特征？在当前情景下应该是什么造型？必须结合世界背景、身份、职业/阶层、地点、时代和剧情阶段推导一个具体服装或稳定外观造型。角色脸部/头部轮廓必须保持圆形或圆鼓头，只在圆形脸的基础上设计夸张但简洁的眉眼、极简鼻、胡须和发型/头饰；眉形、眼型和胡须形状要用于表达身份、年龄和性格气质，五官应图案化、圆润、清晰，头发和头饰承担身份识别。不得写成长脸、方脸、瘦削脸、尖脸或写实面部轮廓。角色视觉设定只允许写头面、发型/头饰、上身服装、颜色、上身配件和气质；不要描述任何下半身内容，包括腿、脚、鞋履、下装，也不要用球形下半身等概括说明。
          9. 这个稳定造型应该叫什么标签？造型标签必须是可复用的服装或造型名称，如"官兵装束"、"渔民短打"、"道士服"、"僧衣"、"旅人布衣"、"水军装束"、"囚服"、"夜行衣"；禁止用被绑、受伤、押送、奔跑等临时状态命名。
          10. 哪些内容不是资产标签依据？被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、所在地点、天气、光照、剧情处境都不是 asset_tags 的命名依据，也不得写入 appearance_description。
          11. 这个角色的稳定视觉设定是什么？appearance_description 至少 40 字，以这是一位xx开头，按性别年龄，身份，气质，圆形脸/圆形头部轮廓，眉眼、极简鼻、胡须、发型/头饰、上身服装、颜色搭配、身份识别特征、稳定上身配件描述；不得描述任何下半身内容，包括腿、脚、鞋履、下装，也不得用球形下半身等概括说明；不要描述任何材质、布料质感、纹理或面料工艺；
          12. 当前情景下有哪些稳定可穿戴/携带配件标签？例如面巾、披风、围巾、斗笠、斗篷、包袱、随身兵器挂件。只有叙述段显示正在佩戴、携带、遮挡、披挂，或此情景下极可能稳定附着于角色时才写入 asset_tags。束缚用绳索、临时镣铐、被绑状态造成的限制物不是角色配件。
          13. 最终防漏检查：候选角色清单中凡是直接发言者、当前场景中被禀报者、下令者、调度者、执行者、带队者、被押送者、被审问者，是否都已经进入 characters？如果没有进入，必须说明他只是转述、回忆、传闻、计划或命令中被提及，且不在当前场景中发言或行动；否则必须补入 characters。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有角色信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：按 system 中 13 个问题整理的分析结论摘要（字符串，不能为空）
          - characters：角色数组

          每个角色对象必须包含：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，只表示“这是谁”，例如"何涛"；不得包含服装、配件或类型前缀
          - asset_tags：角色类型内部标签数组，按稳定造型和稳定配件填写，例如["官兵装束", "官帽", "佩刀"]；不得包含"角色"或 asset_name
          - aliases：别名列表
          - summary：角色生平背景/身份定位梗概（≤100字）；只写角色在原作或世界背景中的长期身份、经历和人物背景，不写当前剧情状态、动作、伤势、被绑、押送、服装或临时处境
          - character_status：当前剧情阶段该角色的上下文状态；只写此刻/本段剧情中的身份、处境、状态或正在经历的情况，不写生平背景、长期履历或原作人物介绍；该字段仅供理解上下文，不作为变体依据
          - appearance_description：回答"这个角色的稳定视觉设定是什么？"后得到的详细描述，至少 40 字；以这是一位xx开头，按性别年龄，身份，气质，圆形脸/圆形头部轮廓，夸张但简洁的眉眼、极简鼻、图案化胡须、发型、头饰、上身服装、颜色搭配、身份识别特征、稳定上身配件描述；不得写成长脸、方脸、瘦削脸、尖脸或写实面部轮廓；不得描述任何下半身内容，包括腿、脚、鞋履、下装，也不得用球形下半身等概括说明；不得描述任何材质、布料质感、纹理或面料工艺；不得写被绑、受伤、动作、姿态、表情、场景、天气或剧情处境；

          根层级除 reasoning 和 characters 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "characters"]
      properties:
        reasoning:
          type: string
          minLength: 1
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "aliases", "summary", "character_status", "appearance_description"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              aliases:
                type: array
                items:
                  type: string
              summary:
                type: string
                minLength: 1
              character_status:
                type: string
                minLength: 1
              appearance_description:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: lookup_existing_assets
    ref: tool.asset_lookup.v1
    name: 查询已有角色资产
    inputs:
      scope:
        value: "combined"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_by_name
    ref: tool.asset_lookup.v1
    name: 按身份匹配角色资产
    inputs:
      scope:
        value: "combined"
      identity_filters:
        from: "$nodes.extract_characters.output.characters"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_characters
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配角色资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色匹配器，只判断“提取到的角色资产”是否对应“资产库候选角色”中的同一人物。
          工程化匹配原则：
          1. 严格区分输入分区：提取到的角色资产是待匹配对象，资产库候选角色只是候选集合，不得把资产库字段补写成提取结果。
          2. 精确名称匹配已由程序完成；本节点只处理未精确匹配角色的语义匹配。
          3. 只依据全名、别名、绰号、身份、人物梗概和世界背景判断是否同一人；不要依据服装、变体、配件或临时剧情状态判断角色身份。
          4. 必须给出明确 true/false，不存在“无法确定”；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下未匹配角色是否与资产库中已有角色是同一人。

          ## A. 提取到的角色资产（待匹配，来源：剧本）
          {unmatched_characters}

          ## B. 资产库候选角色（只用于匹配，不得改写 A）
          {existing_assets}

          ## C. 匹配准则
          - 一个提取角色最多匹配一个资产库角色。
          - 角色全名、别名、绰号、身份和人物梗概指向同一人物时 matched=true。
          - 只存在服装、变体、配件、场景、动作或临时状态相似时，不得判定为同一人。
          - 资产库没有足够证据时 matched=false，matched_asset_name 为空字符串，matched_asset_id 为空字符串。

          ## D. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个未匹配角色一条记录

          每条记录必须包含：
          - asset_name：角色主名称（与输入一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）

          根层级除 match_results 外不得包含其他键。
        vars:
          unmatched_characters:
            from: "$nodes.extract_characters.output.characters"
          existing_assets:
            from: "$nodes.lookup_existing_assets.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["asset_name", "matched", "reason"]
            properties:
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色数据 enrich =====

  - id: enrich_characters
    ref: tool.enrich_characters.v1
    name: 汇总角色匹配信息
    inputs:
      characters:
        from: "$nodes.extract_characters.output.characters"
      matched_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_characters.output.match_results"
      existing_assets:
        from: "$nodes.lookup_existing_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "asset_tags"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 地点提取管道 =====

  - id: extract_scenes
    ref: ai.deepseek_structured_json.v1
    name: 提取地点
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本资产分析师。请从剧本中提取所有需要资产化的地点信息。
          世界背景（原作）：{background}。
          注意：这里的“地点”是资产意义上的地点、场所或建筑，不是剧情意义上的一场戏、镜头段落或事件片段。不要按戏份切分地点。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 先判断这段剧本中有哪些地点需要固化为可复用地点资产。重点关注会多次出现、承载剧情行动、具备明确空间结构/功能、或后续可能反复用于分镜和图像生成的地点；临时路过、泛泛提及、纯对话中一笔带过且没有空间特征的地点不要固化。
          2. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          3. 逐段分析剧本，识别剧本中出现或隐含的地点资产，合并同一地点的多次出现。
          4. 为每个地点命名、描述、判定时间特征和地点类型；description 必须是可用于后续图像生成的地点设计描述，结合世界背景/原作说明地点在哪里、用途是什么，并根据时代背景设计空间结构、场景物件、陈设、布局和装饰风格。
          将你的完整分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有地点资产信息。地点是空间/场所资产，不是剧情中的一场戏。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - scenes：地点数组

          每个地点对象必须包含：
          - asset_type：固定为 "scene"
          - asset_name：地点名称，只表示“这是哪个空间/场所”，不得包含类型前缀
          - asset_tags：地点类型内部标签数组，至少包含 location_type 和 time_of_day 中适合作为筛选的稳定标签，不得包含"地点"或 asset_name
          - description：地点设计描述（≤100字，结合世界背景/原作说明地点在哪里、用途是什么，并根据时代背景描述空间结构、场景物件、陈设、布局和装饰风格）
          - time_of_day：时间特征（如"白天"、"夜晚"、"黄昏"等）
          - location_type：地点类型（如"室内"、"户外"、"宫殿"、"山林"等）

          根层级除 reasoning 和 scenes 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "scenes"]
      properties:
        reasoning:
          type: string
          minLength: 1
        scenes:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "description", "time_of_day", "location_type"]
            properties:
              asset_type:
                type: string
                enum: ["scene"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              description:
                type: string
                minLength: 1
              time_of_day:
                type: string
                minLength: 1
              location_type:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: lookup_scene_assets
    ref: tool.asset_lookup.v1
    name: 检索已有地点资产
    inputs:
      scope:
        value: "combined"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_scenes_by_name
    ref: tool.asset_lookup.v1
    name: 按身份匹配地点
    inputs:
      scope:
        value: "combined"
      identity_filters:
        from: "$nodes.extract_scenes.output.scenes"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: prepare_scene_semantic_match
    ref: tool.prepare_asset_semantic_match.v1
    name: 准备地点语义匹配输入
    inputs:
      default_asset_type:
        value: "scene"
      items:
        from: "$nodes.extract_scenes.output.scenes"
      candidates:
        from: "$nodes.lookup_scene_assets.output.assets"
    outputs:
      type: object
      required: ["items", "candidates"]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        candidates:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_scenes
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配地点资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库地点匹配器，只判断“提取到的地点资产”是否对应“资产库候选地点”中的同一空间/场所。
          工程化匹配原则：
          1. 精确身份匹配已由程序完成；本节点只处理名称不完全一致但语义可能相同的地点。
          2. 地点匹配以空间本体为准：地理位置、空间结构、用途、环境物件、原作桥段和描述指向同一场所时 matched=true。
          3. 不要因为时间、光照、镜头事件、剧情动作、火灾/战斗等临时状态不同而拆成不同地点资产。
          4. 不要把同一大场景下明显不同的子空间误合并，例如“阮小二家”和“石碣村湖荡芦苇荡”不是同一地点。
          5. 一个提取地点最多匹配一个资产库地点；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下地点资产是否与资产库中已有地点是同一空间/场所。

          ## A. 提取到的地点资产（待匹配，来源：剧本）
          {scenes}

          ## B. 资产库候选地点（只用于匹配，不得改写 A；asset_id 只用于回填结果，不参与判断）
          {existing_assets}

          ## C. 已由程序精确匹配到的地点
          {exact_matches}

          ## D. 匹配准则
          - 对 A 中每个地点都输出一条记录。
          - 若 A 中地点已经在 C 中精确匹配，沿用 matched=true 和对应资产信息。
          - 若名称略有差异但描述指向同一场所，也应 matched=true，例如“石碣村湖荡芦苇”和“石碣村湖荡芦苇荡”。
          - 只能使用 asset_name、asset_tags、description 判断是否同一地点；不得依据图片 URL、storage、metadata、创建时间等字段判断。
          - 若只是同一村落/同一大区域下的不同空间，不得匹配。
          - matched=false 时 matched_asset_name 和 matched_asset_id 均为空字符串。

          ## E. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个提取地点一条记录

          每条记录必须包含：
          - asset_type：固定为 "scene"
          - asset_name：地点名称（与输入 A 一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）
          - reason：简要说明判断依据

          根层级除 match_results 外不得包含其他键。
        vars:
          scenes:
            from: "$nodes.prepare_scene_semantic_match.output.items"
          existing_assets:
            from: "$nodes.prepare_scene_semantic_match.output.candidates"
          exact_matches:
            from: "$nodes.match_scenes_by_name.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched", "matched_asset_name", "matched_asset_id", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["scene"]
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: enrich_scenes
    ref: tool.enrich_characters.v1
    name: 汇总地点匹配结果
    inputs:
      characters:
        from: "$nodes.extract_scenes.output.scenes"
      matched_by_name:
        from: "$nodes.match_scenes_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_scenes.output.match_results"
      existing_assets:
        from: "$nodes.lookup_scene_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "asset_tags"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== P2: 变体匹配 =====

  - id: match_variants
    ref: ai.parallel_deepseek_structured_json.v1
    name: 匹配角色变体
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色变体匹配器，只负责把“提取到的角色变体资产”匹配到“资产库候选变体”。
          工程化匹配原则：
          1. 严格区分输入分区：asset_name、asset_tags、appearance_description 是提取到的待匹配资产语义；existing_variants 是资产库候选变体。
          2. 变体是否存在已经由上游 extract_characters 决定；本节点不得根据剧情处境、动作或临时状态新增变体依据。
          3. 只比较稳定服装、稳定外观造型、可穿戴/携带配件和 existing_variants 的 variant、name、资产库标签、appearance_description。
          4. 被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、地点、天气、光照等临时状态必须忽略。
          5. 如果已提取资产标签无法匹配 existing_variants，才标记 is_new_variant=true。
      prompt_template:
        value: |
          请为以下已提取角色变体匹配已有资产。

          ## A. 提取到的角色变体资产（待匹配）
          字段来源：asset_name、asset_tags、appearance_description、character_status。

          ## B. 资产库候选变体
          字段来源：同一 JSON 对象的 existing_variants；每个候选包含 asset_id、name、variant、storage_uri/image_url、appearance_description 和资产库标签。

          ## C. 输入 JSON
          {item}

          ## D. 匹配准则
          - 请将 A 中的 asset_name、asset_tags、appearance_description 与 B 中的 existing_variants 做语义匹配。
          - character_status 只可作为上下文参考，不能作为新增变体依据。
          - 不得把 existing_variants 中的候选字段写回为提取结果。
          - 如只因被绑、受伤、姿态、表情、动作、天气、场景不同，不得创建新变体。

          ## E. 输出 JSON
          返回一个 JSON 对象：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，必须与输入 asset_name 一致
          - asset_tags：当前角色稳定标签数组，只包含变体和配件，不包含"角色"和角色名
          - matched_asset_id：匹配到的资产ID（无匹配时为null）
          - matched_asset_ref：匹配到的资产引用（无匹配时为null）
          - is_new_variant：上游已提取变体是否未匹配到已有变体资产
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "is_new_variant", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_ref:
                type: ["object", "null"]
              is_new_variant:
                type: boolean
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_character_variant_refs
    ref: tool.resolve_character_variant_refs.v1
    name: 继承角色变体参考字段
    inputs:
      characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.match_variants.output.results"
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_name", "asset_tags", "is_new_variant", "reason"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_ref:
                type: ["object", "null"]
                additionalProperties: true
              is_new_variant:
                type: boolean
              default_asset_status:
                type: string
              default_asset_storage_uri:
                type: string
              default_asset_appearance_description:
                type: string
              matched_asset_appearance_description:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: check_accessories
    ref: ai.parallel_deepseek_structured_json.v1
    name: 检查角色配件
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色配件匹配器，只检查“提取到的角色配件”是否已存在于“资产库候选变体/配件”中。
          工程化匹配原则：
          1. 严格区分输入分区：asset_tags 是上游提取到的待检查稳定标签；existing_variants 是资产库候选变体/配件来源。
          2. 配件是独立变体维度：基础服装是一个变体，基础服装+配件是另一个变体；一个变体只对应一个图像。
          3. 只检查上游已提取配件，不得自行新增配件。
          4. 不得把被绑、受伤、动作、姿态、剧情处境、地点、天气或临时限制物补充为新配件。
      prompt_template:
        value: |
          请检查以下角色的配件状态。

          ## A. 提取到的角色配件（待检查）
          字段来源：asset_tags。

          ## B. 资产库候选变体/配件
          字段来源：existing_variants 及其 name、variant、资产库标签。

          ## C. 输入 JSON
          {item}

          ## D. 输出 JSON
          返回一个 JSON 对象：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，必须与输入 asset_name 一致
          - asset_tags：上游提取的稳定标签数组，不得自行新增
          - has_new_asset_tags：上游已提取标签中是否有未匹配标签
          - new_asset_tags：上游已提取但未匹配的标签数组，不得自行新增
          - existing_asset_tags：已有标签数组
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "has_new_asset_tags", "new_asset_tags", "existing_asset_tags", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              has_new_asset_tags:
                type: boolean
              new_asset_tags:
                type: array
                items:
                  type: string
              existing_asset_tags:
                type: array
                items:
                  type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_accessory_asset_refs
    ref: tool.resolve_accessory_asset_refs.v1
    name: 解析配件资产引用
    inputs:
      characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.check_accessories.output.results"
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "has_new_asset_tags", "new_asset_tags", "existing_asset_tags", "selected_accessory_assets", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              has_new_asset_tags:
                type: boolean
              new_asset_tags:
                type: array
                items:
                  type: string
              existing_asset_tags:
                type: array
                items:
                  type: string
              selected_accessory_assets:
                type: array
                items:
                  type: object
                  required: ["asset_tag", "matched", "asset_id", "asset_name", "source"]
                  properties:
                    asset_tag:
                      type: string
                      minLength: 1
                    matched:
                      type: boolean
                    asset_id:
                      type: string
                    asset_name:
                      type: string
                    asset_tags:
                      type: array
                      items:
                        type: string
                    asset_ref:
                      type: ["object", "null"]
                    storage_uri:
                      type: string
                    appearance_description:
                      type: string
                    source:
                      type: string
                      enum: ["matched_asset_tag", "first_variant_asset"]
                  additionalProperties: false
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 道具提取与匹配 =====

  - id: extract_props
    ref: ai.deepseek_structured_json.v1
    name: 提取道具
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从以下剧本中提取所有关键道具（props）。
          世界背景（原作）：{background}。

          请分析剧本中出现的所有关键道具，包括武器、工具、物品等。
          道具收录条件：在叙述段中被角色使用、持有、提及或具有叙事意义的物品。
          排除条件：仅为背景装饰的无名物品、对话中提及但未实际出现或使用的物品。
          道具必须是角色可以手持、携带、拿取、赠予、争夺、打开、操作或作为独立物件流转的小型/中型物件。
          船、舟、渔船、官船、楼船、马车、轿子、房屋、店铺、桥、码头、城门、牢房等大型载具、建筑、场所或可供角色进入/停留的空间，不作为道具提取；这类对象应归入地点/场景资产。
          只有当文本明确说角色拿着“船桨、缆绳、船篙、灯笼、钥匙、酒壶”等可从大型场景中分离出来的小物件时，才把这些小物件作为道具；不要把承载它们的船或场所本身作为道具。
          衣服、服装、鞋帽、披风、围巾、面巾、斗笠、斗篷等穿戴类外观元素不作为道具提取；
          这类穿戴类外观元素属于角色变体或角色配件，不进入道具资产列表。
          只有可从角色身上或场景中独立拿取、使用、赠予、争夺或作为剧情实体流转的物件才可作为道具；普通穿着状态、交通载具、建筑空间不能作为道具。
          如果道具与某个角色有明确持有、使用、携带、赠予或争夺关系，请记录关联角色；没有明确关联时留空或省略。
          每个道具的 description 必须是可用于后续图像生成的道具设计描述，必须同时包含两类信息：一是来历/来源，说明它在原作桥段或当前剧本中从哪里出现、由谁持有/使用/争夺；二是外观/造型，结合世界背景和时代质感描述整体形制、尺寸比例、材质、颜色、装饰、磨损痕迹、用途和可见特征。不得只写来历而缺少可绘制的外观造型。
          将你的分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有关键道具。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - props：道具数组

          每个道具对象必须包含：
          - asset_type：固定为 "prop"
          - asset_name：道具名称（如"青龙偃月刀"）
          - asset_tags：道具类型内部标签数组，至少包含 category 中适合作为筛选的稳定标签，不得包含"道具"或 asset_name
          - description：道具设计描述（≤140字，必须同时包含：1）来历/来源：它在原作桥段或当前剧本中从哪里出现、由谁持有/使用/争夺；2）外观/造型：整体形制、尺寸比例、材质、颜色、装饰、磨损痕迹、用途和可见特征；不得只写来历）
          - category：道具类别（如"武器"、"工具"、"容器"、"书籍/信件"等；不要使用"服装"、"载具"、"建筑"、"场景"作为道具类别，普通穿戴类外观元素、大型载具和可进入空间不进入 props）
          - related_character：关联角色（可选；仅当剧本明确说明某角色持有、使用、携带、赠予或争夺该道具时填写角色名，否则可省略或为空字符串）

          根层级除 reasoning 和 props 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "props"]
      properties:
        reasoning:
          type: string
          minLength: 1
        props:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "description", "category"]
            properties:
              asset_type:
                type: string
                enum: ["prop"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              description:
                type: string
                minLength: 1
              category:
                type: string
                minLength: 1
              related_character:
                type: string
            additionalProperties: false
      additionalProperties: false

  - id: lookup_prop_assets
    ref: tool.asset_lookup.v1
