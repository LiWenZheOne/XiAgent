  # ===== 提示词生成与图像生成 =====

  - id: filter_assets_for_generation
    ref: tool.filter_assets_for_generation.v1
    name: 筛选待生成资产
    inputs:
      approved_assets:
        from: "$nodes.review_assets.output.approved_assets"
    outputs:
      type: object
      required: ["approved_assets", "asset_count", "new_asset_count", "matched_asset_count", "has_assets_to_generate", "generation_summary"]
      properties:
        approved_assets:
          type: object
          required: ["characters", "assets", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                additionalProperties: true
            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            props:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
        asset_count:
          type: integer
          minimum: 0
        new_asset_count:
          type: integer
          minimum: 0
        matched_asset_count:
          type: integer
          minimum: 0
        has_assets_to_generate:
          type: boolean
        generation_summary:
          type: object
          required: ["total_asset_count", "new_asset_count", "matched_asset_count", "has_assets_to_generate"]
          properties:
            total_asset_count:
              type: integer
              minimum: 0
            new_asset_count:
              type: integer
              minimum: 0
            matched_asset_count:
              type: integer
              minimum: 0
            has_assets_to_generate:
              type: boolean
          additionalProperties: false
      additionalProperties: false

  - id: generate_prompt
    ref: ai.parallel_deepseek_structured_json.v1
    name: 生成资产设定提示词
    inputs:
      system:
        value: |
          你是一位视觉资产设定提示词专家。请根据给定资产信息，世界观背景，分析参考设定和目标设计的差异，生成图生图使用的修改提示词。
          你的职责是把资产字段转成可执行的图生图修改提示词；只写资产本体的可见目标设定，不写质量词、模型参数或画风关键词。
          角色优先写圆形脸/圆形头部轮廓、头面外貌、气质、发型/头饰、上身服装层次、颜色搭配、身份识别性上身装饰和必要上身配件；风格只作为边界约束，不作为输出内容。角色最终提示词必须明确脸部/头部轮廓保持圆形或圆鼓头，并在圆形脸基础上设计夸张但简洁的眉眼、极简鼻、图案化胡须等面部识别特征；用眉形、眼型和胡须形状表达身份、年龄与性格气质，五官保持图案化、圆润、清晰，头发和头饰承担身份识别。不得写成长脸、方脸、瘦削脸、尖脸或写实面部轮廓。角色最终提示词不得描述任何下半身内容，包括腿、脚、鞋履、下装、下肢、四肢长短，也不得用“球形整体”“无腿”等概括说明下半身；这些只作为内部边界，不能写入输出。
          角色不得输出人名、身份履历、剧情动作、临时状态、表情、镜头、场景气氛、材质、布料质感、纹理或面料工艺；信息不足时也必须结合世界背景和当前桥段确定一种单一造型，不写“或”“可能”“可选”“任选”“一类”。
          地点写空间结构、建筑/地貌、布局、摆设、时代视觉元素；道具写物件本体的形制、颜色、装饰、磨损、用途和可见特征。
          必须先按 asset_type 区分 character、scene、prop，再选择对应句式。道具必须保留“图中的道具”这个对象，不得写成“图中的{asset_name}改成”。
      prompt_template:
        value: |
          当前资产：
          {item}

          请用提问式思维链完成判断，并把结论摘要写入 think：
          1. asset_type 是 character、scene 还是 prop？这一类型应该使用哪种句式？
          2. 如果是角色：参考图中哪些外貌应保留，目标设定中哪些外貌和气质必须替换或补足？
          3. 如果是角色：如何在圆形脸/圆形头部轮廓不变的前提下，用夸张但简洁的眉形、眼型、极简鼻、图案化胡须、发型/头饰体现身份、气质和年龄？哪些上身服装层次、颜色组合、识别性上身装饰和必要上身配件，能让角色更具体、更可画？（只写头面与上身可见外貌；最终 prompt 不得出现任何下半身内容，包括腿、脚、鞋履、下装，也不得写球形下半身等概括说明）
          4. 如果角色信息有限：结合世界背景、当前桥段和时代身份，最合理的一种确定造型是什么？
          5. 如果是地点：这个场景的空间结构、建筑/地貌、布局、摆设、时代视觉元素和用途分别是什么？
          6. 如果是道具：这个物件的主体、形制、颜色、装饰、磨损、用途和可见特征分别是什么？
          7. 最终提示词是否只保留可见目标设定，且没有不确定表达？

          返回 JSON 对象：
          - think：按上面问题整理的判断摘要，说明保留、替换、补足和排除的依据。
          - prompt：最终修改用的提示词，必须按 asset_type 选择句式：
            - character：以“请将图中角色改成一位……”开头，只写稳定人物圆形脸/圆形头部轮廓、图案化眉眼、极简鼻、图案化胡须、气质、发型/头饰、上身服装、颜色组合和必要上身配件，不输出角色名，不输出任何下半身内容，不输出画风词、质量词或模型参数。
            - scene：以“请将图中场景改成……”开头，写空间、地貌/建筑、布局、摆设和时代视觉元素。
            - prop：以“请将图中的道具改成……”开头，直接写 asset_name 指向的物件本体和可见特征；例如缆绳必须写成“请将图中的道具改成一条缆绳……”，不得写成“请将图中的缆绳改成……”，不得写成人物、身份、场景或把“船用、绑扎”等标签当成主体。
      prompt_fields:
        value:
          - asset_type
          - asset_name
          - asset_tags
          - target_appearance_description
          - reference_appearance_description
      passthrough_fields:
        value:
          - asset_type
          - asset_name
          - asset_tags
          - target_appearance_description
      items:
        from: "$nodes.filter_assets_for_generation.output.approved_assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "target_appearance_description", "think", "prompt"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              target_appearance_description:
                type: string
                minLength: 1
              think:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              reference_image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                  data:
                    type: string
                  role:
                    type: string
                additionalProperties: false
              reference_source:
                type: string
            additionalProperties: false
      additionalProperties: false

  - id: upload_images
    ref: system.human_approval.v1
    name: 上传或关联资产图像
    inputs:
      question:
        template: |
          请为以下角色变体上传/关联图像。

          角色信息：
          {characters}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          图像上传规格：
          - 格式：PNG 或 JPG
          - 建议分辨率：2K（2048×2048 或更高）
          - 宽高比：建议 1:1（正方形）
          - 文件大小：单个文件不超过 10MB

          变体图像命名规范：{{角色名}}_{{变体名}}.

        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_result:
            from: "$nodes.resolve_character_variant_refs.output.results"
          accessory_result:
            from: "$nodes.resolve_accessory_asset_refs.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.resolve_accessory_asset_refs.output.results"
      prompt_results:
        from: "$nodes.generate_prompt.output.results"
      approved_assets:
        from: "$nodes.review_assets.output.approved_assets"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish", "generate_missing"]
      asset_images:
        from_user: true
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
      target_asset_name:
        value: ""
    outputs:
      type: object
      required: ["decision", "asset_images"]
      properties:
        decision:
          type: string
          enum: ["finish", "generate_missing"]
        asset_images:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
        target_asset_name:
          type: string
        prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        created_asset_ids:
          type: array
          items:
            type: string
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_image_cards.v1
          variant: grouped_cards
          mode: interactive
          options:
            default_reference_templates:
              character: 塞雷2d角色模板
              scene: 塞雷2d地点模板
              prop: 塞雷2d道具模板
            prompt_text_by_type:
              character:
                prefix:
                suffix: 保持角色长相，比例、画风、和其它未提及特征不变
              character_default_reference:
                prefix:
                suffix: 保持画风和角色体型不变，改变原图中的所有角色特征，根据描述和水浒传的时代背景设计全新的形象，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘。
              scene:
                prefix: 参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量、细节丰富、富有张力的冷灰色色调漫画场景，
                suffix: 根据描述和水浒传的时代背景选择合适的构图，视角，空间关系，生成全新的场景，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘，digital illustration,  children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k。
              prop:
                prefix:
                suffix: 保持画风不变，改变原图中的所有造型和颜色设计，并根据描述和水浒传的时代背景设计新的造型和颜色，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘，digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k。。
              other:
                prefix: 将图中资产改成
                suffix: 保持画风和其它未提及特征不变，

  - id: summarize_episode
    ref: ai.deepseek_structured_json.v1
    name: 生成集剧情概括
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本编目助手，请根据原剧本内容生成一段稳定、简洁的集剧情概括。
          概括用于后续分镜生成检索和确认，不要包含资产目录、图片生成过程或编目操作说明。
      prompt:
        template: |
          请为以下剧本生成集剧情概括。

          集名称：
          {episode_name}

          世界背景：
          {background}

          原剧本内容：
          {script}

          返回一个仅包含以下键的 JSON 对象：
          - episode_summary：80 到 200 字的剧情概括，说明本集主要事件、关键人物和场景推进。
        vars:
          episode_name:
            from: "$nodes.collect_asset_catalog_input.output.episode_name"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["episode_summary"]
      properties:
        episode_summary:
          type: string
          minLength: 1
      additionalProperties: false

  - id: finish_summary
    ref: tool.episode_metadata_finalize.v1
    name: 任务完成
    inputs:
      episode_name:
        from: "$nodes.collect_asset_catalog_input.output.episode_name"
      episode_summary:
        from: "$nodes.summarize_episode.output.episode_summary"
      source_script:
        from: "$nodes.collect_asset_catalog_input.output.script"
      background:
        from: "$nodes.collect_asset_catalog_input.output.background"
      asset_catalog:
        from: "$nodes.review_assets.output.approved_assets"
      asset_images:
        from: "$nodes.upload_images.output.asset_images"
      prompt_results:
        from: "$nodes.upload_images.output.prompt_results"
      decision:
        from: "$nodes.upload_images.output.decision"
      generation_summary:
        from: "$nodes.filter_assets_for_generation.output.generation_summary"
      scope:
        value: "project"
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        generation_summary:
          type: object
          additionalProperties: true
        episode_asset_id:
          type: string
          minLength: 1
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          wrapped: false
        events:
          visible: false
      controls:
        output:
          control_id: ui.display.asset_task_summary.v1
          variant: catalog_complete
          mode: readonly

  - id: finish_summary_existing_assets
    ref: tool.episode_metadata_finalize.v1
    name: 任务完成
    inputs:
      episode_name:
        from: "$nodes.collect_asset_catalog_input.output.episode_name"
      episode_summary:
        from: "$nodes.summarize_episode.output.episode_summary"
      source_script:
        from: "$nodes.collect_asset_catalog_input.output.script"
      background:
        from: "$nodes.collect_asset_catalog_input.output.background"
      asset_catalog:
        from: "$nodes.review_assets.output.approved_assets"
      asset_images:
        value: []
      prompt_results:
        value: []
      decision:
        value: "finish"
      generation_summary:
        from: "$nodes.filter_assets_for_generation.output.generation_summary"
      scope:
        value: "project"
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        generation_summary:
          type: object
          additionalProperties: true
        episode_asset_id:
          type: string
          minLength: 1
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          wrapped: false
        events:
          visible: false
      controls:
        output:
          control_id: ui.display.asset_task_summary.v1
          variant: catalog_complete
          mode: readonly

edges:
  - from: START
    to: collect_asset_catalog_input
  - from: collect_asset_catalog_input
    to: extract_characters
  - from: collect_asset_catalog_input
    to: extract_props
  - from: extract_characters
    to: lookup_existing_assets
  - from: extract_props
    to: lookup_prop_assets
  - from: lookup_prop_assets
    to: match_props_by_name
  - from: match_props_by_name
    to: prepare_prop_semantic_match
  - from: prepare_prop_semantic_match
    to: semantic_match_props
  - from: semantic_match_props
    to: enrich_props
  - from: enrich_props
    to: review_assets
  - from: lookup_existing_assets
    to: match_by_name
  - from: match_by_name
    to: semantic_match_characters
  - from: semantic_match_characters
    to: enrich_characters
  - from: enrich_characters
    to: match_variants
  - from: match_variants
    to: resolve_character_variant_refs
  - from: enrich_characters
    to: check_accessories
  - from: resolve_character_variant_refs
    to: resolve_accessory_asset_refs
  - from: check_accessories
    to: resolve_accessory_asset_refs
  - from: resolve_accessory_asset_refs
    to: review_assets
  - from: collect_asset_catalog_input
    to: extract_scenes
  - from: extract_scenes
    to: lookup_scene_assets
  - from: lookup_scene_assets
    to: match_scenes_by_name
  - from: match_scenes_by_name
    to: prepare_scene_semantic_match
  - from: prepare_scene_semantic_match
    to: semantic_match_scenes
  - from: semantic_match_scenes
    to: enrich_scenes
  - from: enrich_scenes
    to: review_assets
  - from: review_assets
    to: filter_assets_for_generation
  - from: filter_assets_for_generation
    to: generate_prompt
    when:
      path: "$nodes.filter_assets_for_generation.output.has_assets_to_generate"
      equals: true
  - from: filter_assets_for_generation
    to: summarize_episode
    when:
      path: "$nodes.filter_assets_for_generation.output.has_assets_to_generate"
      equals: false
  - from: generate_prompt
    to: upload_images
  - from: upload_images
    to: summarize_episode
  - from: summarize_episode
    to: finish_summary
    when:
      path: "$nodes.filter_assets_for_generation.output.has_assets_to_generate"
      equals: true
  - from: finish_summary
    to: END
  - from: summarize_episode
    to: finish_summary_existing_assets
    when:
      path: "$nodes.filter_assets_for_generation.output.has_assets_to_generate"
      equals: false
  - from: finish_summary_existing_assets
    to: END
