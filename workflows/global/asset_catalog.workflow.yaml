            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            props:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
      additional_asset_request:
        from_user: true
        schema:
          type: string
      asset_images:
        from_user: true
        required: false
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
              source:
                type: string
            additionalProperties: true
    outputs:
      type: object
      required: ["approved_assets", "additional_asset_request", "decision"]
      properties:
        decision:
          type: string
          minLength: 1
        approved_assets:
          type: object
          required: ["characters", "assets", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                additionalProperties: true
            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            props:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
        additional_asset_request:
          type: string
