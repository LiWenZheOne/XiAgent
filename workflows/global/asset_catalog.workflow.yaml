workflow:
  id: asset_catalog
  version: "1.0.0"
  scope: global
  name: 资产提取
  description: 从剧本中提取角色、地点和道具资产，完成角色全名精确匹配、LLM语义匹配、变体匹配和配件检查，审核后按资产卡片上传或生成图像，并一键入库完成任务。
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_input
        name: P1 用户输入
        description: 收集剧本和世界背景，作为后续资产分析的业务输入。
        nodes:
          - collect_asset_catalog_input
      - id: p2_asset_analysis
        name: P2 资产分析
        description: 提取角色、地点、道具和角色变体，并完成已有资产、变体和配件匹配。
        nodes:
          - extract_characters
          - lookup_existing_assets
          - match_by_name
          - semantic_match_characters
          - enrich_characters
          - extract_scenes
          - lookup_scene_assets
          - match_scenes_by_name
          - enrich_scenes
          - match_variants
          - resolve_character_variant_refs
          - check_accessories
          - resolve_accessory_asset_refs
          - extract_props
          - lookup_prop_assets
          - match_props_by_name
          - enrich_props
      - id: p3_user_confirm
        name: P3 资产列表汇总
        description: 汇总识别到的角色、地点、道具及匹配结果，支持逐项补充图像。
        nodes:
          - review_assets
      - id: p4_asset_generation
        name: P4 资产生成
        description: 生成提示词，上传或在卡片中补生成图像，并一键入库。
        nodes:
          - filter_assets_for_generation
          - generate_prompt
          - upload_images
      - id: p5_final_confirm
        name: P5 任务完成
        description: 汇总集剧情概括、原剧本内容和完整资产目录，并保存为集元数据资产。
        nodes:
          - summarize_episode
          - finish_summary
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v2:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.asset_images"
              image_url_path: image_url
              label_path: asset_name
      tool.complete_asset_images.v1:
        controls:
          output:
            control_id: ui.interaction.asset_image_cards.v1
            variant: grouped_cards
            mode: readonly

nodes:
  - id: collect_asset_catalog_input
    ref: system.user_input.v1
    name: 剧本输入
    inputs:
      script:
        from_user: true
        schema:
          type: string
          minLength: 1
      episode_name:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集名称
      background:
        from_user: true
        schema:
          type: string
          minLength: 1
          default: 水浒传
    outputs:
      type: object
      required: ["script", "episode_name", "background"]
      properties:
        script:
          type: string
          minLength: 1
        episode_name:
          type: string
          minLength: 1
          title: 集名称
        background:
          type: string
          minLength: 1
          default: 水浒传
      additionalProperties: false
    config:
      title: 剧本输入
      description: 上传 Word/TXT 或直接粘贴剧本，并确认世界背景。
    ui:
      controls:
        input:
          control_id: ui.input.script_text.v1
          variant: default
          mode: input
          options:
            submit_placement: stage_header
      sections:
        input:
          wrapper: false
        output:
          visible: false
        events:
          visible: false

  # ===== P1: 角色资产匹配 =====

  - id: extract_characters
    ref: ai.deepseek_structured_json.v1
    name: 提取角色信息
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有角色信息。
          世界背景（原作）：{background}。

          请用提问式思维链步骤完成分析，并把每一步的结论摘要写入 reasoning 字段：
          1. 这段剧本中一共出现、在场、发言、行动或被明确提到的角色有哪些？先列出候选角色清单，并标明他们来自叙述、对话发言、在场描写、命令提及还是回忆/计划。
          2. 当前剧本属于原作的哪个剧情阶段？这会影响哪些人物身份、处境和常见装束？
          3. 哪些段落是叙述事实，哪些只是对话、计划、命令、提及或回忆？只有叙述事实可以作为角色出场依据。
          4. 哪些角色满足收录条件？条件是：叙述段中有动作或状态描写，或作为对话段发言者且叙述段中在场。仅在对话中被提及、派遣、回忆的角色不收录。
          5. 这些角色的全名是什么？代称、绰号、非全名称呼需要结合原作推断全名；多人合称要拆成具体角色，没有名称的龙套可保留为合称。
          6. 每个角色的生平背景是什么？summary 只写长期身份、原作背景和人物定位，不写当前动作、被绑、受伤、押送、服装或临时处境。
          7. 每个角色当前剧情状态是什么？character_status 只写此刻/本段剧情中的身份、处境或状态，不写生平背景。
          8. 每个角色的长相是什么样的？有什么面部特征（不写包括脸型）？在当前情景下应该是什么造型？必须结合世界背景、身份、职业/阶层、地点、时代和剧情阶段推导一个具体服装或稳定外观造型。不写脸型、面部轮廓、体型、体貌、身材、腿部、脚部、脚踝、鞋、靴、鞋履、脚穿物或任何下肢细节。
          9. 这个稳定造型应该叫什么标签？造型标签必须是可复用的服装或造型名称，如"官兵装束"、"渔民短打"、"道士服"、"僧衣"、"旅人布衣"、"水军装束"、"囚服"、"夜行衣"；禁止用被绑、受伤、押送、奔跑等临时状态命名。
          10. 哪些内容不是资产标签依据？被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、所在地点、天气、光照、剧情处境都不是 asset_tags 的命名依据，也不得写入 variant_description。
          11. 这个变体的稳定视觉设定是什么？variant_description 至少 40 字，以这是一位xx开头，按性别年龄，身份，气质，五官，面部特征，头部/发型、上身、下装、鞋履、颜色搭配、身份识别特征、稳定配件描述；不要描述任何材质、布料质感、纹理或面料工艺；
          12. 当前情景下有哪些稳定可穿戴/携带配件标签？例如面巾、披风、围巾、斗笠、斗篷、包袱、随身兵器挂件。只有叙述段显示正在佩戴、携带、遮挡、披挂，或此情景下极可能稳定附着于角色时才写入 asset_tags。束缚用绳索、临时镣铐、被绑状态造成的限制物不是角色配件。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有角色信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：按 system 中 12 个问题整理的分析结论摘要（字符串，不能为空）
          - characters：角色数组
          - character_names：所有角色的全名数组（仅字符串）

          每个角色对象必须包含：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，只表示“这是谁”，例如"何涛"；不得包含服装、配件或类型前缀
          - asset_tags：角色类型内部标签数组，按稳定造型和稳定配件填写，例如["官兵装束", "官帽", "佩刀"]；不得包含"角色"或 asset_name
          - aliases：别名列表
          - summary：角色生平背景/身份定位梗概（≤100字）；只写角色在原作或世界背景中的长期身份、经历和人物背景，不写当前剧情状态、动作、伤势、被绑、押送、服装或临时处境
          - character_status：当前剧情阶段该角色的上下文状态；只写此刻/本段剧情中的身份、处境、状态或正在经历的情况，不写生平背景、长期履历或原作人物介绍；该字段仅供理解上下文，不作为变体依据
          - variant_description：回答"这个变体的稳定视觉设定是什么？"后得到的详细描述，至少 40 字；以这是一位xx开头，按性别年龄，身份，气质，面部特征，发型、头饰，上身、下装、鞋履、颜色搭配、身份识别特征、稳定配件描述；不得描述任何材质、布料质感、纹理或面料工艺；不得写被绑、受伤、动作、姿态、表情、场景、天气或剧情处境；

          根层级除 reasoning、characters 和 character_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "characters", "character_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "aliases", "summary", "character_status", "variant_description"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              aliases:
                type: array
                items:
                  type: string
              summary:
                type: string
                minLength: 1
              character_status:
                type: string
                minLength: 1
              variant_description:
                type: string
                minLength: 1
            additionalProperties: false
        character_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_existing_assets
    ref: tool.asset_lookup.v1
    name: 查询已有角色资产
    inputs:
      scope:
        value: "combined"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配角色资产
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_characters.output.character_names"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_characters
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配角色资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色匹配器，只判断“提取到的角色资产”是否对应“资产库候选角色”中的同一人物。
          工程化匹配原则：
          1. 严格区分输入分区：提取到的角色资产是待匹配对象，资产库候选角色只是候选集合，不得把资产库字段补写成提取结果。
          2. 精确名称匹配已由程序完成；本节点只处理未精确匹配角色的语义匹配。
          3. 只依据全名、别名、绰号、身份、人物梗概和世界背景判断是否同一人；不要依据服装、变体、配件或临时剧情状态判断角色身份。
          4. 必须给出明确 true/false，不存在“无法确定”；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下未匹配角色是否与资产库中已有角色是同一人。

          ## A. 提取到的角色资产（待匹配，来源：剧本）
          {unmatched_characters}

          ## B. 资产库候选角色（只用于匹配，不得改写 A）
          {existing_assets}

          ## C. 匹配准则
          - 一个提取角色最多匹配一个资产库角色。
          - 角色全名、别名、绰号、身份和人物梗概指向同一人物时 matched=true。
          - 只存在服装、变体、配件、场景、动作或临时状态相似时，不得判定为同一人。
          - 资产库没有足够证据时 matched=false，matched_asset_name 为空字符串，matched_asset_id 为空字符串。

          ## D. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个未匹配角色一条记录

          每条记录必须包含：
          - asset_name：角色主名称（与输入一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）

          根层级除 match_results 外不得包含其他键。
        vars:
          unmatched_characters:
            from: "$nodes.extract_characters.output.characters"
          existing_assets:
            from: "$nodes.lookup_existing_assets.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["asset_name", "matched", "reason"]
            properties:
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色数据 enrich =====

  - id: enrich_characters
    ref: tool.enrich_characters.v1
    name: 汇总角色匹配信息
    inputs:
      characters:
        from: "$nodes.extract_characters.output.characters"
      matched_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_characters.output.match_results"
      existing_assets:
        from: "$nodes.lookup_existing_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "asset_tags"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 地点提取管道 =====

  - id: extract_scenes
    ref: ai.deepseek_structured_json.v1
    name: 提取地点
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本资产分析师。请从剧本中提取所有需要资产化的地点信息。
          世界背景（原作）：{background}。
          注意：这里的“地点”是资产意义上的地点、场所或建筑，不是剧情意义上的一场戏、镜头段落或事件片段。不要按戏份切分地点。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 先判断这段剧本中有哪些地点需要固化为可复用地点资产。重点关注会多次出现、承载剧情行动、具备明确空间结构/功能、或后续可能反复用于分镜和图像生成的地点；临时路过、泛泛提及、纯对话中一笔带过且没有空间特征的地点不要固化。
          2. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          3. 逐段分析剧本，识别剧本中出现或隐含的地点资产，合并同一地点的多次出现。
          4. 为每个地点命名、描述、判定时间特征和地点类型；description 必须是可用于后续图像生成的地点设计描述，结合世界背景/原作说明地点在哪里、用途是什么，并根据时代背景设计空间结构、场景物件、陈设、布局和装饰风格。
          将你的完整分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有地点资产信息。地点是空间/场所资产，不是剧情中的一场戏。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - scenes：地点数组
          - scene_names：所有地点的名称数组（仅字符串）

          每个地点对象必须包含：
          - name：地点名称
          - description：地点设计描述（≤100字，结合世界背景/原作说明地点在哪里、用途是什么，并根据时代背景描述空间结构、场景物件、陈设、布局和装饰风格）
          - time_of_day：时间特征（如"白天"、"夜晚"、"黄昏"等）
          - location_type：地点类型（如"室内"、"户外"、"宫殿"、"山林"等）

          根层级除 reasoning、scenes 和 scene_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "scenes", "scene_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        scenes:
          type: array
          items:
            type: object
            required: ["name", "description", "time_of_day", "location_type"]
            properties:
              name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              time_of_day:
                type: string
                minLength: 1
              location_type:
                type: string
                minLength: 1
            additionalProperties: false
        scene_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_scene_assets
    ref: tool.asset_lookup.v1
    name: 检索已有地点资产
    inputs:
      scope:
        value: "combined"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_scenes_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配地点
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_scenes.output.scene_names"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_scenes
    ref: tool.enrich_characters.v1
    name: 汇总地点匹配结果
    inputs:
      characters:
        from: "$nodes.extract_scenes.output.scenes"
      matched_by_name:
        from: "$nodes.match_scenes_by_name.output.assets"
      existing_assets:
        from: "$nodes.lookup_scene_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["name", "matched"]
            properties:
              name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
            additionalProperties: true
      additionalProperties: false

  # ===== P2: 变体匹配 =====

  - id: match_variants
    ref: ai.parallel_deepseek_structured_json.v1
    name: 匹配角色变体
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色变体匹配器，只负责把“提取到的角色变体资产”匹配到“资产库候选变体”。
          工程化匹配原则：
          1. 严格区分输入分区：asset_name、asset_tags、variant_description 是提取到的待匹配资产语义；existing_variants 是资产库候选变体。
          2. 变体是否存在已经由上游 extract_characters 决定；本节点不得根据剧情处境、动作或临时状态新增变体依据。
          3. 只比较稳定服装、稳定外观造型、可穿戴/携带配件和 existing_variants 的 variant、name、资产库标签、appearance_description。
          4. 被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、地点、天气、光照等临时状态必须忽略。
          5. 如果已提取资产标签无法匹配 existing_variants，才标记 is_new_variant=true。
      prompt_template:
        value: |
          请为以下已提取角色变体匹配已有资产。

          ## A. 提取到的角色变体资产（待匹配）
          字段来源：asset_name、asset_tags、variant_description、character_status。

          ## B. 资产库候选变体
          字段来源：同一 JSON 对象的 existing_variants；每个候选包含 asset_id、name、variant、storage_uri/image_url、appearance_description 和资产库标签。

          ## C. 输入 JSON
          {item}

          ## D. 匹配准则
          - 请将 A 中的 asset_name、asset_tags、variant_description 与 B 中的 existing_variants 做语义匹配。
          - character_status 只可作为上下文参考，不能作为新增变体依据。
          - 不得把 existing_variants 中的候选字段写回为提取结果。
          - 如只因被绑、受伤、姿态、表情、动作、天气、场景不同，不得创建新变体。

          ## E. 输出 JSON
          返回一个 JSON 对象：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，必须与输入 asset_name 一致
          - asset_tags：当前角色稳定标签数组，只包含变体和配件，不包含"角色"和角色名
          - matched_asset_id：匹配到的资产ID（无匹配时为null）
          - matched_asset_ref：匹配到的资产引用（无匹配时为null）
          - is_new_variant：上游已提取变体是否未匹配到已有变体资产
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "is_new_variant", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_ref:
                type: ["object", "null"]
              is_new_variant:
                type: boolean
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_character_variant_refs
    ref: tool.resolve_character_variant_refs.v1
    name: 继承角色变体参考字段
    inputs:
      characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.match_variants.output.results"
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_name", "asset_tags", "is_new_variant", "reason"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_ref:
                type: ["object", "null"]
                additionalProperties: true
              is_new_variant:
                type: boolean
              default_asset_status:
                type: string
              default_asset_storage_uri:
                type: string
              default_asset_appearance_description:
                type: string
              matched_asset_appearance_description:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: check_accessories
    ref: ai.parallel_deepseek_structured_json.v1
    name: 检查角色配件
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色配件匹配器，只检查“提取到的角色配件”是否已存在于“资产库候选变体/配件”中。
          工程化匹配原则：
          1. 严格区分输入分区：asset_tags 是上游提取到的待检查稳定标签；existing_variants 是资产库候选变体/配件来源。
          2. 配件是独立变体维度：基础服装是一个变体，基础服装+配件是另一个变体；一个变体只对应一个图像。
          3. 只检查上游已提取配件，不得自行新增配件。
          4. 不得把被绑、受伤、动作、姿态、剧情处境、地点、天气或临时限制物补充为新配件。
      prompt_template:
        value: |
          请检查以下角色的配件状态。

          ## A. 提取到的角色配件（待检查）
          字段来源：asset_tags。

          ## B. 资产库候选变体/配件
          字段来源：existing_variants 及其 name、variant、资产库标签。

          ## C. 输入 JSON
          {item}

          ## D. 输出 JSON
          返回一个 JSON 对象：
          - asset_type：固定为 "character"
          - asset_name：角色主名称，必须与输入 asset_name 一致
          - asset_tags：上游提取的稳定标签数组，不得自行新增
          - has_new_asset_tags：上游已提取标签中是否有未匹配标签
          - new_asset_tags：上游已提取但未匹配的标签数组，不得自行新增
          - existing_asset_tags：已有标签数组
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "has_new_asset_tags", "new_asset_tags", "existing_asset_tags", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              has_new_asset_tags:
                type: boolean
              new_asset_tags:
                type: array
                items:
                  type: string
              existing_asset_tags:
                type: array
                items:
                  type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_accessory_asset_refs
    ref: tool.resolve_accessory_asset_refs.v1
    name: 解析配件资产引用
    inputs:
      characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.check_accessories.output.results"
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "has_new_asset_tags", "new_asset_tags", "existing_asset_tags", "selected_accessory_assets", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["character"]
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              has_new_asset_tags:
                type: boolean
              new_asset_tags:
                type: array
                items:
                  type: string
              existing_asset_tags:
                type: array
                items:
                  type: string
              selected_accessory_assets:
                type: array
                items:
                  type: object
                  required: ["asset_tag", "matched", "asset_id", "asset_name", "source"]
                  properties:
                    asset_tag:
                      type: string
                      minLength: 1
                    matched:
                      type: boolean
                    asset_id:
                      type: string
                    asset_name:
                      type: string
                    asset_tags:
                      type: array
                      items:
                        type: string
                    asset_ref:
                      type: ["object", "null"]
                    storage_uri:
                      type: string
                    appearance_description:
                      type: string
                    source:
                      type: string
                      enum: ["matched_asset_tag", "first_variant_asset"]
                  additionalProperties: false
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 道具提取与匹配 =====

  - id: extract_props
    ref: ai.deepseek_structured_json.v1
    name: 提取道具
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从以下剧本中提取所有关键道具（props）。
          世界背景（原作）：{background}。

          请分析剧本中出现的所有关键道具，包括武器、工具、物品等。
          道具收录条件：在叙述段中被角色使用、持有、提及或具有叙事意义的物品。
          排除条件：仅为背景装饰的无名物品、对话中提及但未实际出现或使用的物品。
          道具必须是角色可以手持、携带、拿取、赠予、争夺、打开、操作或作为独立物件流转的小型/中型物件。
          船、舟、渔船、官船、楼船、马车、轿子、房屋、店铺、桥、码头、城门、牢房等大型载具、建筑、场所或可供角色进入/停留的空间，不作为道具提取；这类对象应归入地点/场景资产。
          只有当文本明确说角色拿着“船桨、缆绳、船篙、灯笼、钥匙、酒壶”等可从大型场景中分离出来的小物件时，才把这些小物件作为道具；不要把承载它们的船或场所本身作为道具。
          衣服、服装、鞋帽、披风、围巾、面巾、斗笠、斗篷等穿戴类外观元素不作为道具提取；
          这类穿戴类外观元素属于角色变体或角色配件，不进入道具资产列表。
          只有可从角色身上或场景中独立拿取、使用、赠予、争夺或作为剧情实体流转的物件才可作为道具；普通穿着状态、交通载具、建筑空间不能作为道具。
          如果道具与某个角色有明确持有、使用、携带、赠予或争夺关系，请记录关联角色；没有明确关联时留空或省略。
          每个道具的 description 必须是可用于后续图像生成的道具设计描述，结合世界背景和时代质感设计材质、造型、颜色、装饰、磨损痕迹、用途和可见特征。
          将你的分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有关键道具。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - props：道具数组
          - prop_names：所有道具名称数组（仅字符串）

          每个道具对象必须包含：
          - asset_type：固定为 "prop"
          - asset_name：道具名称（如"青龙偃月刀"）
          - description：道具设计描述（≤100字，结合世界背景和时代质感描述材质、造型、颜色、装饰、磨损痕迹、用途和可见特征）
          - category：道具类别（如"武器"、"工具"、"容器"、"书籍/信件"等；不要使用"服装"、"载具"、"建筑"、"场景"作为道具类别，普通穿戴类外观元素、大型载具和可进入空间不进入 props）
          - related_character：关联角色（可选；仅当剧本明确说明某角色持有、使用、携带、赠予或争夺该道具时填写角色名，否则可省略或为空字符串）

          根层级除 reasoning、props 和 prop_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "props", "prop_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        props:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "description", "category"]
            properties:
              asset_type:
                type: string
                enum: ["prop"]
              asset_name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              category:
                type: string
                minLength: 1
              related_character:
                type: string
            additionalProperties: false
        prop_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_prop_assets
    ref: tool.asset_lookup.v1
    name: 检索已有道具资产
    inputs:
      scope:
        value: "combined"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_props_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配道具
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_props.output.prop_names"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_props
    ref: tool.enrich_characters.v1
    name: 汇总道具匹配结果
    inputs:
      characters:
        from: "$nodes.extract_props.output.props"
      matched_by_name:
        from: "$nodes.match_props_by_name.output.assets"
      semantic_matches:
        value: []
      existing_assets:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "asset_tags"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    name: 资产列表汇总
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          ## 角色资产
          ### A. 提取到的角色资产
          {characters}

          ### B. 资产库角色名称匹配结果
          {match_by_name}

          ### C. 资产库角色语义匹配结果
          {semantic_match}

          ## 地点资产
          ### A. 提取到的地点资产
          {scenes}

          ### B. 资产库地点名称匹配结果
          {scene_matches}

          ## 道具资产
          ### A. 提取到的道具资产
          {props}

          ### B. 资产库道具名称匹配结果
          {prop_matches}

          ## 角色变体与配件
          ### A. 资产库角色变体匹配结果
          {variant_result}

          ### B. 资产库角色配件匹配结果
          {accessory_result}

          请确认资产匹配是否正确，或提供修改意见。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          match_by_name:
            from: "$nodes.match_by_name.output.assets"
          semantic_match:
            from: "$nodes.semantic_match_characters.output.match_results"
          scenes:
            from: "$nodes.extract_scenes.output.scenes"
          scene_matches:
            from: "$nodes.match_scenes_by_name.output.assets"
          props:
            from: "$nodes.extract_props.output.props"
          prop_matches:
            from: "$nodes.match_props_by_name.output.assets"
          variant_result:
            from: "$nodes.resolve_character_variant_refs.output.results"
          accessory_result:
            from: "$nodes.resolve_accessory_asset_refs.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      background:
        from: "$nodes.collect_asset_catalog_input.output.background"
      script:
        from: "$nodes.collect_asset_catalog_input.output.script"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      match_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_match:
        from: "$nodes.semantic_match_characters.output.match_results"
      scenes:
        from: "$nodes.extract_scenes.output.scenes"
      enriched_scenes:
        from: "$nodes.enrich_scenes.output.characters"
      scene_matches:
        from: "$nodes.match_scenes_by_name.output.assets"
      props:
        from: "$nodes.extract_props.output.props"
      enriched_props:
        from: "$nodes.enrich_props.output.characters"
      prop_matches:
        from: "$nodes.match_props_by_name.output.assets"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.resolve_accessory_asset_refs.output.results"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved_assets:
        from_user: true
        schema:
          type: object
      additional_asset_request:
        from_user: true
        schema:
          type: string
      asset_images:
        from_user: true
        required: false
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
              source:
                type: string
            additionalProperties: true
    outputs:
      type: object
      required: ["approved_assets", "additional_asset_request", "decision"]
      properties:
        decision:
          type: string
          minLength: 1
        approved_assets:
          type: object
        additional_asset_request:
          type: string
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_summary_table.v1
          variant: tabbed_table
          mode: interactive

  - id: resolve_approved_assets
    ref: ai.deepseek_structured_json.v1
    name: 解析新增资产描述
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位资产审核助手，负责把用户在资产汇总阶段补充的自然语言描述，转换成可继续进入图像生成和入库流程的结构化资产。
          必须严格区分三类数据：
          1. approved_assets：用户已在表格确认、编辑、删除后的资产列表，是当前基准。
          2. additional_asset_request：用户补充描述，只说明希望新增哪些资产或特征。
          3. script/background：原始剧本与世界背景，只能用于核对和补全新增资产的名称、类型、摘要、描述、变体和配件。
          提问式分析要求：
          - additional_asset_request 是否为空、是否包含明确新增意图？
          - 用户要求新增几个独立资产？如果一句描述中包含多个角色、地点或道具，必须拆成多项。
          - 每个新增资产分别是什么类型：character、location 还是 prop？不要输出 scene/asset 等类型名。
          - 每个新增资产应按对应提取规则补全哪些字段？角色补 asset_type、asset_name、asset_tags、aliases、summary、character_status、variant_description；地点补 asset_type、asset_name、description、location_type、time_of_day；道具补 asset_type、asset_name、description、category、related_character。
          - 哪些字段无法从用户描述、script 或 background 中确认？无法确认的字段留空，不要编造。
          处理规则：
          - 如果 additional_asset_request 为空、无明确新增意图或无法从原文/世界背景支持，原样返回 approved_assets，added_assets 为空。
          - 如果用户描述要求新增角色、地点或道具，必须从 script 和 background 中找依据，并补入 approved_assets 对应数组。
          - 角色新增资产必须遵守资产提取分工：asset_tags 只由稳定服装、稳定外观造型和可穿戴/携带配件决定；先根据身份、职业/阶层、地点和剧情阶段推断具体稳定造型标签；禁止填"默认"、"基础"、"普通"、"无特殊造型"等空泛标签；被绑、受伤、动作、表情、姿态、剧情处境、镜头状态不是变体。
          - 角色 variant_description 至少 40 字，按头部/发型、上身、下装、鞋履、颜色搭配、身份识别特征、稳定配件描述；不得描述任何材质、布料质感、纹理或面料工艺；禁止输出"默认装束，无特殊造型描述"这类空泛描述。
          - 角色 summary 只描述角色生平背景、身份定位或原作人物背景，不描述当前剧情状态；character_status 只描述当前剧情阶段的身份、处境或状态，不描述生平背景。
          - 地点新增资产描述地点本身：它是什么地方、位于哪里、在原作/世界背景中用来做什么，并根据时代背景补足空间结构、场景物件、陈设、布局和装饰风格；不要把剧情场次当地点。
          - 道具新增资产描述实体道具本身，根据世界背景和时代质感补足材质、造型、颜色、装饰、磨损痕迹、用途和可见特征；可填写 category 和 related_character；related_character 没有明确关联时留空。
          - 衣服、服装、鞋帽、披风、围巾、面巾、斗笠、斗篷等穿戴类外观元素不得作为道具新增；
          - 不要删除 approved_assets 中已有资产，除非用户描述明确要求删除且表格中尚未删除。
          - 不要改写已经匹配到的资产库字段；新增资产默认 matched=false，matched_asset_id=null，matched_asset_name=""。
          - 必须保留 approved_assets 中已有的 matched_asset_ref、reference_image_ref、matched_asset_appearance_description、reference_appearance_description、default_variant_appearance_description 等参考图引用和参考图外貌描述字段。
      prompt:
        template: |
          请根据用户补充描述，整理最终资产列表。

          ## A. 世界背景
          {background}

          ## B. 原始剧本
          {script}

          ## C. 用户已确认的资产列表（基准，不要随意改写）
          {approved_assets}

          ## D. 用户描述的新增资产需求
          {additional_asset_request}

          ## E. 输出 JSON
          返回一个仅包含以下键的 JSON 对象：
          - approved_assets：合并新增资产后的完整资产列表，结构继续使用 characters/assets/props 三个数组。
          - added_assets：本节点根据 D 新增的资产数组；没有新增时返回 []。
          - reasoning：简要说明新增或不新增的依据。

          approved_assets.characters 每项建议包含：
          asset_type, asset_name, asset_tags, matched, matched_asset_id, matched_asset_name, matched_asset_ref, reference_image_ref, matched_asset_appearance_description, reference_appearance_description, aliases, summary, character_status, variant_description

          approved_assets.assets 每项建议包含：
          asset_type, asset_name, asset_tags, matched, matched_asset_id, matched_asset_name, matched_asset_ref, reference_image_ref, matched_asset_appearance_description, reference_appearance_description, description, location_type, time_of_day

          approved_assets.props 每项建议包含：
          asset_type, asset_name, asset_tags, matched, matched_asset_id, matched_asset_name, matched_asset_ref, reference_image_ref, matched_asset_appearance_description, reference_appearance_description, description, category, related_character
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          approved_assets:
            from: "$nodes.review_assets.output.approved_assets"
          additional_asset_request:
            from: "$nodes.review_assets.output.additional_asset_request"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["approved_assets", "added_assets", "reasoning"]
      properties:
        approved_assets:
          type: object
          required: ["characters", "assets", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                additionalProperties: true
            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            props:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
        added_assets:
          type: array
          items:
            type: object
            additionalProperties: true
        reasoning:
          type: string
      additionalProperties: false

  # ===== 提示词生成与图像生成 =====

  - id: filter_assets_for_generation
    ref: tool.filter_assets_for_generation.v1
    name: 筛选待生成资产
    inputs:
      approved_assets:
        from: "$nodes.resolve_approved_assets.output.approved_assets"
    outputs:
      type: object
      required: ["approved_assets", "asset_count"]
      properties:
        approved_assets:
          type: object
          required: ["characters", "assets", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                additionalProperties: true
            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            props:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: true
        asset_count:
          type: integer
          minimum: 0
      additionalProperties: false

  - id: generate_prompt
    ref: ai.parallel_deepseek_structured_json.v1
    name: 生成资产设定提示词
    inputs:
      system:
        value: |
          你是一位视觉资产设定提示词专家。请根据给定资产信息，分析参考设定和目标设计的差异，生成图生图使用的修改提示词。
          提示词只写画面可见的外形特征与气质。
          如果是角色，必须保持大圆头、圆鼓身体、无腿，下半身是个类似不倒翁的半球、简化五官、粗黑描边、平涂色块和圆润卡通比例；不得改成写实人体、长身比例或其他体型结构。
          角色描述不得包含任何材质、布料质感、纹理、面料工艺或类似词汇，只包括发型、眉毛、胡子、眼睛、鼻子、上身服装层次、颜色搭配和必要随身配件。
          不写脸型、面部轮廓、体型、体貌、身材、腿部、脚部、脚踝、鞋、靴、鞋履、脚穿物或任何下肢细节。
          不写动作、姿态、表情、镜头调度、场景气氛、正在发生的剧情、受伤、疲惫、奔跑、打斗、被绑等临时状态。
          只保留稳定造型差异；临时情景信息只用于判断应排除哪些内容。
          当角色是渔户、村民、公差、兵丁、随从、店小二等信息有限的群体/身份角色时，不得因为信息不足输出“或”“可能”“可选”“任选”“一类”等不确定造型；必须结合世界背景、原作桥段、当前剧情地点与身份，固定一种最适合该桥段的单一形象。
          如果原文没有给出细节，也要从原作对应桥段和时代身份中推断一个确定方案，例如固定为“江边渔户短褐蓑笠造型”或“乡村农户短褐布衣造型”，不要写“渔户或村民”“斗笠或头巾”“短褐或长衫”。
          地点描述空间结构、建筑/地貌、时代质感、用途和关键视觉元素。
          道具描述形制、材质、颜色、装饰、磨损、用途和可见特征。
      prompt_template:
        value: |
          当前资产：
          {item}

          请按以下问题思考：
          1. 这个资产属于角色、地点还是道具？
          2. 如果是角色：当前资产字段中的 asset_name 只用于理解目标对象，最终外貌描述和 prompt 不得输出人名；当前资产的 variant_description 描述了哪些目标外貌？参考图的 reference_appearance_description 描述了哪些原始外貌？
          3. 如果是角色：目标外貌和参考图外貌之间的差异是什么？如何把参考图像修改为目标的外观？
          4. 如果是角色：哪些剧情、动作、状态、腿脚和鞋履信息必须排除？
          5. 如果是角色且 asset_name / asset_tags / variant_description 信息有限：它在原作对应桥段、当前剧情地点和时代身份中最合理的一种固定造型是什么？必须选择一个确定方案，不得输出“或”“可能”“可选”“任选”“一类”等不确定表达。
          6. 如果是地点：它的空间、建筑/地貌、时代质感、用途和关键视觉元素是什么，在当前时代背景下，这个场景中应该有什么物件摆设，布局是什么样的，用什么角度可以更好的展现地点的全貌？
          7. 如果是道具：它的形制、材质、颜色、装饰、磨损、用途和可见特征是什么？
          8. 最终 prompt 应该只保留资产可见目标设定，不包含固定开头、固定结尾或质量词；不得包含“或”“可能”“可选”“任选”“一类”等不确定表达。

          返回 JSON 对象：
          - asset_name：资产主名称，只表示“这是谁/是什么”，不得包含类型、变体或配件。
          - asset_tags：资产类型内部标签，角色包含稳定造型和稳定配件；不得包含"角色/地点/道具"或 asset_name。
          - target_appearance_description：目标资产外貌描述，角色写稳定发型、眉毛、胡子、眼睛、气质、可见外貌特征、上身服装层次、颜色搭配和必要随身配件，并明确保持大圆头、圆鼓身体、短小四肢、简化五官、粗黑描边、平涂色块和圆润卡通比例不变；但不得包含人名、角色名、身份、职业、阶层、官职、称号、人物关系、阵营、剧情身份、长期履历、脸型、面部轮廓、体型、体貌、身材、腿部、脚部、脚踝、鞋、靴、鞋履、脚穿物、任何下肢细节、材质、布料质感、纹理或面料工艺；地点/道具写目标视觉设定。
          - think：思考过程，说明如何比较当前资产 variant_description 和参考图 reference_appearance_description，并排除了哪些身份、职业、剧情、临时状态或腿脚细节。
          - prompt：最终修改用的提示词。，以请将图中（角色/场景/道具）改成一位xx性格，气质的（身份），外貌xx，穿着xx的格式书写
      prompt_fields:
        value:
          - asset_type
          - asset_name
          - asset_tags
          - variant_description
          - description
          - reference_appearance_description
      passthrough_fields:
        value:
          - asset_type
          - asset_name
          - asset_tags
      items:
        from: "$nodes.filter_assets_for_generation.output.approved_assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "asset_tags", "target_appearance_description", "think", "prompt"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              target_appearance_description:
                type: string
                minLength: 1
              think:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              reference_image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                  data:
                    type: string
                  role:
                    type: string
                additionalProperties: false
              reference_source:
                type: string
            additionalProperties: false
      additionalProperties: false

  - id: upload_images
    ref: system.human_approval.v1
    name: 上传或关联资产图像
    inputs:
      question:
        template: |
          请为以下角色变体上传/关联图像。

          角色信息：
          {characters}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          图像上传规格：
          - 格式：PNG 或 JPG
          - 建议分辨率：2K（2048×2048 或更高）
          - 宽高比：建议 1:1（正方形）
          - 文件大小：单个文件不超过 10MB

          变体图像命名规范：{{角色名}}_{{变体名}}.

        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_result:
            from: "$nodes.resolve_character_variant_refs.output.results"
          accessory_result:
            from: "$nodes.resolve_accessory_asset_refs.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.resolve_accessory_asset_refs.output.results"
      prompt_results:
        from: "$nodes.generate_prompt.output.results"
      approved_assets:
        from: "$nodes.resolve_approved_assets.output.approved_assets"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish", "generate_missing"]
      asset_images:
        from_user: true
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
      target_asset_name:
        value: ""
    outputs:
      type: object
      required: ["decision", "asset_images"]
      properties:
        decision:
          type: string
          enum: ["finish", "generate_missing"]
        asset_images:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_name:
                type: string
                minLength: 1
              asset_tags:
                type: array
                items:
                  type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
        target_asset_name:
          type: string
        prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        created_asset_ids:
          type: array
          items:
            type: string
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_image_cards.v1
          variant: grouped_cards
          mode: interactive
          options:
            default_reference_templates:
              character: 塞雷2d角色模板
              scene: 塞雷2d地点模板
              prop: 塞雷2d道具模板
            prompt_text_by_type:
              character:
                prefix:
                suffix: 保持角色长相，比例、画风、和其它未提及特征不变
              character_default_reference:
                prefix:
                suffix: 保持画风和角色体型不变，改变原图中的所有角色特征，根据描述和水浒传的时代背景设计全新的形象，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘。
              scene:
                prefix:
                suffix: 保持画风不变，根据描述和水浒传的时代背景选择合适的构图，视角，空间关系，生成全新的场景，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘，digital illustration,  children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k。
              prop:
                prefix:
                suffix: 保持画风不变，改变原图中的所有造型和颜色设计，并根据描述和水浒传的时代背景设计新的造型和颜色，平涂，赛璐璐风格，具有清晰的色块，流畅干净的线条和锐利的边缘，digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k。。
              other:
                prefix: 将图中资产改成
                suffix: 保持画风和其它未提及特征不变，

  - id: summarize_episode
    ref: ai.deepseek_structured_json.v1
    name: 生成集剧情概括
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本编目助手，请根据原剧本内容生成一段稳定、简洁的集剧情概括。
          概括用于后续分镜生成检索和确认，不要包含资产目录、图片生成过程或编目操作说明。
      prompt:
        template: |
          请为以下剧本生成集剧情概括。

          集名称：
          {episode_name}

          世界背景：
          {background}

          原剧本内容：
          {script}

          返回一个仅包含以下键的 JSON 对象：
          - episode_summary：80 到 200 字的剧情概括，说明本集主要事件、关键人物和场景推进。
        vars:
          episode_name:
            from: "$nodes.collect_asset_catalog_input.output.episode_name"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["episode_summary"]
      properties:
        episode_summary:
          type: string
          minLength: 1
      additionalProperties: false

  - id: finish_summary
    ref: tool.episode_metadata_finalize.v1
    name: 任务完成
    inputs:
      episode_name:
        from: "$nodes.collect_asset_catalog_input.output.episode_name"
      episode_summary:
        from: "$nodes.summarize_episode.output.episode_summary"
      source_script:
        from: "$nodes.collect_asset_catalog_input.output.script"
      background:
        from: "$nodes.collect_asset_catalog_input.output.background"
      asset_catalog:
        from: "$nodes.resolve_approved_assets.output.approved_assets"
      asset_images:
        from: "$nodes.upload_images.output.asset_images"
      prompt_results:
        from: "$nodes.upload_images.output.prompt_results"
      decision:
        from: "$nodes.upload_images.output.decision"
