workflow:
  id: asset_catalog
  version: "1.0.0"
  scope: global
  name: 资产编目
  description: 从剧本中提取角色、地点和道具资产，完成角色全名精确匹配、LLM语义匹配、变体匹配和配件检查，审核后按资产卡片上传图像或只生成缺图资产。
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_input
        name: P1 用户输入
        description: 收集剧本和世界背景，作为后续资产分析的业务输入。
        nodes:
          - collect_asset_catalog_input
      - id: p2_asset_analysis
        name: P2 资产分析
        description: 提取角色、地点、道具，并完成已有资产、变体和配件匹配。
        nodes:
          - extract_characters
          - lookup_existing_assets
          - match_by_name
          - semantic_match_characters
          - enrich_characters
          - extract_scenes
          - lookup_scene_assets
          - match_scenes_by_name
          - enrich_scenes
          - match_variants
          - check_accessories
          - extract_props
          - lookup_prop_assets
          - match_props_by_name
          - enrich_props
      - id: p3_user_confirm
        name: P3 资产列表汇总
        description: 汇总识别到的角色、地点、道具及匹配结果，支持逐项补充图像。
        nodes:
          - review_assets
      - id: p4_asset_generation
        name: P4 资产生成
        description: 生成提示词，上传或自动补生成未上传图像。
        nodes:
          - generate_prompt
          - upload_images
          - prepare_asset_images
          - generate_missing_asset_images
          - merge_completed_asset_images
      - id: p5_final_confirm
        name: P5 最终确定
        description: 汇总最终资产结果；后续可接入替换图像、下载和一键入库节点。
        nodes: []
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v2:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.asset_images"
              image_url_path: image_url
              label_path: full_name

nodes:
  - id: collect_asset_catalog_input
    ref: system.user_input.v1
    name: 剧本输入
    inputs:
      script:
        from_user: true
        schema:
          type: string
          minLength: 1
      background:
        from_user: true
        schema:
          type: string
          minLength: 1
          default: 水浒传
    outputs:
      type: object
      required: ["script", "background"]
      properties:
        script:
          type: string
          minLength: 1
        background:
          type: string
          minLength: 1
          default: 水浒传
      additionalProperties: false
    config:
      title: 剧本输入
      description: 上传 Word/TXT 或直接粘贴剧本，并确认世界背景。
    ui:
      controls:
        input:
          control_id: ui.input.script_text.v1
          variant: default
          mode: input
          options:
            submit_placement: stage_header
      sections:
        input:
          wrapper: false
        output:
          visible: false
        events:
          visible: false

  # ===== P1: 角色资产匹配 =====

  - id: extract_characters
    ref: ai.deepseek_structured_json.v1
    name: 提取角色信息
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有角色信息。
          世界背景（原作）：{background}。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          2. 逐段区分叙述段与对话段，识别哪些角色满足收录条件。
          3. 对使用代称或非全名称呼的角色，根据原作推断其全名。
          4. 当多个角色被一起称呼时，根据原作和剧情发展拆解为具体角色。
          将你的完整分析过程写入 reasoning 字段。

          叙述 vs 对话：剧本包含叙述段（无前缀，描述已发生的事实）和对话段。
          只有叙述段才构成事实依据。对话中的计划、命令、提及、回忆均不构成角色出场的证据。
          角色收录条件：叙述段中有动作或状态描写，或作为对话段发言者且叙述段中在场。
          当使用代称或非全名称呼时，请根据原作推断角色的全名（如果不是你了解的作品，不需要推断全名。）
          当多个角色被一起称呼时，比如几位好汉，请根据原作和此时的剧情发展记录具体角色，每个角色单独记录。（没有名称的龙套角色不需要单独记录并且合称只作为一个单独角色。）
          根据当前情景推断角色临时可附加的视觉配件，例如口罩、面巾、披风、围巾、斗笠、斗篷、包袱、兵器挂件等；只有叙述段显示其正在佩戴、携带、遮挡、披挂或此情景下极可能附着于角色时才记录。
          排除条件：仅在对话中被提及、谈论、派遣、回忆的角色不收录。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有角色信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - characters：角色数组
          - character_names：所有角色的全名数组（仅字符串）

          每个角色对象必须包含：
          - full_name：根据世界背景推断的全名（如"武松"而非"武二郎"），保存时固定使用全名作为资产名
          - aliases：别名列表
          - summary：角色梗概（≤100字）
          - character_status：当前剧情阶段该角色的状态（一段自然语言的近况描述，含身份、处境、外貌等）
          - accessories：当前情景下可附加在角色身上的视觉配件列表（如["面巾", "披风"]，无配件时为空数组；不要把身份、身体特征或普通服装整体写成配件）

          根层级除 reasoning、characters 和 character_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "characters", "character_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "aliases", "summary", "character_status", "accessories"]
            properties:
              full_name:
                type: string
                minLength: 1
              aliases:
                type: array
                items:
                  type: string
              summary:
                type: string
                minLength: 1
              character_status:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
            additionalProperties: false
        character_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_existing_assets
    ref: tool.asset_lookup.v1
    name: 查询已有角色资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配角色资产
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_characters.output.character_names"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_characters
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配角色资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库管理员。请判断以下角色是否与资产库中已有角色是同一人。
          精确匹配已由程序完成，以下是未匹配到的角色。请通过别名、绰号、角色梗概进行语义匹配。
          必须给出明确判断，不存在"无法确定"。
      prompt:
        template: |
          请判断以下未匹配角色是否与资产库中已有角色是同一人。

          未匹配角色列表：
          {unmatched_characters}

          资产库中所有已有角色：
          {existing_assets}

          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个未匹配角色一条记录

          每条记录必须包含：
          - full_name：角色全名（与输入一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）

          根层级除 match_results 外不得包含其他键。
        vars:
          unmatched_characters:
            from: "$nodes.extract_characters.output.characters"
          existing_assets:
            from: "$nodes.lookup_existing_assets.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["full_name", "matched", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色数据 enrich =====

  - id: enrich_characters
    ref: tool.enrich_characters.v1
    name: 汇总角色匹配信息
    inputs:
      characters:
        from: "$nodes.extract_characters.output.characters"
      matched_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_characters.output.match_results"
      existing_assets:
        from: "$nodes.lookup_existing_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 地点提取管道 =====

  - id: extract_scenes
    ref: ai.deepseek_structured_json.v1
    name: 提取地点
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本资产分析师。请从剧本中提取所有需要资产化的地点信息。
          世界背景（原作）：{background}。
          注意：这里的“地点”是资产意义上的地点、场所或建筑，不是剧情意义上的一场戏、镜头段落或事件片段。不要按戏份切分地点。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          2. 逐段分析剧本，识别剧本中出现或隐含的地点资产，合并同一地点的多次出现。
          3. 为每个地点命名、描述、判定时间特征和地点类型；描述必须结合世界背景/原作说明这个地点在哪里、是干什么的、通常承载什么功能。
          将你的完整分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有地点资产信息。地点是空间/场所资产，不是剧情中的一场戏。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - scenes：地点数组
          - scene_names：所有地点的名称数组（仅字符串）

          每个地点对象必须包含：
          - name：地点名称
          - description：地点描述（≤100字，结合世界背景/原作说明地点在哪里、用途是什么）
          - time_of_day：时间特征（如"白天"、"夜晚"、"黄昏"等）
          - location_type：地点类型（如"室内"、"户外"、"宫殿"、"山林"等）

          根层级除 reasoning、scenes 和 scene_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "scenes", "scene_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        scenes:
          type: array
          items:
            type: object
            required: ["name", "description", "time_of_day", "location_type"]
            properties:
              name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              time_of_day:
                type: string
                minLength: 1
              location_type:
                type: string
                minLength: 1
            additionalProperties: false
        scene_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_scene_assets
    ref: tool.asset_lookup.v1
    name: 检索已有地点资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_scenes_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配地点
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_scenes.output.scene_names"
      asset_type:
        value: "text"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_scenes
    ref: tool.enrich_characters.v1
    name: 汇总地点匹配结果
    inputs:
      characters:
        from: "$nodes.extract_scenes.output.scenes"
      matched_by_name:
        from: "$nodes.match_scenes_by_name.output.assets"
      existing_assets:
        from: "$nodes.lookup_scene_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["name", "matched"]
            properties:
              name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
            additionalProperties: true
      additionalProperties: false

  # ===== P2: 变体匹配 =====

  - id: match_variants
    ref: ai.parallel_deepseek_structured_json.v1
    name: 匹配角色变体
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库管理员。请根据角色当前状态与已有变体进行语义匹配。
          变体匹配规则：将角色当前状态描述（character_status）与已有变体列表逐个比对，判断是否属于同一身份/服装。
          同一身份对应同一套服装，即同一变体。角色默认变体是角色创建时的第一个变体。
          如果已有变体中无匹配，则判定为新变体，需要给出新变体名称。
      prompt_template:
        value: |
          请为以下角色匹配变体。

          角色信息：{item}

          注意：角色对象的 existing_variants 字段包含该角色在资产库中已有的变体列表，
          每个变体包含 asset_id、name、variant（变体标签）和 metadata（含四级标签 tags）。
          请将角色的 character_status 与已有变体做语义匹配。

          返回一个 JSON 对象：
          - full_name：角色全名
          - accessories：角色当前配件列表
          - matched_variant：匹配到的变体标签（无匹配时为空字符串）
          - matched_variant_id：匹配到的变体资产ID（无匹配时为null）
          - is_new_variant：是否需要新建变体
          - new_variant_name：新变体名称（is_new_variant=true时必填，格式：角色名_变体标签）
          - default_variant_status：角色默认变体的状态描述
          - default_variant_storage_uri：角色默认变体的参考图URL（无参考图时为空字符串）
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "accessories", "matched_variant", "is_new_variant", "default_variant_status", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
              matched_variant:
                type: string
              matched_variant_id:
                type: ["string", "null"]
              is_new_variant:
                type: boolean
              new_variant_name:
                type: string
              default_variant_status:
                type: string
                minLength: 1
              default_variant_storage_uri:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: check_accessories
    ref: ai.parallel_deepseek_structured_json.v1
    name: 检查角色配件
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库管理员。请检查角色当前配件是否已在变体下存在。
          配件是独立变体维度：基础服装是一个变体，基础服装+配件是另一个变体。
          一个变体只对应一个图像。
      prompt_template:
        value: |
          请检查以下角色的配件状态。

          角色信息：{item}

          返回一个 JSON 对象：
          - full_name：角色全名
          - has_new_accessories：是否有新配件需要创建变体
          - new_accessories：新配件名称数组
          - existing_accessories：已有配件名称数组
          - reason：≤50字判断理由
      items:
        from: "$nodes.match_variants.output.results"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "has_new_accessories", "new_accessories", "existing_accessories", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              has_new_accessories:
                type: boolean
              new_accessories:
                type: array
                items:
                  type: string
              existing_accessories:
                type: array
                items:
                  type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 道具提取与匹配 =====

  - id: extract_props
    ref: ai.deepseek_structured_json.v1
    name: 提取道具
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从以下剧本中提取所有关键道具（props）。
          世界背景（原作）：{background}。

          请分析剧本中出现的所有关键道具，包括武器、工具、物品等。
          道具收录条件：在叙述段中被角色使用、持有、提及或具有叙事意义的物品。
          排除条件：仅为背景装饰的无名物品、对话中提及但未实际出现或使用的物品。
          如果道具与某个角色有明确持有、使用、携带、赠予或争夺关系，请记录关联角色；没有明确关联时留空或省略。
          将你的分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有关键道具。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - props：道具数组
          - prop_names：所有道具名称数组（仅字符串）

          每个道具对象必须包含：
          - full_name：道具名称（如"青龙偃月刀"）
          - description：道具描述（≤100字）
          - category：道具类别（如"武器"、"工具"、"容器"、"书籍/信件"、"饰品"等）
          - related_character：关联角色（可选；仅当剧本明确说明某角色持有、使用、携带、赠予或争夺该道具时填写角色名，否则可省略或为空字符串）

          根层级除 reasoning、props 和 prop_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          background:
            from: "$nodes.collect_asset_catalog_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "props", "prop_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        props:
          type: array
          items:
            type: object
            required: ["full_name", "description", "category"]
            properties:
              full_name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              category:
                type: string
                minLength: 1
              related_character:
                type: string
            additionalProperties: false
        prop_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_prop_assets
    ref: tool.asset_lookup.v1
    name: 检索已有道具资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_props_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配道具
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_props.output.prop_names"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_props
    ref: tool.enrich_characters.v1
    name: 汇总道具匹配结果
    inputs:
      characters:
        from: "$nodes.extract_props.output.props"
      matched_by_name:
        from: "$nodes.match_props_by_name.output.assets"
      semantic_matches:
        value: []
      existing_assets:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    name: 资产列表汇总
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          提取的角色：
          {characters}

          精确匹配结果：
          {match_by_name}

          语义匹配结果：
          {semantic_match}

          提取的地点：
          {scenes}

          地点匹配结果：
          {scene_matches}

          提取的道具：
          {props}

          道具匹配结果：
          {prop_matches}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          请确认资产匹配是否正确，或提供修改意见。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          match_by_name:
            from: "$nodes.match_by_name.output.assets"
          semantic_match:
            from: "$nodes.semantic_match_characters.output.match_results"
          scenes:
            from: "$nodes.extract_scenes.output.scenes"
          scene_matches:
            from: "$nodes.match_scenes_by_name.output.assets"
          props:
            from: "$nodes.extract_props.output.props"
          prop_matches:
            from: "$nodes.match_props_by_name.output.assets"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      match_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_match:
        from: "$nodes.semantic_match_characters.output.match_results"
      scenes:
        from: "$nodes.extract_scenes.output.scenes"
      enriched_scenes:
        from: "$nodes.enrich_scenes.output.characters"
      scene_matches:
        from: "$nodes.match_scenes_by_name.output.assets"
      props:
        from: "$nodes.extract_props.output.props"
      enriched_props:
        from: "$nodes.enrich_props.output.characters"
      prop_matches:
        from: "$nodes.match_props_by_name.output.assets"
      variant_results:
        from: "$nodes.match_variants.output.results"
      accessory_results:
        from: "$nodes.check_accessories.output.results"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved_assets:
        from_user: true
        required: false
        schema:
          type: object
      asset_images:
        from_user: true
        required: false
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_key", "image_url"]
            properties:
              asset_type:
                type: string
              asset_key:
                type: string
              full_name:
                type: string
              image_url:
                type: string
              source:
                type: string
            additionalProperties: true
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        approved_assets:
          type: object
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_summary_table.v1
          variant: tabbed_table
          mode: interactive

  # ===== 提示词生成与图像生成 =====

  - id: generate_prompt
    ref: ai.deepseek_structured_json.v1
    name: 生成角色图像提示词
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位图像提示词专家。请根据角色当前状态和默认变体状态生成修改提示词。
          对比两者差异，思考哪些特征需要改变、哪些需要保留，不预设哪些特征是固定的。
          提示词格式：请将图中角色的xx改成xx，保持风格和其它特征不变。
          必须先输出 think（思考过程），再输出 prompt（最终提示词）。
      prompt:
        template: |
          请为以下所有需要图像的角色、地点和道具生成图生图修改提示词。

          剧本内容：
          {script}

          角色列表：
          {characters}

          审核确认后的资产列表：
          {approved_assets}

          变体匹配结果（含默认变体状态）：
          {variant_results}

          地点匹配汇总：
          {enriched_scenes}

          道具匹配汇总：
          {enriched_props}

          默认模板图 URL：
          {template_image_url}

          返回一个仅包含一个根键的 JSON 对象：
          - prompt_results：数组，每个需要图像的资产一条记录

          每条记录必须包含：
          - full_name：资产名称
          - think：思考过程，逐项对比差异，列出要添加/去除/修改的部分
          - prompt：最终提示词，说明要生成或改造的资产图像
          - reference_image_url：参考图URL。角色有已有变体时取已有变体 storage_uri；道具或地点已匹配/关联资产且存在 matched_asset_image_url 或 reference_image_url 时，必须使用该关联资产图像；无参考图时才使用默认模板图 URL。

          根层级除 prompt_results 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_catalog_input.output.script"
          characters:
            from: "$nodes.extract_characters.output.characters"
          approved_assets:
            from: "$nodes.review_assets.output.approved_assets"
          variant_results:
            from: "$nodes.match_variants.output.results"
          enriched_scenes:
            from: "$nodes.enrich_scenes.output.characters"
          enriched_props:
            from: "$nodes.enrich_props.output.characters"
          template_image_url:
            value: "https://assets.local.invalid/3f/26/3f26f7ef206b654d664aae0d2637ecf724f418f943da26696b6407bb32ba0133.png"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["prompt_results"]
      properties:
        prompt_results:
          type: array
          items:
            type: object
            required: ["full_name", "think", "prompt", "reference_image_url"]
            properties:
              full_name:
                type: string
                minLength: 1
              think:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              reference_image_url:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: upload_images
    ref: system.human_approval.v1
    name: 上传或关联角色图像
    inputs:
      question:
        template: |
          请为以下角色变体上传/关联图像。

          角色信息：
          {characters}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          图像上传规格：
          - 格式：PNG 或 JPG
          - 建议分辨率：2K（2048×2048 或更高）
          - 宽高比：建议 1:1（正方形）
          - 文件大小：单个文件不超过 10MB

          变体图像命名规范：{{角色名}}_{{变体名}}.

        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      variant_results:
        from: "$nodes.match_variants.output.results"
      accessory_results:
        from: "$nodes.check_accessories.output.results"
      prompt_results:
        from: "$nodes.generate_prompt.output.prompt_results"
      approved_assets:
        from: "$nodes.review_assets.output.approved_assets"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish", "generate_missing"]
      asset_images:
        from_user: true
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_key", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_key:
                type: string
                minLength: 1
              full_name:
                type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
    outputs:
      type: object
      required: ["decision", "asset_images"]
      properties:
        decision:
          type: string
          enum: ["finish", "generate_missing"]
        asset_images:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_key", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_key:
                type: string
                minLength: 1
              full_name:
                type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
      additionalProperties: true
    ui:
      controls:
        interaction:
          control_id: ui.interaction.asset_image_cards.v1
          variant: grouped_cards
          mode: interactive

  - id: prepare_asset_images
    ref: tool.complete_asset_images.v1
    name: 筛选未上传图像
    inputs:
      decision:
        from: "$nodes.upload_images.output.decision"
      prompt_results:
        from: "$nodes.generate_prompt.output.prompt_results"
      manual_images:
        from: "$nodes.upload_images.output.asset_images"
    outputs:
      type: object
      required: ["asset_images", "missing_prompt_results", "missing_count", "next_action"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_count:
          type: integer
          minimum: 0
        next_action:
          type: string
          enum: ["finish", "generate_missing"]
      additionalProperties: false

  - id: generate_missing_asset_images
    ref: ai.runninghub_image_to_image.v2
    name: 生成未上传角色图像
    inputs:
      prompt_results:
        from: "$nodes.prepare_asset_images.output.missing_prompt_results"
      aspect_ratio:
        value: "1:1"
      resolution:
        value: "2048x2048"
    outputs:
      type: object
      required: ["asset_images"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              source:
                type: string
                minLength: 1
              runninghub_task_id:
                type: string
              variant:
                type: string
              asset_id:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: merge_completed_asset_images
    ref: tool.complete_asset_images.v1
    name: 合并角色图像
    inputs:
      decision:
        value: "finish"
      prompt_results:
        from: "$nodes.generate_prompt.output.prompt_results"
      manual_images:
        from: "$nodes.prepare_asset_images.output.asset_images"
      auto_images:
        from: "$nodes.generate_missing_asset_images.output.asset_images"
    outputs:
      type: object
      required: ["asset_images", "missing_prompt_results", "missing_count", "next_action"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_count:
          type: integer
          minimum: 0
        next_action:
          type: string
          enum: ["finish", "generate_missing"]
      additionalProperties: false

edges:
  - from: START
    to: collect_asset_catalog_input
  - from: collect_asset_catalog_input
    to: extract_characters
  - from: collect_asset_catalog_input
    to: extract_props
  - from: extract_characters
    to: lookup_existing_assets
  - from: extract_props
    to: lookup_prop_assets
  - from: lookup_prop_assets
    to: match_props_by_name
  - from: match_props_by_name
    to: enrich_props
  - from: enrich_props
    to: review_assets
  - from: lookup_existing_assets
    to: match_by_name
  - from: match_by_name
    to: semantic_match_characters
  - from: semantic_match_characters
    to: enrich_characters
  - from: enrich_characters
    to: match_variants
  - from: match_variants
    to: check_accessories
  - from: check_accessories
    to: review_assets
  - from: collect_asset_catalog_input
    to: extract_scenes
  - from: extract_scenes
    to: lookup_scene_assets
  - from: lookup_scene_assets
    to: match_scenes_by_name
  - from: match_scenes_by_name
    to: enrich_scenes
  - from: enrich_scenes
    to: review_assets
  - from: review_assets
    to: generate_prompt
  - from: generate_prompt
    to: upload_images
  - from: upload_images
    to: prepare_asset_images
  - from: prepare_asset_images
    to: generate_missing_asset_images
    when: {path: "$nodes.prepare_asset_images.output.next_action", equals: "generate_missing"}
  - from: prepare_asset_images
    to: END
    when: {path: "$nodes.prepare_asset_images.output.next_action", equals: "finish"}
  - from: generate_missing_asset_images
    to: merge_completed_asset_images
  - from: merge_completed_asset_images
    to: END
