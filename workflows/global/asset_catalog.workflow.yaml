  - id: prepare_prop_semantic_match
    ref: tool.prepare_asset_semantic_match.v1
    name: 准备道具语义匹配输入
    inputs:
      default_asset_type:
        value: "prop"
      items:
        from: "$nodes.extract_props.output.props"
      candidates:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["items", "candidates"]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        candidates:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_props
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配道具资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库道具匹配器，只判断“提取到的道具资产”是否对应“资产库候选道具”中的同一可复用物件。
          工程化匹配原则：
          1. 精确身份匹配已由程序完成；本节点只处理名称不完全一致但语义可能相同的道具。
          2. 道具匹配以物件本体为准：名称、用途、类别、形制、材质、原作桥段和描述指向同一物件类型时 matched=true。
          3. 不要因为持有人、临时动作、镜头状态或摆放位置不同而拆成不同道具资产。
          4. 不要把不同物件误合并，例如“钢叉”和“细长枪”不是同一道具。
          5. 一个提取道具最多匹配一个资产库道具；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下道具资产是否与资产库中已有道具是同一可复用物件。

          ## A. 提取到的道具资产（待匹配，来源：剧本）
          {props}

          ## B. 资产库候选道具（只用于匹配，不得改写 A；asset_id 只用于回填结果，不参与判断）
          {existing_assets}

          ## C. 已由程序精确匹配到的道具
          {exact_matches}

          ## D. 匹配准则
          - 对 A 中每个道具都输出一条记录。
          - 若 A 中道具已经在 C 中精确匹配，沿用 matched=true 和对应资产信息。
          - 若名称略有差异但描述指向同一物件，也应 matched=true，例如“刀枪飞鱼钩”和“飞鱼钩”可按同一钩类武器判断。
          - 只能使用 asset_name、asset_tags、description 判断是否同一道具；不得依据图片 URL、storage、metadata、创建时间等字段判断。
          - 若只是同属武器/工具但物件不同，不得匹配。
          - matched=false 时 matched_asset_name 和 matched_asset_id 均为空字符串。

          ## E. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个提取道具一条记录

          每条记录必须包含：
          - asset_type：固定为 "prop"
          - asset_name：道具名称（与输入 A 一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）
          - reason：简要说明判断依据

          根层级除 match_results 外不得包含其他键。
        vars:
          props:
            from: "$nodes.prepare_prop_semantic_match.output.items"
          existing_assets:
            from: "$nodes.prepare_prop_semantic_match.output.candidates"
          exact_matches:
            from: "$nodes.match_props_by_name.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched", "matched_asset_name", "matched_asset_id", "reason"]
            properties:
              asset_type:
                type: string
                enum: ["prop"]
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: enrich_props
    ref: tool.enrich_characters.v1
    name: 汇总道具匹配结果
    inputs:
      characters:
        from: "$nodes.extract_props.output.props"
      matched_by_name:
        from: "$nodes.match_props_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_props.output.match_results"
      existing_assets:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_name", "matched"]
            properties:
              asset_type:
                type: string
              asset_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "asset_tags"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    name: 资产列表汇总
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          ## 角色资产
          ### A. 提取到的角色资产
          {characters}

          ### B. 资产库角色身份匹配结果
          {match_by_name}

          ### C. 资产库角色语义匹配结果
          {semantic_match}

          ## 地点资产
          ### A. 提取到的地点资产
          {scenes}

          ### B. 资产库地点身份匹配结果
          {scene_matches}

          ### C. 资产库地点语义匹配结果
          {scene_semantic_match}

          ## 道具资产
          ### A. 提取到的道具资产
          {props}

          ### B. 资产库道具身份匹配结果
          {prop_matches}

          ### C. 资产库道具语义匹配结果
