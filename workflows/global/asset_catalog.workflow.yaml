            from: "$nodes.match_props_by_name.output.assets"
          prop_semantic_match:
            from: "$nodes.semantic_match_props.output.match_results"
          variant_result:
            from: "$nodes.resolve_character_variant_refs.output.results"
          accessory_result:
            from: "$nodes.resolve_accessory_asset_refs.output.results"
      characters:
        from: "$nodes.extract_characters.output.characters"
      background:
        from: "$nodes.collect_asset_catalog_input.output.background"
      script:
        from: "$nodes.collect_asset_catalog_input.output.script"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      match_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_match:
        from: "$nodes.semantic_match_characters.output.match_results"
      scenes:
        from: "$nodes.extract_scenes.output.scenes"
      enriched_scenes:
        from: "$nodes.enrich_scenes.output.characters"
      scene_matches:
        from: "$nodes.match_scenes_by_name.output.assets"
      scene_semantic_match:
        from: "$nodes.semantic_match_scenes.output.match_results"
      props:
        from: "$nodes.extract_props.output.props"
      enriched_props:
        from: "$nodes.enrich_props.output.characters"
      prop_matches:
        from: "$nodes.match_props_by_name.output.assets"
      prop_semantic_match:
        from: "$nodes.semantic_match_props.output.match_results"
      variant_results:
        from: "$nodes.resolve_character_variant_refs.output.results"
      accessory_results:
        from: "$nodes.resolve_accessory_asset_refs.output.results"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved_assets:
        from_user: true
