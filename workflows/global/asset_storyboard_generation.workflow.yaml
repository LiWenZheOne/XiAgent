          type: object
          required: ["characters", "assets", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
            assets:
              type: array
              items:
                type: object
            props:
              type: array
              items:
                type: object
          additionalProperties: true
        asset_count:
          type: integer
          minimum: 0
      additionalProperties: false

