  - id: convert_storyboard_plan_to_image_prompt
    ref: ai.parallel_deepseek_structured_json.v1
    name: 转换画面提示词
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是图像提示词编辑，只把已通过审查的 scene_layout 和 panel_plan 转换成完整分段画面内容提示词。
          必须沿链路重新生成完整分段的 image_prompt，不要只改局部；不得改变 panel_plan 中的事件、角色、地点、道具或分格内容。
          不得生成画风、风格关键词、质量词、模型参数、负面提示词、角色一致性固定约束、参考图规则或程序化说明。
      items:
        from: "$nodes.review_and_refine_storyboard_plan.output.results"
      prompt_template:
        value: |
          请把以下结构化分镜计划转换成完整分段画面内容提示词。只写本步骤职责范围内的内容，不要加入固定风格、一致性约束、质量词、负面词、模型参数或参考图规则。

          段落索引：{index}
          段落标题：{segment_title}
          当前段落：{paragraph_text}

          场景布局：
          {scene_layout}

          分格计划：
          {panel_plan}

          画面提示词标准：
          - 只把已通过审查的 scene_layout 和 panel_plan 转换为完整 image_prompt，不重新设计分镜。
          - image_prompt 必须完整覆盖 panel_plan.panels 的每一格，分格数量、分格编号、阅读顺序和逐格内容必须与 panel_plan.panels 一一对应。
          - 如果 panel_plan 只有 1 格，只能写单个大分格或单格整页，不得因为段落信息多而拆成多格。
          - 每格必须写清主体动作、场景空间、构图镜头、光影氛围、运动张力和分格衔接。
          - 每格必须明确画面元素的位置和占比：前景、中景、背景分别占画面多少，主体在画面哪个区域，角色朝向哪里，道具与人物、门窗、桌案、道路、林木等空间边界的相对位置如何。
          - 不改变 panel_plan 中的事件、角色、地点、道具、分格数量、分格顺序或因果关系。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          - 输出必须是纯自然语言画面内容字符串，不使用 Markdown 标题或列表，不写成摘要。

          转换提问链：
          1. 整体情节：当前段落在讲什么可见事件？先用简洁自然语言概括本段的情节推进、主要行动和情绪方向，帮助后续分格描述形成统一目标。
          2. 分格数量：这一页一共有多少格？必须严格等于 panel_plan.panel_count 或 panel_plan.panels 的实际数量；如果 panel_plan 只有 1 格，只能写单个大分格或单格整页，不得因为段落信息多而拆成多格。
          3. 每格角色：每一格分别出现哪些角色？角色必须来自 panel_plan 和当前段落在场资产；不要加入不在场角色，也不要把地点名中的人名误当角色。
          4. 格子布局：整页格子如何排布，阅读顺序是什么？格子大小、位置和视觉节奏应服务叙事轻重，而不是平均罗列。
          5. 逐格描述：按阅读顺序分别描述每个格子的主体动作、空间层级、构图镜头、光影氛围、运动张力和分格衔接；每格都要说清楚画面中哪里有什么、前景/中景/背景各占画面大约多少、主体位于画面左/右/中央或上下哪个区域、角色面对镜头/背对镜头/侧对镜头或朝向哪里、道具与角色和空间边界的相对位置；每个镜头选择都要服务明确画面目的，但要写成可见画面，不写成解释。
          6. 忠于计划：哪些事件、角色、地点、道具和分格关系必须保持不变？如果自然语言更流畅，也不得改变 panel_plan 已确定的画面内容、分格数量、分格顺序和因果顺序。
          7. 边界清理：是否删除了画风、质量词、模型参数、负面词、参考图规则和程序化说明？如有越界内容，应改写为纯画面内容。

          输出一个 JSON 对象，只返回本步骤生成的字段：
          - think：完整推理过程
          - image_prompt：完整自然语言画面内容提示词字符串，不要拆成多字段对象，不要使用 Markdown 标题、列表或程序化说明。必须按顺序写：先描述整体情节，再说明一共有多少格，再说明每格分别有哪些角色，再描述整页格子布局，最后按 panel_plan.panels 的阅读顺序逐格描述每个格子的主体动作、场景空间、构图镜头、光影氛围、运动张力和分格衔接。逐格描述必须明确画面元素的位置和占比：前景、中景、背景分别占画面多少，主体在画面哪个区域，角色朝向哪里，道具与人物、门窗、桌案、道路、林木等空间边界的相对位置如何。image_prompt 声明的分格数量、分格编号和逐格内容必须与 panel_plan.panels 一一对应；禁止新增分格、删除分格、合并分格、拆分分格或重排分格。后续程序节点会把这段内容组装到“## 画面内容”中。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "image_prompt": "当前段落的整体情节说明。一共有1格。第1格出现的角色包括角色名。整页为单格整页，画面主体位于中景区域。第1格描述主体动作、前景/中景/背景占比、角色朝向、道具相对位置、构图镜头、光影氛围、运动张力和分格衔接。"
          }

          
      prompt_fields:
        value: ["index", "segment_title", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout", "panel_plan", "review", "review_history"]
