                    items:
                      type: object
                      additionalProperties: true
                  prompt_review:
                    type: object
                    additionalProperties: true
                  prompt_review_history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
