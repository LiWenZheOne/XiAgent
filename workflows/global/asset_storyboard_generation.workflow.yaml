              "panels": [
                {
                  "panel_index": 1,
                  "narrative_purpose": "修订后的叙事功能",
                  "frame_content": "修订后的分格内容"
                }
              ]
            }
          }
      review_output_field:
        value: review
      review_history_output_field:
        value: review_history
      required_input_fields:
        value: ["scene_layout", "panel_plan"]
      max_revision_rounds:
        value: 2
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "segment_title", "think", "scene_layout", "panel_plan", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "review", "review_history"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  segment_title:
                    type: string
                    minLength: 1
                  think:
                    type: string
                  scene_layout:
                    type: object
                    additionalProperties: true
                  panel_plan:
                    type: object
                    additionalProperties: true
                  paragraph_text:
                    type: string
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  review:
                    type: object
                    additionalProperties: true
                  review_history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  status:
                    type: string
