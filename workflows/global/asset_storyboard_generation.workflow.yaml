        value: ["index", "segment_title", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props", "segment_assignment", "scene_layout", "panel_plan", "review", "review_history"]
      required_input_fields:
        value: ["scene_layout", "panel_plan"]
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
