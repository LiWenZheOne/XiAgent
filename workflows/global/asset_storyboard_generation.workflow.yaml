  - id: review_and_refine_image_prompt
    ref: ai.storyboard_review_refine.v1
    name: 审查并修订画面提示词
    inputs:
      items:
        from: "$nodes.convert_storyboard_plan_to_image_prompt.output.results"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      review_system:
        value: |
          仅返回合法 JSON。你是画面提示词质量监督，只做轻量审查：提示词是否忠于 scene_layout 和 panel_plan，是否越界加入不该出现的内容。
          你按与“转换画面提示词”相同的画面提示词标准审查和修订，但职责边界只限于 image_prompt 写得对不对；不评价 panel_plan 好不好，不重新设计分镜，不添加画风、质量词、模型参数、负面提示词或参考图规则。
      review_prompt_template:
        value: |
          请审查当前分段的 image_prompt。

          当前段落：{item.paragraph_text}
          场景布局：{source.scene_layout}
          分格计划：{source.panel_plan}
          画面提示词：{source.image_prompt}

          画面提示词标准：
          - 只把已通过审查的 scene_layout 和 panel_plan 转换为完整 image_prompt，不重新设计分镜，不改写事件因果。
          - image_prompt 必须先说明一共有几个分格；如果是多格，必须说明整页分格布局，分格大小不要完全一样，不要平均。
          - 分格数量、分格编号和每格主要内容必须与 panel_plan.panel_count 和 panel_plan.panels.description 一一对应；如果 panel_plan 只有 1 格，只能写 1 格。
          - 描述顺序必须先是整页分格布局，再逐格说明视角、景别、透视和构图，然后才进入前景/中景/背景空间层级、角色位置/朝向/动作、少量关键物件、光影和最后氛围。
          - 不包含对话，不包含角色服装或外貌描写。
          - 画面中只能出现当前段落在场角色；不得描写或提及不在场角色。如必须出现复数次要角色，应给出明确数量和编号，并分别描述动作。
          - 不出现腿部、脚部、鞋履相关描述；用角色朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达动作方向和受力关系。
          - 不写剧情来龙去脉、预示、象征解读、作者意图、观众感受或不可见心理推理；只写可见画面内容和由画面形成的氛围。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          - 输出必须是纯自然语言画面内容字符串，不使用 Markdown 标题或列表，不写成摘要。

          审查边界：
          - 只检查 image_prompt 是否符合画面提示词标准。
          - 不评价 panel_plan 本身是否最佳，不改变分格数量，不重设镜头设计，不重新判断剧本切段或资产分配。
          - 如果 panel_plan 本身不理想，也必须以它为既定事实；只指出 image_prompt 与 panel_plan 不一致、遗漏、越界或写得不完整的问题。

          审查问题：
          1. image_prompt 是否先说明一共有几个分格？多格时是否说明整页布局，且格子大小不完全一样、不平均？
          2. 分格数量和每格内容是否严格对应 panel_plan.panel_count 与 panel_plan.panels.description？是否新增、删除、合并、拆分或重排分格？
          3. image_prompt 是否先根据分格计划说明整页分格布局，然后逐格说明视角、景别、透视和构图，再进入画面细节？如直接写细节而没有先定布局和镜头，应补足。
          4. 每格是否完整描述空间层级、角色位置/朝向/动作、关键物件、光影和氛围？如只写摘要或关键词，应补足。
          5. 每格是否避免默认正中平视、左右对称和缺乏设计感的构图？如镜头选择没有视觉意图，应加强角度、透视、遮挡或前后景。
          6. 角色是否只来自当前段落在场角色？如新增不在场角色或提及不在场角色，应删除。
          7. 是否出现对话、角色服装、外貌、腿部、脚部或鞋履描述？如出现，应删除或改用朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达。
          8. 是否写了剧情来龙去脉、预示、象征解读、作者意图、观众感受或不可见心理推理？如有，应改为可见动作、物件、光影和氛围。
          9. 是否加入画风、质量词、模型参数、负面提示词、角色一致性固定约束、参考图规则或程序化说明？如出现，应删除。

          如果全部合格，passed=true。否则 passed=false，并给出可执行的修改意见。
          输出中的 think 写完整推理过程。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "passed": false,
            "issues": ["需要修订的问题"],
            "revision_instructions": "给修订节点的具体修改意见",
            "revision_summary": "本轮审查结论摘要"
          }
      revision_system:
        value: |
          仅返回合法 JSON。你是画面提示词编辑，只根据审查意见重新生成完整分段的 image_prompt。
          修订不改变 scene_layout、panel_plan、原剧本事件、角色、地点或道具；不添加画风、质量词、模型参数、负面提示词或参考图规则。
      revision_prompt_template:
        value: |
          请根据审查意见重新生成画面内容，只返回需要修订的字段。

          当前分段对象：
          {source}

          修改意见：
          {review.revision_instructions}

          画面提示词标准：
          - 只把已通过审查的 scene_layout 和 panel_plan 转换为完整 image_prompt，不重新设计分镜，不改写事件因果。
          - image_prompt 必须先说明一共有几个分格；如果是多格，必须说明整页分格布局，分格大小不要完全一样，不要平均。
          - 分格数量、分格编号和每格主要内容必须与 panel_plan.panel_count 和 panel_plan.panels.description 一一对应；如果 panel_plan 只有 1 格，只能写 1 格。
          - 描述顺序必须先是整页分格布局，再逐格说明视角、景别、透视和构图，然后才进入前景/中景/背景空间层级、角色位置/朝向/动作、少量关键物件、光影和最后氛围。
          - 不包含对话，不包含角色服装或外貌描写。
          - 画面中只能出现当前段落在场角色；不得描写或提及不在场角色。如必须出现复数次要角色，应给出明确数量和编号，并分别描述动作。
          - 不出现腿部、脚部、鞋履相关描述；用角色朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达动作方向和受力关系。
          - 不写剧情来龙去脉、预示、象征解读、作者意图、观众感受或不可见心理推理；只写可见画面内容和由画面形成的氛围。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          - 输出必须是纯自然语言画面内容字符串，不使用 Markdown 标题或列表，不写成摘要。

          修订要求：
          1. 只返回 think 和 image_prompt；
          2. 身份字段、场景布局和分镜计划会由程序从原始分段对象继承，不要尝试改写。
          3. 重新生成完整的 image_prompt；不能只修正局部，不能压缩成短摘要，必须重新覆盖 panel_plan.panels 的全部分格。
          4. 修订时先保留“一共有几个分格”和多格布局说明，再逐格补足视角、景别、透视和构图，最后补画面细节。
          5. 修订时禁止对话、角色服装外貌、腿脚鞋履、默认平庸构图、剧情来龙去脉、预示、象征解读、作者意图和不可见心理推理。
          6. 不改变分镜计划，不加入固定风格、一致性约束、质量词、负面词、模型参数或参考图规则；发现越界内容时删除或收束为当前计划允许的可见画面。

          目标 JSON 示例：
