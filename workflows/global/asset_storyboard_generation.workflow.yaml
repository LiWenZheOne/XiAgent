workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision", "panel_results"]
    properties:
      decision:
        type: string
        enum: ["finish"]
      panel_results:
        type: array
        items:
          type: object
          additionalProperties: true
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产后，直接展示集名称、剧情概括、原剧本和完整资产目录。
        nodes:
          - select_episode_metadata
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - prepare_storyboard_asset_index
          - assign_assets_to_segments
          - resolve_segment_image_refs
          - prepare_segment_storyboard_inputs
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述，并在分镜汇总中审核提示词、参考图和目标分镜图像。
        nodes:
          - analyze_scene_layout
          - plan_storyboard_panels
          - review_and_refine_storyboard_plan
          - convert_storyboard_plan_to_image_prompt
          - review_and_refine_image_prompt
          - merge_segment_descriptions
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产
      no_material:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 禁止材质区分
          default: false
          description: 启用后，分镜画面描述不区分粗糙、丝滑、生锈等材质质感。
      enrich_description:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 丰富画面描述
          default: false
          description: 启用后，在分镜设计中追加空间深度、物理反馈、建筑陈设、颗粒介质和琐碎叙事细节审查。
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
        episode_asset_id:
          type: string
          minLength: 1
        storyboard_options:
          type: object
          properties:
            no_material:
              type: boolean
            enrich_description:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: dropdown
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                placeholder: 请选择集信息资产
                preview_control_id: ui.display.episode_context.v1
      sections:
        input:
          wrapper: false
        output:
          remove: true
        events:
          visible: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.select_episode_metadata.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: true
      additionalProperties: false

  - id: prepare_storyboard_asset_index
    ref: tool.prepare_storyboard_asset_index.v1
    name: 准备分镜资产索引
    inputs:
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["asset_index"]
      properties:
        asset_index:
          type: object
          required: ["characters", "locations", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            locations:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            props:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本连续性分析助手。请根据完整剧本分段和轻量资产索引，为每个分段判断实际在场或对当前场景有直接影响的角色、地点和关键道具。
          只判断剧情在场关系，不判断是否入画；入画选择交给后续分镜提示词生成步骤。
      prompt:
        template: |
          请为以下剧本段落整理轻量在场资产表。

          剧本段落：
          {segments}

          轻量资产索引：
          {asset_index}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际在场或持续处于同一场景内的角色数组，每个只包含 asset_name、presence
          - key_props：本段实际出现或影响画面的关键道具名称数组

          角色判断规则：
          - presence 表示物理在场状态，取值 present、mentioned_only、absent、uncertain。
          - 角色在上一段进入同一场景、本段未离开，即使本段没有再次点名，也可以判断为 present。
          - 仅在对话中被提及、命令中被派遣、计划或回忆中出现的角色，presence=mentioned_only；如果不会影响当前画面，不要加入 characters。
          - 只使用轻量资产索引中的资产名称，不要创造新角色名、地点名或道具名。
          - 不要输出 reason、visibility、asset_type、asset_tags、asset_id、image_ref 或 image_url；后续工具节点会根据完整资产目录补全。

          最佳地点分析规则：
          - location 必须从轻量资产索引中的地点资产名称里选择最适合本段当前空间的一个；如果本段没有明确地点，沿用上一段仍然连续的场景地点。
          - 选择地点时优先判断“角色实际所在或动作发生的空间”，不要选择只在台词、计划、回忆、远方目标或背景叙述里提到的地点。
          - 如果同一段出现多个地点，选择承载本段主要动作、角色调度和画面空间的地点；过路、来源地、目的地或被谈论地点不作为 location。
          - 如果轻量资产索引中没有合适地点，location 返回空字符串，不要创造新地点名。

          最佳道具分析规则：
          - key_props 只从轻量资产索引中的道具资产名称里选择本段实际出现、被角色持有/使用/争夺、或对画面行动有直接影响的关键道具。
          - 不要把建筑、地点、船只/房间等可进入空间、普通服装、身份装束、天气、光影、氛围、抽象概念或纯背景陈设当成道具。
          - 同一段如果出现多个道具，只保留会影响角色动作、视线焦点、冲突结果或后续分镜连续性的道具；可有可无的装饰物不要加入。
          - 只在道具本体明确出现或直接影响画面时加入；仅被提及、计划使用、回忆中出现或上一段已离开当前场景的道具不要加入。

          目标 JSON 示例：
          {{
            "segment_assignments": [
              {{
                "segment_index": 0,
                "location": "机密房",
                "time": "",
                "characters": [
                  {{"asset_name": "何涛", "presence": "present"}},
                  {{"asset_name": "众公差", "presence": "present"}}
                ],
                "key_props": ["方桌", "文书"]
              }},
              {{
                "segment_index": 1,
                "location": "石碣村湖荡芦苇荡",
                "time": "傍晚",
                "characters": [
                  {{"asset_name": "何涛", "presence": "present"}},
                  {{"asset_name": "阮小五", "presence": "mentioned_only"}}
                ],
                "key_props": ["官船"]
              }}
            ]
          }}
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_index:
            from: "$nodes.prepare_storyboard_asset_index.output.asset_index"
          background:
            from: "$nodes.select_episode_metadata.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              location_asset:
                type: object
                required: ["asset_type", "asset_name", "image_ref"]
                properties:
                  asset_type:
                    type: string
                    minLength: 1
                  asset_name:
                    type: string
                    minLength: 1
                  asset_tags:
                    type: array
                    items:
                      type: string
                  image_ref:
                    type: object
                    required: ["kind"]
                    properties:
                      kind:
                        type: string
                        enum: ["asset", "data_uri"]
                      asset_id:
                        type: string
                        minLength: 1
                      data:
                        type: string
                        minLength: 1
                      role:
                        type: string
                    additionalProperties: false
                  image_url:
                    type: string
                additionalProperties: false
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_name", "presence"]
                  properties:
                    asset_name:
                      type: string
                      minLength: 1
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              prop_assets:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name", "image_ref"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
            additionalProperties: true
      additionalProperties: false

  - id: resolve_segment_image_refs
    ref: tool.resolve_segment_image_refs.v1
    name: 补全段落参考图
    inputs:
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              location_asset:
                type: object
                required: ["asset_type", "asset_name", "image_ref"]
                properties:
                  asset_type:
                    type: string
                    minLength: 1
                  asset_name:
                    type: string
                    minLength: 1
                  asset_tags:
                    type: array
                    items:
                      type: string
                  description:
                    type: string
                  image_ref:
                    type: object
                    required: ["kind"]
                    properties:
                      kind:
                        type: string
                        enum: ["asset", "data_uri"]
                      asset_id:
                        type: string
                        minLength: 1
                      data:
                        type: string
                        minLength: 1
                      role:
                        type: string
                    additionalProperties: false
                  image_url:
                    type: string
                additionalProperties: false
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    appearance_description:
                      type: string
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              prop_assets:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name", "image_ref"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    description:
                      type: string
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
            additionalProperties: true
      additionalProperties: false

  - id: prepare_segment_storyboard_inputs
    ref: tool.prepare_segment_storyboard_inputs.v1
    name: 准备分段分镜输入
    inputs:
      source_script:
        from: "$nodes.select_episode_metadata.output.source_script"
      world_background:
        from: "$nodes.select_episode_metadata.output.background"
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_options:
        from: "$nodes.select_episode_metadata.output.storyboard_options"
    outputs:
      type: object
      required: ["items", "shared_context"]
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - index
              - paragraph_text
              - panel_count
              - present_characters
              - location
              - scene_description
              - key_props
              - segment_assignment
            properties:
              index:
                type: integer
                minimum: 0
              paragraph_text:
                type: string
                minLength: 1
              panel_count:
                type: string
                minLength: 1
              present_characters:
                type: array
                items:
                  type: string
                  minLength: 1
              location:
                type: string
              scene_description:
                type: string
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              segment_assignment:
                type: object
                additionalProperties: true
            additionalProperties: true
        shared_context:
          type: object
          required: ["full_script", "world_background", "prompt_rules"]
          properties:
            full_script:
              type: string
              minLength: 1
            world_background:
              type: string
            storyboard_options:
              type: object
              properties:
                no_material:
                  type: boolean
                enrich_description:
                  type: boolean
              additionalProperties: false
            prompt_rules:
              type: object
              required: ["material_rule", "enrich_rule", "material_thinking", "enrich_thinking"]
              properties:
                material_rule:
                  type: string
                enrich_rule:
                  type: string
                material_thinking:
                  type: string
                enrich_thinking:
                  type: string
              additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: analyze_scene_layout
    ref: ai.parallel_deepseek_structured_json.v1
    name: 分析场景布局
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是场景空间关系分析师。每次只分析当前段落的场景布局和角色行动路线，不做分格计划，不写镜头设计，不写画面提示词。
          只说明地点、角色、道具、入口出口和角色位置/行动路线之间的空间关系；不得补充情绪、光影、氛围、叙事目的、画风、质量词、模型参数或参考图规则。
      items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请分析当前段落的实际场景布局和角色行动路线。

          ## 输入
          原作/世界观背景：
          {world_background}

          完整剧本（仅用于理解剧情连续性，不得扩写当前段落之外的剧情）：
          {full_script}

          当前段落索引：{index}
          当前段落：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          场景资产描述：{scene_description}
          关键道具：{key_props}

          若场景资产描述不为空，只吸收其中和空间关系直接相关的稳定信息，例如场地边界、功能区域、入口出口、固定陈设和可通行路线。不要扩写陈设细节、材质、氛围或视觉效果。如果当前段落的明确行动与场景资产描述冲突，以当前段落为准，但不得无故改写稳定空间设定。

          ## 布局提问链
          1. 当前地点由哪些稳定空间区域组成？这些区域之间的前后、左右、远近、内外关系是什么？
          2. 入口、出口、墙面、门窗、道路、水面、林木、建筑等空间边界分别在哪里？哪些边界会限制角色移动或视线？
          3. 在场角色分别位于哪个区域、哪一侧、哪个远近层级，初始朝向哪里？如果角色需要行动，直接在该角色位置说明中写明从哪里出发、经过哪里、去向哪里。
          4. 角色行动路线之间是否交叉、靠近、远离、追随或阻断？这些关系也写入对应角色的 character_positions。
          5. 关键道具位于哪里？它和角色、入口出口或行动路线的相对位置是什么？
          {material_rule}
          {enrich_rule}

          输出一个 JSON 对象，只返回本步骤生成的字段：
          - scene_layout：包含 location_summary、spatial_zones、entrances_exits、character_positions、prop_positions

          目标 JSON 示例：
          {
            "scene_layout": {
              "location_summary": "当前段落所在空间的简洁空间说明",
              "spatial_zones": ["区域名称及其相对位置"],
              "entrances_exits": ["入口、出口及其相对位置"],
