workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision", "panel_results"]
    properties:
      decision:
        type: string
        enum: ["finish"]
      panel_results:
        type: array
        items:
          type: object
          additionalProperties: true
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产后，直接展示集名称、剧情概括、原剧本和完整资产目录。
        nodes:
          - select_episode_metadata
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - assign_assets_to_segments
          - resolve_segment_image_refs
          - prepare_segment_storyboard_inputs
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述，并在分镜汇总中审核提示词、参考图和目标分镜图像。
        nodes:
          - describe_panels
          - merge_segment_descriptions
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
        episode_asset_id:
          type: string
          minLength: 1
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: dropdown
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                placeholder: 请选择集信息资产
                preview_control_id: ui.display.episode_context.v1
      sections:
        input:
          wrapper: false
        output:
          remove: true
        events:
          visible: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.select_episode_metadata.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本分镜助手。请根据集资产目录和剧本段落，为每个分段分配实际出现或应作为参考的角色、地点和关键道具。
          只包含叙事段落中实际出现或直接影响画面的资产；仅在对话中提及但不在场的角色不要加入 characters。
      prompt:
        template: |
          请为以下剧本段落分配资产。

          剧本段落：
          {segments}

          集资产目录：
          {asset_catalog}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际出现角色数组，每个包含 full_name、variant，可选 asset_id、image_url
          - key_props：关键道具数组

          只判断哪些资产实际出现在本段，不要拼接 image_ref；后续工具节点会根据资产目录补全结构化图像引用。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_catalog:
            from: "$nodes.select_episode_metadata.output.asset_catalog"
          background:
            from: "$nodes.select_episode_metadata.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["full_name"]
                  properties:
                    full_name:
                      type: string
                      minLength: 1
                    asset_id:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                    image_url:
                      type: string
                    accessories:
                      type: array
                      items:
                        type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_segment_image_refs
    ref: tool.resolve_segment_image_refs.v1
    name: 补全段落参考图
    inputs:
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["full_name"]
                  properties:
                    full_name:
                      type: string
                      minLength: 1
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    variant:
                      type: string
                    image_url:
                      type: string
                    accessories:
                      type: array
                      items:
                        type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_segment_storyboard_inputs
    ref: tool.prepare_segment_storyboard_inputs.v1
    name: 准备分段分镜输入
    inputs:
      source_script:
        from: "$nodes.select_episode_metadata.output.source_script"
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
    outputs:
      type: object
      required: ["items", "shared_context"]
      properties:
        items:
          type: array
          items:
            type: object
            required: ["index", "current_segment", "neighbor_segments", "segment_assignment"]
            properties:
              index:
                type: integer
                minimum: 0
              current_segment:
                type: object
                additionalProperties: true
              neighbor_segments:
                type: array
                items:
                  type: object
                  additionalProperties: true
              segment_assignment:
                type: object
                additionalProperties: true
            additionalProperties: false
        shared_context:
          type: object
          required: ["full_script", "all_segments"]
          properties:
            full_script:
              type: string
              minLength: 1
            all_segments:
              type: array
              items:
                type: object
                additionalProperties: true
          additionalProperties: false
      additionalProperties: false

  - id: describe_panels
    ref: ai.parallel_deepseek_structured_json.v1
    name: 描述分镜画面
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是漫画分镜导演。每次只为当前 item 中的 current_segment 设计分镜画面。
          必须参考 full_script 理解完整剧情连续性，参考 all_segments 和 neighbor_segments 理解前后承接，参考 segment_assignment 保持角色、地点、道具和参考图一致。
          不要输出其他段落，不要返回数组，不要包含 Markdown 或解释文字。
      items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请只为以下 item.current_segment 设计分镜画面。

          输入 item JSON：
          {item}

          输出一个 JSON 对象，必须包含：
          - index：当前段落索引，必须等于 item.index
          - segment_title：当前段落标题
          - thinking：一句话说明分镜设计依据
          - panels：当前段落的分格数组

          每个 panel 必须包含 description、style、constraints，可选 character_focus、environment_details、shot_type、camera_angle、composition、lighting、mood、action、key_props、continuity_notes。
      prompt_fields:
        value: ["index", "current_segment", "neighbor_segments", "segment_assignment"]
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    character_focus:
                      type: string
                    environment_details:
                      type: string
                    shot_type:
                      type: string
                    camera_angle:
                      type: string
                    composition:
                      type: string
                    lighting:
                      type: string
                    mood:
                      type: string
                    action:
                      type: string
                    key_props:
                      type: string
                    continuity_notes:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: merge_segment_descriptions
    ref: tool.merge_segment_storyboard_descriptions.v1
    name: 合并分镜描述
    inputs:
      results:
        from: "$nodes.describe_panels.output.results"
    outputs:
      type: object
      required: ["segment_descriptions"]
      properties:
        segment_descriptions:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    character_focus:
                      type: string
                    environment_details:
                      type: string
                    shot_type:
                      type: string
                    camera_angle:
                      type: string
                    composition:
                      type: string
                    lighting:
                      type: string
                    mood:
                      type: string
                    action:
                      type: string
                    key_props:
                      type: string
                    continuity_notes:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: prepare_storyboard_panel_cards
    ref: tool.prepare_storyboard_panel_cards.v1
    name: 准备分镜汇总卡片
    inputs:
      segment_descriptions:
        from: "$nodes.merge_segment_descriptions.output.segment_descriptions"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      generation_rules:
        value: |
          风格指令：参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量漫画。
          角色一致性：保持参考图人物比例、武器和关键服饰一致。
          时代背景：中国古代，以水浒传为背景。
          透视与构图：强纵深、前中后景分层、漫画分格画面。
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, realistic, legs, feet, shoes
      aspect_ratio:
        value: "16:9"
      resolution:
        value: 2K
    outputs:
      type: object
      required: ["panel_cards"]
      properties:
        panel_cards:
          type: array
          items:
            type: object
            additionalProperties: true
        storyboard_items:
          type: array
          items:
            type: object
            additionalProperties: true
        shared_context:
          type: object
          additionalProperties: true
      additionalProperties: false

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 分镜汇总
    inputs:
      question:
        template: |
          请在分镜汇总中检查每张分格卡片，必要时调整提示词、参考图并生成分镜图像。

          分镜卡片：
          {panel_cards}
        vars:
          panel_cards:
            from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      panel_cards:
        from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      storyboard_items:
        from: "$nodes.prepare_storyboard_panel_cards.output.storyboard_items"
      shared_context:
        from: "$nodes.prepare_storyboard_panel_cards.output.shared_context"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish"]
      panel_results:
        from_user: true
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision", "panel_results"]
      properties:
        decision:
          type: string
          enum: ["finish"]
        panel_results:
          type: array
          items:
            type: object
            additionalProperties: true
        revision_notes:
          type: string
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.storyboard_panel_cards.v1
          variant: panel_review
          mode: interactive

edges:
  - from: START
    to: select_episode_metadata
  - from: select_episode_metadata
    to: split_script
  - from: split_script
    to: assign_assets_to_segments
  - from: assign_assets_to_segments
    to: resolve_segment_image_refs
  - from: resolve_segment_image_refs
    to: prepare_segment_storyboard_inputs
  - from: prepare_segment_storyboard_inputs
    to: describe_panels
  - from: describe_panels
    to: merge_segment_descriptions
  - from: merge_segment_descriptions
    to: prepare_storyboard_panel_cards
  - from: prepare_storyboard_panel_cards
    to: review_storyboard_image
  - from: review_storyboard_image
    to: END
