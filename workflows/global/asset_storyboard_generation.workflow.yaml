workflow:
  id: asset_storyboard_generation
  version: "1.0.0"
  scope: global
  name: 资产分镜生成
  description: 从剧本中提取角色、地点和道具资产，完成人工确认、缺图补生成和最终资产确认后，继续进行分镜生成与图像审核。
  output_schema:
    type: object
    required: ["decision"]
    properties:
      decision:
        type: string
        minLength: 1
      selected_image_url:
        type: string
        minLength: 1
      revision_notes:
        type: string
        minLength: 1
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_input
        name: P1 用户输入
        description: 收集剧本、世界背景和目标分镜信息。
        nodes:
          - collect_asset_storyboard_input
      - id: p2_asset_analysis
        name: P2 资产分析
        description: 提取角色、地点、道具和角色变体，并完成已有资产、变体和配件匹配。
        nodes:
          - extract_characters
          - lookup_existing_assets
          - match_by_name
          - semantic_match_characters
          - enrich_characters
          - extract_scenes
          - lookup_scene_assets
          - match_scenes_by_name
          - enrich_scenes
          - match_variants
          - check_accessories
          - extract_props
          - lookup_prop_assets
          - match_props_by_name
          - enrich_props
      - id: p3_user_confirm
        name: P3 资产列表汇总
        description: 汇总识别到的角色、地点、道具及匹配结果，支持逐项补充图像。
        nodes:
          - review_assets
      - id: p4_asset_generation
        name: P4 资产生成
        description: 生成资产设定提示词，上传或自动补生成未上传图像。
        nodes:
          - generate_prompt_v2
          - upload_images
          - prepare_asset_images
          - generate_missing_asset_images
          - merge_completed_asset_images
      - id: p5_final_confirm
        name: P5 最终确定
        description: 汇总最终角色资产图像，作为后续分镜生成输入。
        nodes:
          - split_script
          - assign_assets_to_segments
          - assemble_storyboard_context
          - describe_panels
          - review_storyboard_prompt
          - extract_panel_image_urls
          - assemble_prompt_v2
          - generate_image_v2
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text
      ai.runninghub_image_to_image.v2:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.asset_images"
              image_url_path: image_url
              label_path: full_name

nodes:
  - id: collect_asset_storyboard_input
    ref: system.user_input.v1
    name: 剧本输入
    inputs:
      script:
        from_user: true
        schema:
          type: string
          minLength: 1
      background:
        from_user: true
        schema:
          type: string
          minLength: 1
          default: 水浒传
      storyboard_target:
        from_user: true
        required: false
        schema:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
    outputs:
      type: object
      required: ["script", "background"]
      properties:
        script:
          type: string
          minLength: 1
        background:
          type: string
          minLength: 1
          default: 水浒传
        storyboard_target:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
      additionalProperties: false
    config:
      title: 剧本输入
      description: 上传 Word/TXT 或直接粘贴剧本，并确认世界背景。
    ui:
      controls:
        input:
          control_id: ui.input.script_text.v1
          variant: default
          mode: input
          options:
            submit_placement: stage_header
      sections:
        input:
          wrapper: false
        output:
          visible: false
        events:
          visible: false

  # ===== P1: 角色资产提取与匹配 =====

  - id: extract_characters
    ref: ai.deepseek_structured_json.v1
    name: 提取角色
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有角色信息。
          世界背景（原作）：{background}。

          请用提问式思维链步骤完成分析，并把每一步的结论摘要写入 reasoning 字段：
          1. 当前剧本属于原作的哪个剧情阶段？这会影响哪些人物身份、处境和常见装束？
          2. 哪些段落是叙述事实，哪些只是对话、计划、命令、提及或回忆？只有叙述事实可以作为角色出场依据。
          3. 哪些角色满足收录条件？条件是：叙述段中有动作或状态描写，或作为对话段发言者且叙述段中在场。仅在对话中被提及、派遣、回忆的角色不收录。
          4. 这些角色的全名是什么？代称、绰号、非全名称呼需要结合原作推断全名；多人合称要拆成具体角色，没有名称的龙套可保留为合称。
          5. 每个角色的生平背景是什么？summary 只写长期身份、原作背景和人物定位，不写当前动作、被绑、受伤、押送、服装或临时处境。
          6. 每个角色当前剧情状态是什么？character_status 只写此刻/本段剧情中的身份、处境或状态，不写生平背景。
          7. 每个角色在当前情景下应该是什么稳定造型？必须结合世界背景、身份、职业/阶层、地点、时代和剧情阶段推导一个具体服装或稳定外观造型。
          8. 这个稳定造型应该叫什么 variant_name？variant_name 必须是可复用的服装或造型名称，如"官兵装束"、"渔民短打"、"道士服"、"僧衣"、"旅人布衣"、"水军装束"、"囚服"、"夜行衣"；禁止填"默认"、"基础"、"普通"、"无特殊造型"，禁止包含角色名，禁止使用"角色名_服装名"格式，禁止用被绑、受伤、押送、奔跑等临时状态命名。
          9. 哪些内容不是变体依据？被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、所在地点、天气、光照、剧情处境都不是 variant_name 的命名依据，也不得写入 variant_description 或 accessories。
          10. 这个变体的稳定视觉设定是什么？variant_description 至少 40 字，按头部/发型、上身、下装、鞋履、颜色材质、身份识别特征、稳定配件描述，只写可复用视觉设定，禁止输出"默认装束，无特殊造型描述"这类空泛描述。
          11. 当前情景下有哪些稳定可穿戴/携带配件？例如面巾、披风、围巾、斗笠、斗篷、包袱、随身兵器挂件。只有叙述段显示正在佩戴、携带、遮挡、披挂，或此情景下极可能稳定附着于角色时才写入 accessories。束缚用绳索、临时镣铐、被绑状态造成的限制物不是角色配件。
        vars:
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有角色信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：按 system 中 11 个问题整理的分析结论摘要（字符串，不能为空）
          - characters：角色数组
          - character_names：所有角色的全名数组（仅字符串）

          每个角色对象必须包含：
          - full_name：根据世界背景推断的全名（如"武松"而非"武二郎"），保存时固定使用全名作为资产名
          - aliases：别名列表
          - summary：角色生平背景/身份定位梗概（≤100字）；只写角色在原作或世界背景中的长期身份、经历和人物背景，不写当前剧情状态、动作、伤势、被绑、押送、服装或临时处境
          - character_status：当前剧情阶段该角色的上下文状态；只写此刻/本段剧情中的身份、处境、状态或正在经历的情况，不写生平背景、长期履历或原作人物介绍；该字段仅供理解上下文，不作为变体依据
          - variant_name：回答"这个稳定造型应该叫什么？"后得到的服装/造型名称；必须是"官兵装束"、"渔民短打"、"道士服"、"囚服"、"夜行衣"、"僧衣"这类可复用造型名；禁止输出"默认"、"基础"、"普通"、"无特殊造型"，禁止包含角色名或临时状态
          - variant_description：回答"这个变体的稳定视觉设定是什么？"后得到的详细描述，至少 40 字；按头部/发型、上身、下装、鞋履、颜色材质、身份识别特征、稳定配件描述；不得写被绑、受伤、动作、姿态、表情、场景、天气或剧情处境；不得输出"默认装束，无特殊造型描述"这类空泛描述
          - accessories：当前变体包含的稳定可穿戴/携带配件列表（如["面巾", "披风"]，无配件时为空数组；不要把身份、身体特征、普通服装整体、束缚状态或剧情道具写成配件）

          根层级除 reasoning、characters 和 character_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_storyboard_input.output.script"
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "characters", "character_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "aliases", "summary", "character_status", "variant_name", "variant_description", "accessories"]
            properties:
              full_name:
                type: string
                minLength: 1
              aliases:
                type: array
                items:
                  type: string
              summary:
                type: string
                minLength: 1
              character_status:
                type: string
                minLength: 1
              variant_name:
                type: string
                minLength: 1
              variant_description:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
            additionalProperties: false
        character_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_existing_assets
    ref: tool.asset_lookup.v1
    name: 检索已有角色资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配角色
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_characters.output.character_names"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_characters
    ref: ai.deepseek_structured_json.v1
    name: 语义匹配角色
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色匹配器，只判断“提取到的角色资产”是否对应“资产库候选角色”中的同一人物。
          工程化匹配原则：
          1. 严格区分输入分区：提取到的角色资产是待匹配对象，资产库候选角色只是候选集合，不得把资产库字段补写成提取结果。
          2. 精确名称匹配已由程序完成；本节点只处理未精确匹配角色的语义匹配。
          3. 只依据全名、别名、绰号、身份、人物梗概和世界背景判断是否同一人；不要依据服装、变体、配件或临时剧情状态判断角色身份。
          4. 必须给出明确 true/false，不存在“无法确定”；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下未匹配角色是否与资产库中已有角色是同一人。

          ## A. 提取到的角色资产（待匹配，来源：剧本）
          {unmatched_characters}

          ## B. 资产库候选角色（只用于匹配，不得改写 A）
          {existing_assets}

          ## C. 匹配准则
          - 一个提取角色最多匹配一个资产库角色。
          - 角色全名、别名、绰号、身份和人物梗概指向同一人物时 matched=true。
          - 只存在服装、变体、配件、场景、动作或临时状态相似时，不得判定为同一人。
          - 资产库没有足够证据时 matched=false，matched_asset_name 为空字符串，matched_asset_id 为空字符串。

          ## D. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个未匹配角色一条记录

          每条记录必须包含：
          - full_name：角色全名（与输入一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）
          - reason：≤50字判断理由

          根层级除 match_results 外不得包含其他键。
        vars:
          unmatched_characters:
            from: "$nodes.extract_characters.output.characters"
          existing_assets:
            from: "$nodes.lookup_existing_assets.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["full_name", "matched", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色数据 enrich =====

  - id: enrich_characters
    ref: tool.enrich_characters.v1
    name: 汇总角色匹配结果
    inputs:
      characters:
        from: "$nodes.extract_characters.output.characters"
      matched_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_characters.output.match_results"
      existing_assets:
        from: "$nodes.lookup_existing_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 地点提取管道 =====

  - id: extract_scenes
    ref: ai.deepseek_structured_json.v1
    name: 提取地点
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本资产分析师。请从剧本中提取所有需要资产化的地点信息。
          世界背景（原作）：{background}。
          注意：这里的“地点”是资产意义上的地点、场所或建筑，不是剧情意义上的一场戏、镜头段落或事件片段。不要按戏份切分地点。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          2. 逐段分析剧本，识别剧本中出现或隐含的地点资产，合并同一地点的多次出现。
          3. 为每个地点命名、描述、判定时间特征和地点类型；描述必须结合世界背景/原作说明这个地点在哪里、是干什么的、通常承载什么功能。
          将你的完整分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有地点资产信息。地点是空间/场所资产，不是剧情中的一场戏。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - scenes：地点数组
          - scene_names：所有地点的名称数组（仅字符串）

          每个地点对象必须包含：
          - name：地点名称
          - description：地点描述（≤100字，结合世界背景/原作说明地点在哪里、用途是什么）
          - time_of_day：时间特征（如"白天"、"夜晚"、"黄昏"等）
          - location_type：地点类型（如"室内"、"户外"、"宫殿"、"山林"等）

          根层级除 reasoning、scenes 和 scene_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_storyboard_input.output.script"
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "scenes", "scene_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        scenes:
          type: array
          items:
            type: object
            required: ["name", "description", "time_of_day", "location_type"]
            properties:
              name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              time_of_day:
                type: string
                minLength: 1
              location_type:
                type: string
                minLength: 1
            additionalProperties: false
        scene_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_scene_assets
    ref: tool.asset_lookup.v1
    name: 检索已有地点资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["地点"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
