workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision", "panel_results"]
    properties:
      decision:
        type: string
        enum: ["finish"]
      panel_results:
        type: array
        items:
          type: object
          additionalProperties: true
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产后，直接展示集名称、剧情概括、原剧本和完整资产目录。
        nodes:
          - select_episode_metadata
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - prepare_storyboard_asset_index
          - assign_assets_to_segments
          - resolve_segment_image_refs
          - prepare_segment_storyboard_inputs
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述，并在分镜汇总中审核提示词、参考图和目标分镜图像。
        nodes:
          - analyze_scene_layout
          - plan_storyboard_panels
          - review_and_refine_storyboard_plan
          - convert_storyboard_plan_to_image_prompt
          - review_and_refine_image_prompt
          - merge_segment_descriptions
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产
      no_material:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 禁止材质区分
          default: false
          description: 启用后，分镜画面描述不区分粗糙、丝滑、生锈等材质质感。
      enrich_description:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 丰富画面描述
          default: false
          description: 启用后，在分镜设计中追加空间深度、物理反馈、建筑陈设、颗粒介质和琐碎叙事细节审查。
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
        episode_asset_id:
          type: string
          minLength: 1
        storyboard_options:
          type: object
          properties:
            no_material:
              type: boolean
            enrich_description:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: dropdown
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                placeholder: 请选择集信息资产
                preview_control_id: ui.display.episode_context.v1
      sections:
        input:
          wrapper: false
        output:
          remove: true
        events:
          visible: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.select_episode_metadata.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: true
      additionalProperties: false

  - id: prepare_storyboard_asset_index
    ref: tool.prepare_storyboard_asset_index.v1
    name: 准备分镜资产索引
    inputs:
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["asset_index"]
      properties:
        asset_index:
          type: object
          required: ["characters", "locations", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            locations:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            props:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本连续性分析助手。请根据完整剧本分段和轻量资产索引，为每个分段判断实际在场或对当前场景有直接影响的角色、地点和关键道具。
          只判断剧情在场关系，不判断是否入画；入画选择交给后续分镜提示词生成步骤。
      prompt:
        template: |
          请为以下剧本段落整理轻量在场资产表。

          剧本段落：
          {segments}

          轻量资产索引：
          {asset_index}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际在场或持续处于同一场景内的角色数组，每个只包含 asset_name、presence
          - key_props：本段实际出现或影响画面的关键道具名称数组

          角色判断规则：
          - presence 表示物理在场状态，取值 present、mentioned_only、absent、uncertain。
          - 角色在上一段进入同一场景、本段未离开，即使本段没有再次点名，也可以判断为 present。
          - 仅在对话中被提及、命令中被派遣、计划或回忆中出现的角色，presence=mentioned_only；如果不会影响当前画面，不要加入 characters。
          - 只使用轻量资产索引中的资产名称，不要创造新角色名、地点名或道具名。
          - 不要输出 reason、visibility、asset_type、asset_tags、asset_id、image_ref 或 image_url；后续工具节点会根据完整资产目录补全。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_index:
            from: "$nodes.prepare_storyboard_asset_index.output.asset_index"
          background:
            from: "$nodes.select_episode_metadata.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              location_asset:
                type: object
                required: ["asset_type", "asset_name", "image_ref"]
                properties:
                  asset_type:
                    type: string
                    minLength: 1
                  asset_name:
                    type: string
                    minLength: 1
                  asset_tags:
                    type: array
                    items:
                      type: string
                  image_ref:
                    type: object
                    required: ["kind"]
                    properties:
                      kind:
                        type: string
                        enum: ["asset", "data_uri"]
                      asset_id:
                        type: string
                        minLength: 1
                      data:
                        type: string
                        minLength: 1
                      role:
                        type: string
                    additionalProperties: false
                  image_url:
                    type: string
                additionalProperties: false
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_name", "presence"]
                  properties:
                    asset_name:
                      type: string
                      minLength: 1
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              prop_assets:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name", "image_ref"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
            additionalProperties: true
      additionalProperties: false

  - id: resolve_segment_image_refs
    ref: tool.resolve_segment_image_refs.v1
    name: 补全段落参考图
    inputs:
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              location_asset:
                type: object
                required: ["asset_type", "asset_name", "image_ref"]
                properties:
                  asset_type:
                    type: string
                    minLength: 1
                  asset_name:
                    type: string
                    minLength: 1
                  asset_tags:
                    type: array
                    items:
                      type: string
                  image_ref:
                    type: object
                    required: ["kind"]
                    properties:
                      kind:
                        type: string
                        enum: ["asset", "data_uri"]
                      asset_id:
                        type: string
                        minLength: 1
                      data:
                        type: string
                        minLength: 1
                      role:
                        type: string
                    additionalProperties: false
                  image_url:
                    type: string
                additionalProperties: false
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    appearance_description:
                      type: string
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              prop_assets:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name", "image_ref"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
            additionalProperties: true
      additionalProperties: false

  - id: prepare_segment_storyboard_inputs
    ref: tool.prepare_segment_storyboard_inputs.v1
    name: 准备分段分镜输入
    inputs:
      source_script:
        from: "$nodes.select_episode_metadata.output.source_script"
      world_background:
        from: "$nodes.select_episode_metadata.output.background"
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_options:
        from: "$nodes.select_episode_metadata.output.storyboard_options"
    outputs:
      type: object
      required: ["items", "shared_context"]
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - index
              - paragraph_text
              - panel_count
              - present_characters
              - location
              - scene_description
              - key_props
              - segment_assignment
            properties:
              index:
                type: integer
                minimum: 0
              paragraph_text:
                type: string
                minLength: 1
              panel_count:
                type: string
                minLength: 1
              present_characters:
                type: array
                items:
                  type: string
                  minLength: 1
              location:
                type: string
              scene_description:
                type: string
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              segment_assignment:
                type: object
                additionalProperties: true
            additionalProperties: true
        shared_context:
          type: object
          required: ["full_script", "world_background", "prompt_rules"]
          properties:
            full_script:
              type: string
              minLength: 1
            world_background:
              type: string
            storyboard_options:
              type: object
              properties:
                no_material:
                  type: boolean
                enrich_description:
                  type: boolean
              additionalProperties: false
            prompt_rules:
              type: object
              required: ["material_rule", "enrich_rule", "material_thinking", "enrich_thinking"]
              properties:
                material_rule:
                  type: string
                enrich_rule:
                  type: string
                material_thinking:
                  type: string
                enrich_thinking:
                  type: string
              additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: analyze_scene_layout
    ref: ai.parallel_deepseek_structured_json.v1
    name: 分析场景布局
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是场景调度分析师。每次只分析当前段落的实际空间布局，不做分格计划，不写画面提示词。
          必须根据原作世界观、完整剧本和当前段落对应情景判断空间关系；不得扩写其他段落剧情，不得加入画风、质量词、模型参数或参考图规则。
      items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请分析当前段落的实际场景布局。

          ## 输入
          原作/世界观背景：
          {world_background}

          完整剧本（仅用于理解剧情连续性，不得扩写当前段落之外的剧情）：
          {full_script}

          当前段落索引：{index}
          当前段落：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          场景资产描述：{scene_description}
          关键道具：{key_props}

          若场景资产描述不为空，必须优先吸收其中的稳定空间结构、功能区域、陈设和布局信息，用它约束 scene_layout；如果当前段落的明确剧情动作与场景资产描述冲突，以当前段落为准，但不得无故改写或忽略资产描述中的稳定场景设定。

          ## 布局提问链
          1. 当前地点的空间应该承担什么叙事作用：交代环境、压迫人物、制造遮挡、引导移动，还是强化冲突？前景、中景、背景分别应保留哪些可见区域，才能让观众一眼读懂场面关系？
          2. 入口、出口、墙面、门窗、道路、水面、林木、建筑、遮挡物等空间边界在哪里？这些边界怎样限制角色行动、视线和镜头方向，避免后续分格出现空间跳变？
          3. 在场角色分别位于空间中的哪一侧、哪个远近层级、朝向哪里、可能沿什么路径移动？这些站位怎样服务人物关系、行动压力和阅读方向？
          4. 关键道具位于哪里？它在本段中是动作支点、视线焦点、遮挡物、危险来源，还是身份信息？如果道具不应成为焦点，应如何放置以免抢走主体？
          5. 光源来自哪里？亮区和暗区分别在强调什么：主体、出口、危险、孤立感，还是情绪转折？光线是否能稳定支撑后续分格的明暗连续性？
          6. 哪些空间约束必须保持一致，才能让后续分格中的人物方位、道具位置、行动路径、遮挡关系和光线方向不互相矛盾？
          {material_rule}
          {enrich_rule}

          输出一个 JSON 对象，只返回本步骤生成的字段：
          - scene_layout：包含 location_summary、spatial_zones、entrances_exits、character_positions、prop_positions、foreground_options、midground_options、background_options、light_sources、movement_paths、layout_constraints

          目标 JSON 示例：
          {
            "scene_layout": {
              "location_summary": "当前段落所在空间的简洁说明",
              "spatial_zones": ["前景区域", "中景区域", "背景区域"],
              "entrances_exits": ["主要入口或出口"],
              "character_positions": {"角色名": "角色所在区域、远近层级和朝向"},
              "prop_positions": {"道具名": "道具相对角色和空间边界的位置"},
              "foreground_options": ["前景可用遮挡或引导元素"],
              "midground_options": ["中景主要行动区域"],
              "background_options": ["背景中稳定空间关系的元素"],
              "light_sources": ["光源方向和明暗作用"],
              "movement_paths": ["角色或视线的移动路径"],
              "layout_constraints": ["后续分格必须保持一致的空间约束"]
            }
          }

      prompt_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props"]
      passthrough_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props", "segment_assignment"]
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props", "segment_assignment", "scene_layout"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  paragraph_text:
                    type: string
                    minLength: 1
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  scene_description:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  scene_layout:
                    type: object
                    additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  status:
                    type: string
                    enum: ["failed"]
                  error:
                    type: object
                    additionalProperties: true
                additionalProperties: true
      additionalProperties: false

  - id: plan_storyboard_panels
    ref: ai.parallel_deepseek_structured_json.v1
    name: 规划分镜分格
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是专业分镜导演，只基于当前段落和场景布局生成结构化分格计划。
          必须根据原作世界观、完整剧本和当前段落对应情景安排叙事节奏；不写自然语言长描述，不写图像提示词，不生成画风、质量词、模型参数、负面提示词或参考图规则。
      items:
        from: "$nodes.analyze_scene_layout.output.results"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请为当前段落规划一页漫画分镜。

          原作/世界观背景：
          {world_background}

          完整剧本（仅用于核对剧情连续性，不得扩写当前段落之外的剧情）：
          {full_script}

          当前段落：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          关键道具：{key_props}
          场景布局：{scene_layout}

          分镜计划标准：
          - 只根据当前段落、scene_layout、在场角色、地点和关键道具规划 panel_plan，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能规划单个大分格或单格整页，不得拆成多格。
          - 每格都必须有明确叙事功能和可见信息增量，避免重复表达同一动作或同一情绪。
          - 页面布局、格子大小和阅读顺序必须服务叙事轻重，不做平均罗列。
          - 每格必须明确入画角色、可见道具、动作瞬间、景别、机位、角度、构图、空间关系、光影氛围和与下一格的衔接。
          - 每个镜头选择都必须说明服务什么叙事目的，例如人物处境、空间压迫、动作爆发、关系变化或情绪转折。
          - 必须遵守 scene_layout 的空间约束，保持人物方位、道具位置、行动路径、遮挡关系和光线方向一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写 image_prompt，不写自然语言长篇画面提示词，不加入画风、质量词、模型参数、负面提示词或参考图规则。

          分格提问链：
          1. 当前段落的核心剧情动作是什么？这一页结束时，观众应获得哪一种明确的信息、情绪或关系变化，所有分格是否都在服务这个目的？
          2. 建议分格数如何落实为具体 panel_count？如果建议是范围，应选择能讲清动作起承转合的最小有效格数，避免为凑数量重复同一信息。
          3. 页面排版怎样形成阅读节奏：哪一格需要建立场面，哪一格需要推进动作，哪一格需要强调转折或结果？格子大小和位置应服务叙事轻重，而不是平均切分。
          4. 哪些剧情瞬间必须入格，才能让因果关系成立？哪些对白、心理或解释性信息不能直接画出，应转化为可见动作、站位、视线或物件状态？
          5. 每格承担什么叙事功能，并新增什么可见信息？如果某格不能带来新的空间、动作、情绪或关系信息，应合并、删除或改成更有信息量的瞬间。
          6. 每格的景别、机位、角度和构图分别在强调什么叙事重点：人物处境、空间压迫、动作爆发、关系变化，还是情绪转折？所选镜头是否能让主体、动作方向和画面重心立即清楚？
          7. 每格的动作瞬间、光线和情绪怎样互相配合？动作应停在最能表达力量、犹豫、威胁或转折的可见瞬间，光线应帮助观众读懂主体和情绪，而不是只增加装饰。
          8. 分格之间如何衔接：动作连续、视线引导、空间方向承接、情绪递进，还是反差切换？这种衔接为什么能让阅读更流畅或更有张力？
          9. 是否严格遵守 scene_layout 的空间约束，不新增不在场角色和未提供道具？如有越界，应回到当前段落、在场资产和既定空间关系内重新安排。

          输出一个 JSON 对象，只返回本步骤生成的字段：
          - think：完整推理过程
          - segment_title
          - panel_plan

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "segment_title": "当前段落标题",
            "panel_plan": {
              "panel_count": 1,
              "page_layout": "单格整页或多格页面布局说明",
              "reading_order": ["第1格"],
              "panels": [
                {
                  "panel_index": 1,
                  "narrative_purpose": "这一格的叙事功能",
                  "characters": ["角色名"],
                  "visible_props": ["道具名"],
                  "shot_info": {
                    "shot_size": "景别",
                    "camera_position": "机位和角度",
                    "composition": "构图和视觉重心"
                  },
                  "frame_content": "这一格可见的动作、空间和情绪",
                  "transition_to_next": "与下一格的衔接方式"
                }
              ]
            }
          }

      prompt_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout"]
      passthrough_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props", "segment_assignment", "scene_layout"]
      required_input_fields:
        value: ["scene_layout"]
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "segment_title", "think", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout", "panel_plan"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  segment_title:
                    type: string
                    minLength: 1
                  think:
                    type: string
                  paragraph_text:
                    type: string
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  scene_layout:
                    type: object
                    additionalProperties: true
                  panel_plan:
                    type: object
                    additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  status:
                    type: string
                    enum: ["failed"]
                  error:
                    type: object
                    additionalProperties: true
                additionalProperties: true
      additionalProperties: false

  - id: review_and_refine_storyboard_plan
    ref: ai.storyboard_review_refine.v1
    name: 审查并修订分镜计划
    inputs:
      items:
        from: "$nodes.plan_storyboard_panels.output.results"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      review_system:
        value: |
          仅返回合法 JSON。你是分镜计划质量监督，只审查当前段落的 scene_layout 和 panel_plan 是否合格。
          你按与“规划分镜分格”相同的分镜计划标准审查和修订，但职责边界只限于 scene_layout 与 panel_plan；不写画面提示词，不生成画风、质量词、模型参数、负面提示词或参考图规则。
      review_prompt_template:
        value: |
          请用提问方式审查当前段落的结构化分镜计划。

          原作/世界观背景：
          {shared_context.world_background}

          完整剧本（只用于核对连续性）：
          {shared_context.full_script}

          当前段落：
          {item.paragraph_text}

          场景布局：
          {source.scene_layout}

          分格计划：
          {source.panel_plan}

          分镜计划标准：
          - 只根据当前段落、scene_layout、在场角色、地点和关键道具规划 panel_plan，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能规划单个大分格或单格整页，不得拆成多格。
          - 每格都必须有明确叙事功能和可见信息增量，避免重复表达同一动作或同一情绪。
          - 页面布局、格子大小和阅读顺序必须服务叙事轻重，不做平均罗列。
          - 每格必须明确入画角色、可见道具、动作瞬间、景别、机位、角度、构图、空间关系、光影氛围和与下一格的衔接。
          - 每个镜头选择都必须说明服务什么叙事目的，例如人物处境、空间压迫、动作爆发、关系变化或情绪转折。
          - 必须遵守 scene_layout 的空间约束，保持人物方位、道具位置、行动路径、遮挡关系和光线方向一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写 image_prompt，不写自然语言长篇画面提示词，不加入画风、质量词、模型参数、负面提示词或参考图规则。

          审查边界：
          - 只判断 scene_layout 和 panel_plan 是否符合分镜计划标准。
          - 不生成 image_prompt，不审查画面提示词写法。
          - 不重新切分剧本，不评价资产分配是否最佳，不把当前段落之外的剧情纳入本段。

          审查问题：
          1. 当前段落的核心剧情动作是否被准确识别？这一页结束时观众应获得的信息、情绪或关系变化是否明确，所有分格是否都服务这个目的？如目的散乱，应收束到当前段落的核心可见动作和情绪变化。
          2. 建议分格数是否被正确落实为具体 panel_count？如果建议是范围，是否选择了能讲清起承转合的最小有效格数；如果建议为 1，是否严格保持单格整页或单个大分格？
          3. 页面排版是否形成清楚阅读节奏？哪一格建立场面、哪一格推进动作、哪一格强调转折或结果是否职责分明；如果格子大小和位置平均罗列，应按叙事轻重调整。
          4. 入格剧情瞬间是否足以让因果关系成立？对白、心理或解释性信息是否被转化为可见动作、站位、视线或物件状态；如仍有不可见状态，应改为可见画面信息。
          5. 每格是否有明确叙事功能和新的可见信息？如果某格没有新增空间、动作、情绪或关系信息，应合并、删除或改成更有信息量的瞬间。
          6. 每格的景别、机位、角度和构图是否明确服务人物处境、空间压迫、动作爆发、关系变化或情绪转折？如果只是罗列术语，应改为能让主体、动作方向和画面重心立即清楚的镜头选择。
          7. 每格动作瞬间、光线和情绪是否互相配合？动作是否停在最能表达力量、犹豫、威胁或转折的可见瞬间，光线是否帮助读懂主体和情绪，而不是只做装饰？
          8. 分格之间的衔接是否清楚：动作连续、视线引导、空间方向承接、情绪递进或反差切换是否能让阅读更流畅或更有张力？
          9. 是否严格遵守 scene_layout 的空间约束，不新增不在场角色、未提供地点、未提供道具或未发生事件？如有越界，应回到当前段落、在场资产和既定空间关系内重新安排。
          10. 是否出现腿部、脚部、鞋履相关描述？如出现，应删除这些部位描写，并改用身体朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达动作方向和受力关系。
          11. 是否混入画风、质量词、模型参数、负面提示词、参考图规则或程序化说明？如出现，应删除，只保留分镜计划本身需要的叙事、空间、镜头和动作信息。

          如果全部合格，passed=true。否则 passed=false，并给出可执行的修改意见。
          输出中的 think 写完整推理过程。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "passed": false,
            "issues": ["需要修订的问题"],
            "revision_instructions": "给修订节点的具体修改意见",
            "revision_summary": "本轮审查结论摘要"
          }
      revision_system:
        value: |
          仅返回合法 JSON。你是分镜导演，只根据审查意见修订结构化 scene_layout 和 panel_plan。
          修订必须遵守与“规划分镜分格”相同的分镜计划标准；不得改变原剧本事件、人物、地点或道具；不得生成画面提示词、画风、质量词、模型参数、负面提示词或参考图规则。
      revision_prompt_template:
        value: |
          请根据审查意见修订当前段落的结构化分镜计划，只返回需要修订的字段。

          原作/世界观背景：
          {shared_context.world_background}

          完整剧本（只用于核对连续性）：
          {shared_context.full_script}

          当前段落：
          {item.paragraph_text}

          建议分格数：{item.panel_count}
          本段在场角色：{item.present_characters}
          地点：{item.location}
          关键道具：{item.key_props}

          当前分段对象：
          {source}

          修改意见：
          {review.revision_instructions}

          分镜计划标准：
          - 只根据当前段落、scene_layout、在场角色、地点和关键道具规划 panel_plan，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能规划单个大分格或单格整页，不得拆成多格。
          - 每格都必须有明确叙事功能和可见信息增量，避免重复表达同一动作或同一情绪。
          - 页面布局、格子大小和阅读顺序必须服务叙事轻重，不做平均罗列。
          - 每格必须明确入画角色、可见道具、动作瞬间、景别、机位、角度、构图、空间关系、光影氛围和与下一格的衔接。
          - 每个镜头选择都必须说明服务什么叙事目的，例如人物处境、空间压迫、动作爆发、关系变化或情绪转折。
          - 必须遵守 scene_layout 的空间约束，保持人物方位、道具位置、行动路径、遮挡关系和光线方向一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写 image_prompt，不写自然语言长篇画面提示词，不加入画风、质量词、模型参数、负面提示词或参考图规则。

          修订要求：
          1. 必须返回 think，并只额外返回需要修订的 scene_layout、panel_plan 或其它可修订字段；
          2. 保持当前段落的人物、地点、道具边界；所有修订都必须说明画面选择服务什么叙事目的。
          3. 只修订 scene_layout 和 panel_plan 中的问题；修订时优先改善空间一致性、信息增量、镜头动机和分格衔接。
          4. 不加入画面提示词、画风、质量词、模型参数、负面提示词或参考图规则。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "scene_layout": {
              "location_summary": "修订后的场景布局说明",
              "layout_constraints": ["修订后的空间约束"]
            },
            "panel_plan": {
