  # ===== P2: 变体匹配 =====

  - id: match_variants
    ref: ai.parallel_deepseek_structured_json.v1
    name: 匹配角色变体
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色变体匹配器，只负责把“提取到的角色变体资产”匹配到“资产库候选变体”。
          工程化匹配原则：
          1. 严格区分输入分区：variant_name、variant_description、accessories 是提取到的待匹配变体；existing_variants 是资产库候选变体。
          2. 变体是否存在已经由上游 extract_characters 决定；本节点不得根据剧情处境、动作或临时状态新增变体依据。
          3. 只比较稳定服装、稳定外观造型、可穿戴/携带配件和 existing_variants 的 variant、name、metadata.tags。
          4. 被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、地点、天气、光照等临时状态必须忽略。
          5. 如果已提取变体无法匹配 existing_variants，才标记 is_new_variant=true，并把 new_variant_name 填为 角色名_已提取变体标签。
      prompt_template:
        value: |
          请为以下已提取角色变体匹配已有资产。

          ## A. 提取到的角色变体资产（待匹配）
          字段来源：full_name、variant_name、variant_description、accessories、character_status。

          ## B. 资产库候选变体
          字段来源：同一 JSON 对象的 existing_variants；每个候选包含 asset_id、name、variant 和 metadata.tags。

          ## C. 输入 JSON
          {item}

          ## D. 匹配准则
          - 请将 A 中的 variant_name、variant_description、accessories 与 B 中的 existing_variants 做语义匹配。
          - character_status 只可作为上下文参考，不能作为新增变体依据。
          - 不得把 existing_variants 中的候选字段写回为提取结果。
          - 如只因被绑、受伤、姿态、表情、动作、天气、场景不同，不得创建新变体。

          ## E. 输出 JSON
          返回一个 JSON 对象：
          - full_name：角色全名
          - accessories：上游已提取的角色当前配件列表，不得自行新增
          - matched_variant：匹配到的变体标签（无匹配时为空字符串）
          - matched_variant_id：匹配到的变体资产ID（无匹配时为null）
          - is_new_variant：上游已提取变体是否未匹配到已有变体资产
          - new_variant_name：is_new_variant=true时必填，格式：角色名_上游variant_name；不得使用被绑、受伤、动作、场景等临时状态命名
          - default_variant_status：角色默认变体的状态描述；existing_variants 为空时返回空字符串
          - default_variant_storage_uri：角色默认变体的参考图URL；existing_variants 为空或无参考图时返回空字符串
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "accessories", "matched_variant", "is_new_variant", "default_variant_status", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
              matched_variant:
                type: string
              matched_variant_id:
                type: ["string", "null"]
              is_new_variant:
                type: boolean
              new_variant_name:
                type: string
              default_variant_status:
                type: string
              default_variant_storage_uri:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: check_accessories
    ref: ai.parallel_deepseek_structured_json.v1
    name: 检查角色配件
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色配件匹配器，只检查“提取到的角色配件”是否已存在于“资产库候选变体/配件”中。
          工程化匹配原则：
          1. 严格区分输入分区：accessories 是上游提取到的待检查配件；existing_variants 是资产库候选变体/配件来源。
          2. 配件是独立变体维度：基础服装是一个变体，基础服装+配件是另一个变体；一个变体只对应一个图像。
          3. 只检查上游已提取配件，不得自行新增配件。
          4. 不得把被绑、受伤、动作、姿态、剧情处境、地点、天气或临时限制物补充为新配件。
      prompt_template:
        value: |
          请检查以下角色的配件状态。

          ## A. 提取到的角色配件（待检查）
          字段来源：accessories。

          ## B. 资产库候选变体/配件
          字段来源：existing_variants 及其 name、variant、metadata.tags。

          ## C. 输入 JSON
          {item}

          ## D. 输出 JSON
          返回一个 JSON 对象：
          - full_name：角色全名
          - has_new_accessories：上游已提取配件中是否有未匹配配件
          - new_accessories：上游已提取但未匹配的配件名称数组，不得自行新增
          - existing_accessories：已有配件名称数组
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "has_new_accessories", "new_accessories", "existing_accessories", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              has_new_accessories:
                type: boolean
              new_accessories:
                type: array
                items:
                  type: string
              existing_accessories:
                type: array
                items:
                  type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 道具提取与匹配 =====

  - id: extract_props
    ref: ai.deepseek_structured_json.v1
    name: 提取道具
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从以下剧本中提取所有关键道具（props）。
          世界背景（原作）：{background}。

          请分析剧本中出现的所有关键道具，包括武器、工具、物品等。
          道具收录条件：在叙述段中被角色使用、持有、提及或具有叙事意义的物品。
          排除条件：仅为背景装饰的无名物品、对话中提及但未实际出现或使用的物品。
          衣服、服装、鞋帽、披风、围巾、面巾、斗笠、斗篷等穿戴类外观元素不作为道具提取；它们属于角色变体或角色配件，只能由角色提取节点写入 variant_name、variant_description 或 accessories。
          只有可从角色身上独立拿取、使用、赠予、争夺或作为剧情实体流转的物件才可作为道具；普通穿着状态不能作为道具。
          如果道具与某个角色有明确持有、使用、携带、赠予或争夺关系，请记录关联角色；没有明确关联时留空或省略。
          将你的分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有关键道具。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - props：道具数组
          - prop_names：所有道具名称数组（仅字符串）

          每个道具对象必须包含：
          - full_name：道具名称（如"青龙偃月刀"）
          - description：道具描述（≤100字）
          - category：道具类别（如"武器"、"工具"、"容器"、"书籍/信件"等；不要使用"服装"作为道具类别，普通穿戴类外观元素不进入 props）
          - related_character：关联角色（可选；仅当剧本明确说明某角色持有、使用、携带、赠予或争夺该道具时填写角色名，否则可省略或为空字符串）

          根层级除 reasoning、props 和 prop_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_storyboard_input.output.script"
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "props", "prop_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        props:
          type: array
          items:
            type: object
            required: ["full_name", "description", "category"]
            properties:
              full_name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              category:
                type: string
                minLength: 1
              related_character:
                type: string
            additionalProperties: false
        prop_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_prop_assets
    ref: tool.asset_lookup.v1
    name: 检索已有道具资产
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_props_by_name
    ref: tool.asset_lookup.v1
    name: 按名称匹配道具
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_props.output.prop_names"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_props
    ref: tool.enrich_characters.v1
    name: 汇总道具匹配结果
    inputs:
      characters:
        from: "$nodes.extract_props.output.props"
      matched_by_name:
        from: "$nodes.match_props_by_name.output.assets"
      semantic_matches:
        value: []
      existing_assets:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 资产审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    name: 资产列表汇总
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          ## 角色资产
          ### A. 提取到的角色资产
          {characters}

          ### B. 资产库角色名称匹配结果
          {match_by_name}

          ### C. 资产库角色语义匹配结果
          {semantic_match}

          ## 角色变体与配件
          ### A. 资产库角色变体匹配结果
          {variant_result}

          ### B. 资产库角色配件匹配结果
          {accessory_result}

          ## 地点资产
          ### A. 提取到的地点资产
          {scenes}

          ### B. 资产库地点名称匹配结果
          {scene_matches}

          ## 道具资产
          ### A. 提取到的道具资产
          {props}

          ### B. 资产库道具名称匹配结果
          {prop_matches}

          请确认资产匹配是否正确，或提供修改意见。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          match_by_name:
            from: "$nodes.match_by_name.output.assets"
          semantic_match:
            from: "$nodes.semantic_match_characters.output.match_results"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
          scenes:
            from: "$nodes.extract_scenes.output.scenes"
          scene_matches:
            from: "$nodes.match_scenes_by_name.output.assets"
          props:
            from: "$nodes.extract_props.output.props"
          prop_matches:
            from: "$nodes.match_props_by_name.output.assets"
      characters:
        from: "$nodes.extract_characters.output.characters"
      background:
        from: "$nodes.collect_asset_storyboard_input.output.background"
      script:
        from: "$nodes.collect_asset_storyboard_input.output.script"
      enriched_characters:
        from: "$nodes.enrich_characters.output.characters"
      match_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_match:
        from: "$nodes.semantic_match_characters.output.match_results"
      scenes:
        from: "$nodes.extract_scenes.output.scenes"
      enriched_scenes:
        from: "$nodes.enrich_scenes.output.characters"
      scene_matches:
        from: "$nodes.match_scenes_by_name.output.assets"
      props:
        from: "$nodes.extract_props.output.props"
      enriched_props:
        from: "$nodes.enrich_props.output.characters"
      prop_matches:
        from: "$nodes.match_props_by_name.output.assets"
      variant_results:
        from: "$nodes.match_variants.output.results"
      accessory_results:
        from: "$nodes.check_accessories.output.results"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved:
        from_user: true
        required: false
        schema:
          type: boolean
      comment:
        from_user: true
        required: false
        schema:
          type: string
      approved_assets:
        from_user: true
        schema:
          type: object
      additional_asset_request:
        from_user: true
        required: false
        schema:
          type: string
      asset_images:
        from_user: true
        required: false
        schema:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_key", "image_url"]
            properties:
              asset_type:
                type: string
              asset_key:
                type: string
              full_name:
                type: string
              image_url:
                type: string
              source:
                type: string
            additionalProperties: true
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        approved_assets:
          type: object
        additional_asset_request:
          type: string
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_summary_table.v1
          variant: tabbed_table
          mode: interactive

  # ===== 筛选需生成资产 =====

