  - id: plan_storyboard_panels
    ref: ai.parallel_deepseek_structured_json.v1
    name: 规划分镜分格
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是分镜叙事规划师，只根据当前段落和 scene_layout.character_positions 中的角色位置/行动路线决定一共有几个分镜、每格描写什么。
          目标只有叙事流畅、动作衔接清楚和分镜节奏合理；不拆复杂字段，不做画面提示词，不扩写光影氛围和视觉细节，不生成画风、质量词、模型参数、负面提示词或参考图规则。
      items:
        from: "$nodes.analyze_scene_layout.output.results"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请根据上一步场景布局和角色行动路线，为当前段落规划一页漫画分镜。

          原作/世界观背景：
          {world_background}

          完整剧本（仅用于核对剧情连续性，不得扩写当前段落之外的剧情）：
          {full_script}

          当前段落：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          关键道具：{key_props}
          场景布局：{scene_layout}

          分镜计划标准：
          - 只根据当前段落、scene_layout 中的空间关系以及 character_positions 里的角色位置/行动路线规划 panel_plan，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能输出 1 格，不得拆成多格。
          - 每格只写 description，用一句话说明这一格描写什么；只写可见动作和必要空间承接。
          - 可以在 description 中自然标注空境、特写、出框/破格动作或景别节奏，但只用于说明该格叙事功能，不展开镜头细节。
          - 分格顺序必须让行动路线读起来连贯，避免重复表达同一动作。
          - 必须遵守 scene_layout 的空间关系，保持人物方位、道具位置和行动路线一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写页面布局、阅读顺序、角色清单、道具清单、行动节点、衔接方式等拆分字段。
          - 不写机位、角度、构图、光影、氛围、材质、画面质量、模型参数、负面提示词、参考图规则或长篇画面提示词。

          分格提问链：
          1. 当前段落有哪些必须连续表达的行动节点？这些行动节点应按什么顺序出现？
          2. 建议分格数如何落实为具体 panel_count？如果建议是范围，应选择能讲清行动起承转合的最小有效格数。
          3. 是否需要空境来交代地点、承接情绪或让动作节奏有停顿？如果需要，空境必须服务当前段落的空间和行动路线，不得变成额外氛围扩写。
          4. 是否需要特写来强调关键表情、手势、道具、门窗、文书、武器接触或动作结果？特写只用于让叙事信息更清楚，不能脱离当前事件。
          5. 是否需要出框/破格效果：角色、武器、门框、烟尘、文书、衣袖或其他物体越过分格边界，以强化动作冲击、遮挡层次或阅读引导？如果使用，必须说明是什么元素越过边界以及服务哪个动作。
          6. 每格采用什么轻量景别节奏：空境、远景、中景、近景、特写或大格强调？景别只用于决定这一格叙事重点，不展开机位、角度、构图或光影。
          7. 每格描写什么事情正在发生？上一格到下一格的动作是否连续、清楚、不跳步？
          8. 是否严格遵守 scene_layout 的空间关系，不新增不在场角色和未提供道具？如有越界，应回到当前段落、在场资产和既定行动路线内重新安排。

          输出一个 JSON 对象，只返回本步骤生成的字段：
          - think：完整推理过程
          - segment_title
          - panel_plan

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "segment_title": "当前段落标题",
            "panel_plan": {
              "panel_count": 1,
              "panels": [
                {
                  "panel_index": 1,
                  "description": "这一格描写什么"
                }
              ]
            }
          }

      prompt_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout"]
      passthrough_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "scene_description", "key_props", "segment_assignment", "scene_layout"]
      required_input_fields:
        value: ["scene_layout"]
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "segment_title", "think", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout", "panel_plan"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  segment_title:
                    type: string
                    minLength: 1
                  think:
                    type: string
                  paragraph_text:
                    type: string
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  scene_layout:
                    type: object
                    additionalProperties: true
                  panel_plan:
                    type: object
                    additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  status:
                    type: string
                    enum: ["failed"]
                  error:
                    type: object
                    additionalProperties: true
                additionalProperties: true
      additionalProperties: false

  - id: review_and_refine_storyboard_plan
    ref: ai.storyboard_review_refine.v1
    name: 审查并修订分镜计划
    inputs:
      items:
        from: "$nodes.plan_storyboard_panels.output.results"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      review_system:
        value: |
          仅返回合法 JSON。你是分镜计划质量监督，只审查当前段落的 scene_layout 和 panel_plan 是否合格。
          你按与“场景布局”和“规划分镜分格”相同的职责边界审查和修订：scene_layout 只管空间关系，并把角色行动路线合并写入 character_positions；panel_plan 只管一共有几个分镜、每格描写什么。
          不要求拆分角色、道具、行动节点、衔接方式、镜头、景别、机位、角度、构图、光影、氛围、材质或画面提示词；不生成画风、质量词、模型参数、负面提示词或参考图规则。
      review_prompt_template:
        value: |
          请用提问方式审查当前段落的结构化分镜计划。

          原作/世界观背景：
          {shared_context.world_background}

          完整剧本（只用于核对连续性）：
          {shared_context.full_script}

          当前段落：
          {item.paragraph_text}

          场景布局：
          {source.scene_layout}

          分格计划：
          {source.panel_plan}

          分镜计划标准：
          - scene_layout 只说明地点、角色、道具、入口出口和角色位置/行动路线之间的空间关系；行动路线必须合并写入 character_positions，不单独输出行动路线、遮挡物或约束字段；不补充情绪、光影、氛围、叙事目的或视觉效果。
          - panel_plan 只根据当前段落、scene_layout 中的空间关系以及 character_positions 里的角色位置/行动路线规划每个分镜描述什么，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能输出 1 格，不得拆成多格。
          - 每格只写 description，用一句话说明这一格描写什么；只写可见动作和必要空间承接。
          - 分格顺序必须让行动路线读起来连贯，避免重复表达同一动作。
          - 必须遵守 scene_layout 的空间关系，保持人物方位、道具位置和行动路线一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写页面布局、阅读顺序、角色清单、道具清单、行动节点、衔接方式等拆分字段。
          - 不写景别、机位、角度、构图、光影、氛围、材质、画面质量、模型参数、负面提示词、参考图规则或长篇画面提示词。

          审查边界：
          - 只判断 scene_layout 和 panel_plan 是否符合分镜计划标准。
          - 不生成 image_prompt，不审查画面提示词写法。
          - 不重新切分剧本，不评价资产分配是否最佳，不把当前段落之外的剧情纳入本段。

          审查问题：
          1. scene_layout 是否只说明空间关系，并把角色行动路线合并写入 character_positions？如出现独立行动路线字段、遮挡物字段、约束字段、情绪、光影、氛围、叙事目的、镜头设计或画面提示词，应删除或合并。
          2. scene_layout 是否交代了必要的区域、入口出口、角色位置/行动路线和道具位置？如缺少导致分镜衔接不清的空间关系，应补足。
          3. panel_count 是否正确落实建议分格数？如果建议是范围，是否选择了能讲清行动起承转合的最小有效格数；如果建议为 1，是否严格只输出 1 格？
          4. 每格是否只用 description 描述当前分镜发生什么？如拆成角色、道具、行动节点、衔接方式、镜头、景别、构图、光影、氛围或材质，应删除并合并为一句分镜描述。
          5. 分格之间的动作是否连续、清楚、不跳步？如果某格重复同一动作或没有推进必要因果，应合并、删除或改成更有信息量的动作节点。
          6. 是否严格遵守 scene_layout 的空间关系，不新增不在场角色、未提供地点、未提供道具或未发生事件？如有越界，应回到当前段落、在场资产和既定行动路线内重新安排。
          7. 是否出现腿部、脚部、鞋履相关描述？如出现，应删除这些部位描写，并改用身体朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达动作方向和受力关系。
          8. 是否混入画风、质量词、模型参数、负面提示词、参考图规则或程序化说明？如出现，应删除，只保留空间关系、行动路线和逐格叙事内容。

          如果全部合格，passed=true。否则 passed=false，并给出可执行的修改意见。
          输出中的 think 写完整推理过程。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "passed": false,
            "issues": ["需要修订的问题"],
            "revision_instructions": "给修订节点的具体修改意见",
            "revision_summary": "本轮审查结论摘要"
          }
      revision_system:
        value: |
          仅返回合法 JSON。你是分镜导演，只根据审查意见修订结构化 scene_layout 和 panel_plan。
          修订必须遵守同一职责边界：scene_layout 只管空间关系，并把角色行动路线合并写入 character_positions，不输出独立行动路线、遮挡物或约束字段；panel_plan 只管一共有几个分镜、每格描写什么；不得改变原剧本事件、人物、地点或道具；不得生成拆分角色、道具、行动节点、衔接方式、镜头、景别、机位、角度、构图、光影、氛围、材质、画面提示词、画风、质量词、模型参数、负面提示词或参考图规则。
      revision_prompt_template:
        value: |
          请根据审查意见修订当前段落的结构化分镜计划，只返回需要修订的字段。

          原作/世界观背景：
          {shared_context.world_background}

          完整剧本（只用于核对连续性）：
          {shared_context.full_script}

          当前段落：
          {item.paragraph_text}

          建议分格数：{item.panel_count}
          本段在场角色：{item.present_characters}
          地点：{item.location}
          关键道具：{item.key_props}

          当前分段对象：
          {source}

          修改意见：
          {review.revision_instructions}

          分镜计划标准：
          - scene_layout 只说明地点、角色、道具、入口出口和角色位置/行动路线之间的空间关系；行动路线必须合并写入 character_positions，不单独输出行动路线、遮挡物或约束字段；不补充情绪、光影、氛围、叙事目的或视觉效果。
          - panel_plan 只根据当前段落、scene_layout 中的空间关系以及 character_positions 里的角色位置/行动路线规划每个分镜描述什么，不扩写其他段落剧情。
          - panel_count 必须严格落实建议分格数；如果建议为 1，只能输出 1 格，不得拆成多格。
          - 每格只写 description，用一句话说明这一格描写什么；只写可见动作和必要空间承接。
          - 分格顺序必须让行动路线读起来连贯，避免重复表达同一动作。
          - 必须遵守 scene_layout 的空间关系，保持人物方位、道具位置和行动路线一致。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写页面布局、阅读顺序、角色清单、道具清单、行动节点、衔接方式等拆分字段。
          - 不写景别、机位、角度、构图、光影、氛围、材质、画面质量、模型参数、负面提示词、参考图规则或长篇画面提示词。

          修订要求：
          1. 必须返回 think，并只额外返回需要修订的 scene_layout、panel_plan 或其它可修订字段；
          2. 保持当前段落的人物、地点、道具边界；不要说明画面选择服务什么叙事目的。
          3. 只修订 scene_layout 和 panel_plan 中的问题；panel_plan 只保留 panel_count 和 panels[].description。
          4. 不加入拆分角色、道具、行动节点、衔接方式、镜头、景别、机位、角度、构图、光影、氛围、材质、画面提示词、画风、质量词、模型参数、负面提示词或参考图规则。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "scene_layout": {
              "location_summary": "修订后的场景布局说明",
              "character_positions": {"角色名": "修订后的角色位置和行动路线"}
            },
            "panel_plan": {
              "panel_count": 1,
              "panels": [
                {
                  "panel_index": 1,
                  "description": "修订后的这一格描写什么"
                }
              ]
            }
          }
      review_output_field:
        value: review
      review_history_output_field:
        value: review_history
      required_input_fields:
        value: ["scene_layout", "panel_plan"]
      max_revision_rounds:
        value: 2
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "segment_title", "think", "scene_layout", "panel_plan", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "review", "review_history"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  segment_title:
                    type: string
                    minLength: 1
                  think:
                    type: string
                  scene_layout:
                    type: object
                    additionalProperties: true
                  panel_plan:
                    type: object
                    additionalProperties: true
                  paragraph_text:
                    type: string
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  review:
                    type: object
                    additionalProperties: true
                  review_history:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                additionalProperties: true
              - type: object
                required: ["index", "status", "error"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  status:
                    type: string
                    enum: ["failed"]
                  error:
                    type: object
                    additionalProperties: true
                additionalProperties: true
      additionalProperties: false

  - id: convert_storyboard_plan_to_image_prompt
    ref: ai.parallel_deepseek_structured_json.v1
    name: 转换画面提示词
    inputs:
