  - id: prepare_storyboard_panel_cards
    ref: tool.prepare_storyboard_panel_cards.v1
    name: 准备分镜汇总卡片
    inputs:
      segment_descriptions:
        from: "$nodes.merge_segment_descriptions.output.segment_descriptions"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      generation_rules:
        value: |
          风格指令：请参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量，细节丰富，富有张力的漫画，线条是典型的矢量图风格，干净且流畅，使用纯赛璐璐风格，色块干净明确，轮廓线利落，阴影较浅，边缘锐利，阴影偏冷色调，注意，所有角色都是胶囊形设计（达摩式 / 蛋形），下半身是个球，没有腿。strict perspective with foreshortening, near objects large far objects small, strong depth of field, layered foreground-midground-background composition. digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k
          角色一致性：保持人物武器和参考完全一致，人物比例不变，所有角色为达摩/不倒翁体型：角色的脸为圆形，q版造型，忽略面部细节，下半身为圆润饱满的半球形底部，完全没有腿部、没有膝盖、没有脚踝、没有足部。
          时代背景：场景细节丰富，注意！时代背景在中国古代，以水浒传为背景，请根据时代背景和当前情景设计环境和物件，使装饰和场景内的物体丰富，并和角色风格一致。
          透视与构图：严格遵守近大远小的透视关系，透视线在体现强烈的空间纵深感，注意，每个分格的消失点必须统一，如果有超过一个分格，分格应该采用不规则的梯形与矩形组合排版，打破平庸的视觉节奏。
          场景建筑比例：场景建筑比例也要符合 chibi style。
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, ugly, bad proportions, deformed, realistic, gradient shading, complex textures, red lines, guidelines, nose, legs, feet, ankles, knees, thighs, calves, toes, footwear, shoes, boots, sandals, photorealistic, flat composition, no depth
      aspect_ratio:
        value: "16:9"
      resolution:
        value: 2K
    outputs:
      type: object
      required: ["panel_cards"]
      properties:
        panel_cards:
          type: array
          items:
            type: object
            additionalProperties: true
        storyboard_items:
          type: array
          items:
            type: object
            additionalProperties: true
        shared_context:
          type: object
          additionalProperties: true
      additionalProperties: false

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 分镜汇总
    inputs:
      question:
        template: |
          请在分镜汇总中检查每张分格卡片，必要时调整提示词、参考图并生成分镜图像。

          分镜卡片：
          {panel_cards}
        vars:
          panel_cards:
            from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      panel_cards:
        from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      storyboard_items:
        from: "$nodes.prepare_storyboard_panel_cards.output.storyboard_items"
      shared_context:
        from: "$nodes.prepare_storyboard_panel_cards.output.shared_context"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish"]
      panel_results:
        from_user: true
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision", "panel_results"]
      properties:
        decision:
          type: string
          enum: ["finish"]
        panel_results:
          type: array
          items:
            type: object
            additionalProperties: true
        revision_notes:
          type: string
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.storyboard_panel_cards.v1
          variant: panel_review
          mode: interactive

