workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision", "panel_results"]
    properties:
      decision:
        type: string
        enum: ["finish"]
      panel_results:
        type: array
        items:
          type: object
          additionalProperties: true
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产后，直接展示集名称、剧情概括、原剧本和完整资产目录。
        nodes:
          - select_episode_metadata
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - prepare_storyboard_asset_index
          - assign_assets_to_segments
          - resolve_segment_image_refs
          - prepare_segment_storyboard_inputs
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述，并在分镜汇总中审核提示词、参考图和目标分镜图像。
        nodes:
          - describe_panels
          - merge_segment_descriptions
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产
      no_material:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 禁止材质区分
          default: false
          description: 启用后，分镜画面描述不区分粗糙、丝滑、生锈等材质质感。
      enrich_description:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 丰富画面描述
          default: false
          description: 启用后，在分镜设计中追加空间深度、物理反馈、建筑陈设、颗粒介质和琐碎叙事细节审查。
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
        episode_asset_id:
          type: string
          minLength: 1
        storyboard_options:
          type: object
          properties:
            no_material:
              type: boolean
            enrich_description:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: dropdown
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                placeholder: 请选择集信息资产
                preview_control_id: ui.display.episode_context.v1
      sections:
        input:
          wrapper: false
        output:
          remove: true
        events:
          visible: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.select_episode_metadata.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_storyboard_asset_index
    ref: tool.prepare_storyboard_asset_index.v1
    name: 准备分镜资产索引
    inputs:
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["asset_index"]
      properties:
        asset_index:
          type: object
          required: ["characters", "locations", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            locations:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            props:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本连续性分析助手。请根据完整剧本分段和轻量资产索引，为每个分段判断实际在场或对当前场景有直接影响的角色、地点和关键道具。
          只判断剧情在场关系，不判断是否入画；入画选择交给后续分镜提示词生成步骤。
      prompt:
        template: |
          请为以下剧本段落整理轻量在场资产表。

          剧本段落：
          {segments}

          轻量资产索引：
          {asset_index}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际在场或持续处于同一场景内的角色数组，每个只包含 asset_name、presence
          - key_props：本段实际出现或影响画面的关键道具名称数组

          角色判断规则：
          - presence 表示物理在场状态，取值 present、mentioned_only、absent、uncertain。
          - 角色在上一段进入同一场景、本段未离开，即使本段没有再次点名，也可以判断为 present。
          - 仅在对话中被提及、命令中被派遣、计划或回忆中出现的角色，presence=mentioned_only；如果不会影响当前画面，不要加入 characters。
          - 只使用轻量资产索引中的资产名称，不要创造新角色名、地点名或道具名。
          - 不要输出 reason、visibility、asset_type、asset_tags、asset_id、image_ref 或 image_url；后续工具节点会根据完整资产目录补全。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_index:
            from: "$nodes.prepare_storyboard_asset_index.output.asset_index"
          background:
            from: "$nodes.select_episode_metadata.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_name", "presence"]
                  properties:
                    asset_name:
                      type: string
                      minLength: 1
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: resolve_segment_image_refs
    ref: tool.resolve_segment_image_refs.v1
    name: 补全段落参考图
    inputs:
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    appearance_description:
                      type: string
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_segment_storyboard_inputs
    ref: tool.prepare_segment_storyboard_inputs.v1
    name: 准备分段分镜输入
    inputs:
      source_script:
        from: "$nodes.select_episode_metadata.output.source_script"
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_options:
        from: "$nodes.select_episode_metadata.output.storyboard_options"
    outputs:
      type: object
      required: ["items", "shared_context"]
      properties:
        items:
          type: array
          items:
            type: object
            required: ["index", "current_segment", "segment_assignment"]
            properties:
              index:
                type: integer
                minimum: 0
              current_segment:
                type: object
                additionalProperties: true
              segment_assignment:
                type: object
                additionalProperties: true
            additionalProperties: false
        shared_context:
          type: object
          required: ["full_script"]
          properties:
            full_script:
              type: string
              minLength: 1
            storyboard_options:
              type: object
              properties:
                no_material:
                  type: boolean
                enrich_description:
                  type: boolean
              additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: describe_panels
    ref: ai.parallel_deepseek_structured_json.v1
    name: 描述分镜画面
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是漫画分镜导演。每次只为当前 item 中的 current_segment 设计分镜画面。
          必须参考 full_script 理解完整剧情连续性，参考 current_segment 设计当前段落，参考 segment_assignment 保持角色、地点、道具和外观描述一致。
          必须读取 shared_context.storyboard_options：
          - no_material=true 时，画面描述、thinking、style、constraints 均不得区分或强调材质、质地、面料、纹理、金属锈蚀、丝滑、粗糙等材质信息；只能描述结构、形状、颜色、光影、空间、动作和陈设功能。
          - no_material=false 时，可以描述对画面叙事必要的材质和表面质感，但不要堆砌材质词。
          - enrich_description=true 时，thinking 必须额外审查空间深度、物理反馈、建筑陈设复杂度、颗粒感介质和琐碎叙事细节，并把有效结果自然写入 panel.description。
          - enrich_description=false 时，保持描述清晰克制，不追加额外密度审查。
          不要输出其他段落，不要返回数组，不要包含 Markdown 或解释文字。
      items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          请只为以下 item.current_segment 设计分镜画面。

          输入 item JSON：
          {item}

          分镜设计要求：
          - 只生成分镜描述，不生成图像；描述从宏观到微观，保证镜头整体性和合理性。
          - 当前段落可设计为一页漫画中的多个分格；分格大小不要平均，布局应有节奏和设计感。
          - 必须根据 item.current_segment.panel_count_min 和 panel_count_max 决定 panels 数量：二者相等时 panels 数量必须等于该值；二者不同则 panels 数量必须落在范围内，并在 thinking 中说明选择该数量的理由。
          - 描述中不写对话，不写角色服装和外貌细节，不出现腿部、脚部、鞋履相关描写。
          - segment_assignment.characters 表示当前段在场或持续处于同一场景的角色；请根据当前分格的镜头意图决定哪些角色真正入画，并写入 visible_characters。
          - 没有写入 visible_characters 的在场角色只能作为剧情连续性参考，不得默认画进该分格。
          - 如果出现复数次要角色，先确定数量并给每个次要角色编号，再分别描述动作。
          - 先读情绪，再定镜头：根据水浒传剧情、当前段落情绪和前后段承接，选择最能放大情绪的镜头语言。
          - 禁止默认构图：不得无理由使用正中平视、角色左右对称或平面布局；每格必须有明确视觉意图。
          - 每格必须标注机位、角度、景别、构图、光影和氛围；多使用仰视、俯视、倾斜、大透视、前景遮挡和前中后景分层。
          - thinking 至少回答：前景/中景/背景的深度层级；环境中用于叙事的物件；光线如何刻画冲突；动作定格在哪个瞬间；镜头角度的情绪潜台词。
          - 当 shared_context.storyboard_options.no_material=true 时，删除所有材质和质感审查，只保留空间、结构、色彩、光影、功能和动作信息。
          - 当 shared_context.storyboard_options.enrich_description=true 时，额外回答并落实：能否增加遮挡物强化窥视感和空间深度；动作是否造成飘动、飞溅、散落、震动等物理反馈；建筑结构和陈设是否足够具体；空气中是否有尘、雪、烟、雾、火星等颗粒介质；是否有能暗示身份、地位或心境的细小物件。

          输出一个 JSON 对象，必须包含：
          - index：当前段落索引，必须等于 item.index
          - segment_title：当前段落标题
          - thinking：按上述审查项简洁说明分镜设计依据
          - panels：当前段落的分格数组

          每个 panel 必须包含 description、style、constraints、visible_characters，可选 character_focus、environment_details、shot_type、camera_angle、composition、lighting、mood、action、key_props、continuity_notes。
      prompt_fields:
        value: ["index", "current_segment", "segment_assignment"]
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints", "visible_characters"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    visible_characters:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    character_focus:
                      type: string
                    environment_details:
                      type: string
                    shot_type:
                      type: string
                    camera_angle:
                      type: string
                    composition:
                      type: string
                    lighting:
                      type: string
                    mood:
                      type: string
                    action:
                      type: string
                    key_props:
                      type: string
                    continuity_notes:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: merge_segment_descriptions
    ref: tool.merge_segment_storyboard_descriptions.v1
    name: 合并分镜描述
    inputs:
      results:
        from: "$nodes.describe_panels.output.results"
    outputs:
      type: object
      required: ["segment_descriptions"]
      properties:
        segment_descriptions:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints", "visible_characters"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    visible_characters:
                      type: array
                      items:
                        type: string
                        minLength: 1
                    character_focus:
                      type: string
                    environment_details:
                      type: string
                    shot_type:
                      type: string
                    camera_angle:
                      type: string
                    composition:
                      type: string
                    lighting:
                      type: string
                    mood:
                      type: string
                    action:
                      type: string
                    key_props:
                      type: string
                    continuity_notes:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: prepare_storyboard_panel_cards
    ref: tool.prepare_storyboard_panel_cards.v1
    name: 准备分镜汇总卡片
    inputs:
      segment_descriptions:
        from: "$nodes.merge_segment_descriptions.output.segment_descriptions"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      generation_rules:
        value: |
          风格指令：参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量、细节丰富、富有张力的漫画；线条采用干净流畅的矢量图风格，轮廓线利落，边缘锐利，阴影较浅且偏冷色调，色彩干净鲜明，无复杂渐变。
          角色一致性：严格参考输入图片中的人物比例、武器、关键服饰和识别特征，所有角色保持胶囊形、达摩式、蛋形或不倒翁体型；上半身为正常卡通比例，下半身为圆润饱满的半球形底部，完全没有腿部、膝盖、脚踝、脚部或鞋履。
          时代背景：中国古代，以水浒传为背景；根据当前情景设计环境、建筑、陈设和物件，使场景细节丰富，并与角色风格一致。
          透视与构图：严格遵守近大远小，使用强透视、明显纵深、前景遮挡、前中后景分层和统一消失点；多分格页面采用不规则梯形与矩形组合排版，打破平均分割和正中平视。
          画面风格关键词：strict perspective with foreshortening, near objects large far objects small, strong depth of field, layered foreground-midground-background composition, digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality.
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, ugly, bad proportions, deformed, realistic, gradient shading, complex textures, red lines, guidelines, nose, legs, feet, ankles, knees, thighs, calves, toes, footwear, shoes, boots, sandals, photorealistic, flat composition, no depth
      aspect_ratio:
        value: "16:9"
      resolution:
        value: 2K
    outputs:
      type: object
      required: ["panel_cards"]
      properties:
        panel_cards:
          type: array
          items:
            type: object
            additionalProperties: true
        storyboard_items:
          type: array
          items:
            type: object
            additionalProperties: true
        shared_context:
          type: object
          additionalProperties: true
      additionalProperties: false

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 分镜汇总
    inputs:
      question:
        template: |
          请在分镜汇总中检查每张分格卡片，必要时调整提示词、参考图并生成分镜图像。

          分镜卡片：
          {panel_cards}
        vars:
          panel_cards:
            from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      panel_cards:
        from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      storyboard_items:
        from: "$nodes.prepare_storyboard_panel_cards.output.storyboard_items"
      shared_context:
        from: "$nodes.prepare_storyboard_panel_cards.output.shared_context"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish"]
      panel_results:
        from_user: true
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision", "panel_results"]
      properties:
        decision:
          type: string
          enum: ["finish"]
        panel_results:
          type: array
          items:
            type: object
            additionalProperties: true
        revision_notes:
          type: string
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.storyboard_panel_cards.v1
          variant: panel_review
          mode: interactive

edges:
  - from: START
    to: select_episode_metadata
  - from: select_episode_metadata
