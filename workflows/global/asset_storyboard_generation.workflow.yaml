workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision"]
    properties:
      decision:
        type: string
        minLength: 1
      selected_image_url:
        type: string
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产，确认集名称、资产目录和原剧本内容。
        nodes:
          - select_episode_metadata
          - load_episode_metadata
          - confirm_episode_context
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - assign_assets_to_segments
          - assemble_storyboard_context
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述、审核提示词并生成目标分镜图像。
        nodes:
          - describe_panels
          - review_storyboard_prompt
          - extract_panel_image_urls
          - assemble_prompt_v2
          - generate_image_v2
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: system.user_input.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产ID
      storyboard_target:
        from_user: true
        schema:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
    outputs:
      type: object
      required: ["episode_asset_id"]
      properties:
        episode_asset_id:
          type: string
          minLength: 1
        storyboard_target:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: list
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                button_label: 选择集
                dialog_title: 选择集信息资产

  - id: load_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 读取集信息
    inputs:
      episode_asset_id:
        from: "$nodes.select_episode_metadata.output.episode_asset_id"
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        episode_asset_id:
          type: string
          minLength: 1
      additionalProperties: false

  - id: confirm_episode_context
    ref: system.human_approval.v1
    name: 确认集信息
    inputs:
      question:
        template: |
          请确认本次分镜生成使用的集信息。可以直接确认，也可以修改集名称、剧情概括、资产目录或原剧本内容后提交。

          集名称：
          {episode_name}

          集剧情概括：
          {episode_summary}

          资产目录：
          {asset_catalog}

          原剧本内容：
          {source_script}
        vars:
          episode_name:
            from: "$nodes.load_episode_metadata.output.episode_name"
          episode_summary:
            from: "$nodes.load_episode_metadata.output.episode_summary"
          asset_catalog:
            from: "$nodes.load_episode_metadata.output.asset_catalog"
          source_script:
            from: "$nodes.load_episode_metadata.output.source_script"
      episode_name:
        from_user: true
        schema:
          type: string
          minLength: 1
      episode_summary:
        from_user: true
        schema:
          type: string
      source_script:
        from_user: true
        schema:
          type: string
          minLength: 1
      background:
        from_user: true
        schema:
          type: string
          default: 水浒传
      asset_catalog:
        from_user: true
        schema:
          type: object
          additionalProperties: true
      storyboard_target:
        from_user: true
        required: false
        schema:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
    outputs:
      type: object
      required: ["episode_name", "source_script", "background", "asset_catalog", "storyboard_target"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
          default: 水浒传
        asset_catalog:
          type: object
          additionalProperties: true
        storyboard_target:
          type: object
          properties:
            segment_index:
              type: integer
              minimum: 0
              default: 0
            panel_index:
              type: integer
              minimum: 0
              default: 0
          additionalProperties: false
      additionalProperties: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.confirm_episode_context.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本分镜助手。请根据集资产目录和剧本段落，为每个分段分配实际出现或应作为参考的角色、地点和关键道具。
          只包含叙事段落中实际出现或直接影响画面的资产；仅在对话中提及但不在场的角色不要加入 characters。
      prompt:
        template: |
          请为以下剧本段落分配资产。

          剧本段落：
          {segments}

          集资产目录：
          {asset_catalog}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际出现角色数组，每个包含 full_name、image_ref、variant、image_url
          - key_props：关键道具数组

          image_ref 优先使用资产目录中已有的结构化图像引用；如果只有 asset_id，返回 {"kind":"asset","asset_id":"...","role":"reference"}。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_catalog:
            from: "$nodes.confirm_episode_context.output.asset_catalog"
          background:
            from: "$nodes.confirm_episode_context.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["full_name", "image_ref"]
                  properties:
                    full_name:
                      type: string
                      minLength: 1
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    variant:
                      type: string
                    image_url:
                      type: string
                    accessories:
                      type: array
                      items:
                        type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: assemble_storyboard_context
    ref: tool.assemble_storyboard_context.v1
    name: 组装分镜上下文
    inputs:
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
    outputs:
      type: object
      required: ["context_string"]
      properties:
        context_string:
          type: string
          minLength: 1
      additionalProperties: false

  - id: describe_panels
    ref: ai.deepseek_structured_json.v1
    name: 描述分镜画面
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是漫画分镜导演，请根据每个段落文本和资产分配，为每个段落设计分格画面。
          输出必须能直接用于后续图像提示词组装。
      prompt:
        template: |
          请根据上下文描述分镜画面。

          上下文：
          {segments_context}

          返回一个仅包含 segment_descriptions 的 JSON 对象。
          segment_descriptions 每项包含 index、segment_title、thinking、panels。
          每个 panel 必须包含 description、style、constraints，可选 character_focus、environment_details、shot_type、camera_angle、composition、lighting、mood、action、key_props、continuity_notes。
        vars:
          segments_context:
            from: "$nodes.assemble_storyboard_context.output.context_string"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_descriptions"]
      properties:
        segment_descriptions:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    character_focus:
                      type: string
                    environment_details:
                      type: string
                    shot_type:
                      type: string
                    camera_angle:
                      type: string
                    composition:
                      type: string
                    lighting:
                      type: string
                    mood:
                      type: string
                    action:
                      type: string
                    key_props:
                      type: string
                    continuity_notes:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: review_storyboard_prompt
    ref: system.human_approval.v1
    name: 审核分镜提示词
    inputs:
      question:
        template: |
          请审核以下分镜描述。

          段落分镜描述：
          {segment_descriptions}

          上下文：
          {context}
        vars:
          segment_descriptions:
            from: "$nodes.describe_panels.output.segment_descriptions"
          context:
            from: "$nodes.assemble_storyboard_context.output.context_string"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      corrections:
        from_user: true
        required: false
        schema:
          type: object
          additionalProperties: true
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        corrections:
          type: object
          additionalProperties: true
      additionalProperties: false

  - id: extract_panel_image_urls
    ref: ai.deepseek_structured_json.v1
    name: 提取分镜参考图
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是分镜数据提取助手，请从分镜描述和资产分配中提取目标分格的参考图和描述信息。
      prompt:
        template: |
          所有段落资产分配：
          {segment_assignments}

          所有段落分镜描述：
          {segment_descriptions}

          目标段落索引：{segment_index}
          目标分格索引：{panel_index}

          返回一个仅包含 panel_image_refs、image_refs、description、style、constraints 的 JSON 对象。
        vars:
          segment_assignments:
            from: "$nodes.assign_assets_to_segments.output.segment_assignments"
          segment_descriptions:
            from: "$nodes.describe_panels.output.segment_descriptions"
          segment_index:
            from: "$nodes.confirm_episode_context.output.storyboard_target.segment_index"
          panel_index:
            from: "$nodes.confirm_episode_context.output.storyboard_target.panel_index"
      max_attempts:
        value: 1
    outputs:
      type: object
      required: ["panel_image_refs", "image_refs", "description", "style", "constraints"]
      properties:
        panel_image_refs:
          type: array
          items:
            type: object
            required: ["full_name", "image_ref"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                additionalProperties: false
              variant:
                type: string
            additionalProperties: false
        image_refs:
          type: array
          items:
            type: object
            required: ["kind"]
            properties:
              kind:
                type: string
                enum: ["asset", "data_uri"]
              asset_id:
                type: string
                minLength: 1
              data:
                type: string
                minLength: 1
              role:
                type: string
            additionalProperties: false
        description:
          type: string
          minLength: 1
        style:
          type: string
          minLength: 1
        constraints:
          type: string
          minLength: 1
      additionalProperties: false

  - id: assemble_prompt_v2
    ref: tool.storyboard_prompt_assembler.v1
    name: 组装生图提示词
    inputs:
      description:
        from: "$nodes.extract_panel_image_urls.output.description"
      style:
        from: "$nodes.extract_panel_image_urls.output.style"
      constraints:
        from: "$nodes.extract_panel_image_urls.output.constraints"
      generation_rules:
        value: |
          风格指令：参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量漫画。
          角色一致性：保持参考图人物比例、武器和关键服饰一致。
          时代背景：中国古代，以水浒传为背景。
          透视与构图：强纵深、前中后景分层、漫画分格画面。
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, realistic, legs, feet, shoes
      image_refs:
        from: "$nodes.extract_panel_image_urls.output.image_refs"
    outputs:
      type: object
      required: ["prompt", "negative_prompt", "image_refs", "aspect_ratio", "resolution"]
      properties:
        prompt:
          type: string
          minLength: 1
        negative_prompt:
          type: string
          minLength: 1
        image_refs:
          type: array
          items:
            type: object
            required: ["kind"]
            properties:
              kind:
                type: string
                enum: ["asset", "data_uri"]
              asset_id:
                type: string
              data:
                type: string
              role:
                type: string
            additionalProperties: false
        aspect_ratio:
          type: string
          minLength: 1
        resolution:
          type: string
          minLength: 1
      additionalProperties: false

  - id: generate_image_v2
    ref: ai.runninghub_image_to_image.v1
    name: 生成分镜图像
    inputs:
      prompt:
        from: "$nodes.assemble_prompt_v2.output.prompt"
      image_refs:
        from: "$nodes.assemble_prompt_v2.output.image_refs"
      aspect_ratio:
        from: "$nodes.assemble_prompt_v2.output.aspect_ratio"
      resolution:
        from: "$nodes.assemble_prompt_v2.output.resolution"
      negative_prompt:
        from: "$nodes.assemble_prompt_v2.output.negative_prompt"
      poll_interval_seconds:
        value: 2
      poll_timeout_seconds:
        value: 720
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
              output_type:
                type: string
                minLength: 1
            additionalProperties: false
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 审核分镜图像
    inputs:
      question:
        template: |
          请审核生成的分镜图像。

          图像 URL：
          {image_url}

          使用提示词：
          {prompt}

          分格描述：
          {description}
        vars:
          image_url:
            from: "$nodes.generate_image_v2.output.image_url"
          prompt:
            from: "$nodes.assemble_prompt_v2.output.prompt"
          description:
            from: "$nodes.extract_panel_image_urls.output.description"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      selected_image_url:
        from_user: true
        required: false
        schema:
          type: string
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        selected_image_url:
          type: string
        revision_notes:
          type: string
      additionalProperties: false

edges:
  - from: START
    to: select_episode_metadata
  - from: select_episode_metadata
    to: load_episode_metadata
  - from: load_episode_metadata
    to: confirm_episode_context
  - from: confirm_episode_context
    to: split_script
  - from: split_script
    to: assign_assets_to_segments
  - from: assign_assets_to_segments
    to: assemble_storyboard_context
  - from: assemble_storyboard_context
    to: describe_panels
  - from: describe_panels
    to: review_storyboard_prompt
  - from: review_storyboard_prompt
    to: extract_panel_image_urls
  - from: extract_panel_image_urls
    to: assemble_prompt_v2
  - from: assemble_prompt_v2
    to: generate_image_v2
  - from: generate_image_v2
    to: review_storyboard_image
  - from: review_storyboard_image
    to: END
