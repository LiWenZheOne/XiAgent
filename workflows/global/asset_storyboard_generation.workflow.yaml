        value: |
          你是一位专业的分镜脚本师，请基于以下剧本段落和已确定的分镜计划，为我生成漫画分镜画面描述。

          ## 输入
          段落索引：{index}
          段落标题：{segment_title}
          原文：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          关键道具：{key_props}

          场景布局：
          {scene_layout}

          分格计划：
          {panel_plan}

          ## 要求
          - 只生成分镜画面描述，不要生成图像；描述时从宏观到微观，确保画面整体性和合理性。
          - 漫画为一页，根据 panel_plan.panel_count 和 panel_plan.panels 生成对应数量的分格；如果有多个分格，需要在 image_prompt 开头说明整页分格布局，分格大小不要完全一样，不要平均，富有设计感。
          - 每格内容必须严格对应 panel_plan.panels 中的 description，不新增分格、不删除分格、不合并分格、不重排分格。
          - 描述中不需要包含对话，不包含角色的服装、外貌描写。
          - 不要有任何腿部、脚部、鞋履相关描述，并注意标注角色朝向，例如面对镜头、背对镜头、侧身朝向某人或某物。
          - 画面中只能出现上述在场角色，不得描写或提及不在场角色。
          - 如果必须出现复数形式的次要角色，先确定次要角色的数量，并给每个次要角色一个编号命名，每个次要角色分别描述动作。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          {material_rule}
          {enrich_rule}

          ## 核心原则

          ### 先定分格布局，再定逐格镜头
          先根据 panel_plan.panel_count 和 panel_plan.panels.description 设计整页分格布局：一共有几个分格、每格大致大小、形状、位置和阅读顺序。多格时不要平均切分，分格大小和形状要服务动作轻重、节奏和视觉重点。

          ### 再为每格确定镜头语言
          确定整页布局后，再逐格设计视角、景别、透视和构图。每格都必须标注机位、角度、景别和透视关系；特别强调镜头角度，多使用仰视、俯视、大透视等冲击力较强的镜头，利用前后景突出透视。

          ### 禁止默认构图
          不得无理由使用正中平视、角色左右对称等缺乏设计感的构图。每个镜头都必须有明确的视觉意图。不要在描述中写预示等未发生的事。

          ## 思维链自审清单（在 think 中逐项回答）

          ### 1. 分格布局审查：先设计整页节奏
          根据 panel_plan，一共有几个分格？每格大小、形状、位置和阅读顺序如何安排？多格时哪一格最大、哪一格最小，为什么这样安排能服务动作轻重和叙事节奏？

          ### 2. 镜头设计审查：逐格确定视角、景别、透视、构图
          每个分格分别采用什么机位、角度、景别、透视和构图？是否避免默认正中平视和左右对称？镜头如何让主体、动作方向和画面重心更清楚？

          ### 3. 深度审查：打破平面感
          这个画面的前景、中景、背景分别由什么具体的物理层级构成？能否在镜头最前方放一个遮挡物，例如梁柱、纱幔，来增加窥视感和空间深度？

          ### 4. 细节审查：会说话的物件
          除了角色，环境中还有哪些能暗示角色身份、地位或当前心境的特定陈设，例如磨损的地砖、缭绕的青烟、案头散乱的文书？{material_thinking}

          ### 5. 光影审查：光线如何刻画冲突
          画面中是否存在两种不同属性的光源，例如冷色晨光和暖色烛火？光影在主体上投下了怎样的阴影？这些明暗对比如何引导观众的第一眼视觉落点？

          ### 6. 动态审查：定格在哪一个瞬间
          这是一个死的静止时刻，还是一个活的爆发瞬间？动作是否引发了物理上的扰动，例如飘动的流苏、飞溅的灰尘、紧绷的指节？重力或惯性在画面中是否有迹可循？

          ### 7. 情绪审查：镜头角度的潜台词
          当前的视角，例如极仰、极俯、倾斜，赋予了角色怎样的心理状态？画面的留白方向是否符合角色的视线引导？
          {enrich_thinking}

          ## 输出 JSON
          {
            "think": "按思维链逐项回答",
            "image_prompt": "先说明一共有几个分格，以及多格时的整页布局；然后根据思维链内容生成详细且自然的分镜画面描述文本。描述整体、流畅、画面完整、内容统一，每格最后描述氛围。"
          }

      prompt_fields:
        value: ["index", "segment_title", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout", "panel_plan", "review", "review_history"]
