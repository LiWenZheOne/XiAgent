  - id: review_and_refine_image_prompt
    ref: ai.storyboard_review_refine.v1
    name: 审查并修订画面提示词
    inputs:
      items:
        from: "$nodes.convert_storyboard_plan_to_image_prompt.output.results"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      review_system:
        value: |
          仅返回合法 JSON。你是画面提示词质量监督，只做轻量审查：提示词是否忠于 scene_layout 和 panel_plan，是否越界加入不该出现的内容。
          你按与“转换画面提示词”相同的画面提示词标准审查和修订，但职责边界只限于 image_prompt 写得对不对；不评价 panel_plan 好不好，不重新设计分镜，不添加画风、质量词、模型参数、负面提示词或参考图规则。
      review_prompt_template:
        value: |
          请审查当前分段的 image_prompt。

          当前段落：{item.paragraph_text}
          场景布局：{source.scene_layout}
          分格计划：{source.panel_plan}
          画面提示词：{source.image_prompt}

          画面提示词标准：
          - 只把已通过审查的 scene_layout 和 panel_plan 转换为完整 image_prompt，不重新设计分镜。
          - image_prompt 必须完整覆盖 panel_plan.panels 的每一格，分格数量、分格编号、阅读顺序和逐格内容必须与 panel_plan.panels 一一对应。
          - 如果 panel_plan 只有 1 格，只能写单个大分格或单格整页，不得因为段落信息多而拆成多格。
          - 每格必须写清主体动作、场景空间、构图镜头、光影氛围、运动张力和分格衔接。
          - 每格必须明确画面元素的位置和占比：前景、中景、背景分别占画面多少，主体在画面哪个区域，角色朝向哪里，道具与人物、门窗、桌案、道路、林木等空间边界的相对位置如何。
          - 不改变 panel_plan 中的事件、角色、地点、道具、分格数量、分格顺序或因果关系。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          - 输出必须是纯自然语言画面内容字符串，不使用 Markdown 标题或列表，不写成摘要。

          审查边界：
          - 只检查 image_prompt 是否符合画面提示词标准。
          - 不评价 panel_plan 本身是否最佳，不改变分格数量，不重设镜头设计，不重新判断剧本切段或资产分配。
          - 如果 panel_plan 本身不理想，也必须以它为既定事实；只指出 image_prompt 与 panel_plan 不一致、遗漏、越界或写得不完整的问题。

          审查问题：
          1. image_prompt 是否先用自然语言概括当前段落的可见事件、主要行动和情绪方向，并让后续逐格描述围绕同一画面目标展开？如只是散乱罗列，应补足整体情节方向。
          2. image_prompt 声明的分格数量是否严格等于 panel_plan.panel_count 或 panel_plan.panels 的实际数量？如果 panel_plan 只有 1 格，是否只写单个大分格或单格整页，而没有拆成多格？
          3. 每格出现的角色是否逐格对应 panel_plan，且只来自当前段落在场资产？如新增不在场角色、漏掉应出现角色，或把地点名中的人名误当角色，应按 panel_plan 修正。
          4. 整页格子布局、阅读顺序、格子大小和视觉节奏是否忠于 panel_plan？如改变分格数量、分格顺序、合并、拆分或重排分格，应改回与 panel_plan.panels 一一对应。
          5. image_prompt 是否完整覆盖所有分格，并按阅读顺序完整描述每格的主体动作、空间层级、构图镜头、光影氛围、运动张力和分格衔接？如只写摘要、关键词或局部画面，应补成完整自然语言画面内容。
          6. 每格是否说清楚画面中哪里有什么：前景、中景、背景各占画面大约多少，主体位于画面左/右/中央或上下哪个区域，角色面对镜头/背对镜头/侧对镜头或朝向哪里？
          7. 道具与角色、门窗、桌案、道路、林木等空间边界的相对位置是否清楚，并与 scene_layout 保持一致？如位置关系含糊或矛盾，应按 scene_layout 和 panel_plan 收束。
          8. 每个镜头、空间和运动描述是否能看出画面目的：服务主体、动作方向、情绪变化、关系变化或画面重心？如只是罗列术语，应改为可见且有叙事作用的描述。
          9. 是否忠于 scene_layout 和 panel_plan，没有改变事件、角色、地点、道具、分格数量、分格顺序或因果关系？如有改写过度，应回到既定计划，不重新设计分镜。
          10. 是否加入了画风、质量词、模型参数、负面提示词、角色一致性固定约束、参考图规则或程序化说明？如出现，应删除。
          11. 是否出现不在场角色、未提供道具、腿部、脚部或鞋履描述？如出现，应删除越界对象；腿脚鞋履应改用身体朝向、上半身动作、衣摆、武器、遮挡物或地面痕迹表达动作方向和受力关系。

          如果全部合格，passed=true。否则 passed=false，并给出可执行的修改意见。
          输出中的 think 写完整推理过程。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "passed": false,
            "issues": ["需要修订的问题"],
            "revision_instructions": "给修订节点的具体修改意见",
            "revision_summary": "本轮审查结论摘要"
          }
      revision_system:
        value: |
          仅返回合法 JSON。你是画面提示词编辑，只根据审查意见重新生成完整分段的 image_prompt。
          修订必须遵守与“转换画面提示词”相同的画面提示词标准；不改变 scene_layout、panel_plan、原剧本事件、角色、地点或道具；不添加画风、质量词、模型参数、负面提示词或参考图规则。
      revision_prompt_template:
        value: |
          请根据审查意见重新生成画面内容，只返回需要修订的字段。

          当前分段对象：
          {source}

          修改意见：
          {review.revision_instructions}

          画面提示词标准：
          - 只把已通过审查的 scene_layout 和 panel_plan 转换为完整 image_prompt，不重新设计分镜。
          - image_prompt 必须完整覆盖 panel_plan.panels 的每一格，分格数量、分格编号、阅读顺序和逐格内容必须与 panel_plan.panels 一一对应。
          - 如果 panel_plan 只有 1 格，只能写单个大分格或单格整页，不得因为段落信息多而拆成多格。
          - 每格必须写清主体动作、场景空间、构图镜头、光影氛围、运动张力和分格衔接。
          - 每格必须明确画面元素的位置和占比：前景、中景、背景分别占画面多少，主体在画面哪个区域，角色朝向哪里，道具与人物、门窗、桌案、道路、林木等空间边界的相对位置如何。
          - 不改变 panel_plan 中的事件、角色、地点、道具、分格数量、分格顺序或因果关系。
          - 不新增不在场角色、未提供地点、未提供道具或未发生事件。
          - 不写画风、质量词、模型参数、负面词、参考图规则、角色一致性固定约束或程序化说明。
          - 输出必须是纯自然语言画面内容字符串，不使用 Markdown 标题或列表，不写成摘要。

          修订要求：
          1. 只返回 think 和 image_prompt；
          2. 身份字段、场景布局和分镜计划会由程序从原始分段对象继承，不要尝试改写。
          3. 重新生成完整的 image_prompt；不能只修正局部，不能压缩成短摘要，不能删减原有分格内容，必须重新覆盖 panel_plan.panels 的全部分格。
          4. 修订时应让主体、动作、空间、镜头、光影、运动和分格衔接都服务明确的画面目的。
          5. 不改变分镜计划，不加入固定风格、一致性约束、质量词、负面词、模型参数或参考图规则；发现越界内容时删除或收束为当前计划允许的可见画面。

          目标 JSON 示例：
          {
            "think": "完整推理过程",
            "image_prompt": "重新生成后的完整自然语言画面内容提示词，仍按整体情节、分格数量、每格角色、整页格子布局、逐格画面描述的顺序书写。"
          }
      review_output_field:
        value: prompt_review
      review_history_output_field:
        value: prompt_review_history
      required_input_fields:
        value: ["scene_layout", "panel_plan", "image_prompt"]
      max_revision_rounds:
        value: 1
      max_attempts:
        value: 2
      continue_on_item_error:
        value: true
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            oneOf:
              - type: object
                required: ["index", "segment_title", "paragraph_text", "panel_count", "present_characters", "location", "key_props", "segment_assignment", "scene_layout", "panel_plan", "think", "image_prompt", "prompt_review", "prompt_review_history"]
                properties:
                  index:
                    type: integer
                    minimum: 0
                  segment_title:
                    type: string
                  paragraph_text:
                    type: string
                  panel_count:
                    type: string
                  present_characters:
                    type: array
                    items:
                      type: string
                  location:
                    type: string
                  key_props:
                    type: array
                    items:
                      type: string
                  segment_assignment:
                    type: object
                    additionalProperties: true
                  scene_layout:
                    type: object
                    additionalProperties: true
                  panel_plan:
                    type: object
