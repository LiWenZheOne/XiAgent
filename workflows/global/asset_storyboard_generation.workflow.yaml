          请为以下角色变体上传/关联图像。

          角色信息：
          {characters}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          图像上传规格：
          - 格式：PNG 或 JPG
          - 建议分辨率：2K（2048×2048 或更高）
          - 宽高比：建议 1:1（正方形）
          - 文件大小：单个文件不超过 10MB

          变体图像命名规范：{{角色名}}_{{变体名}}.

        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_result:
            from: "$nodes.match_variants.output.results"
