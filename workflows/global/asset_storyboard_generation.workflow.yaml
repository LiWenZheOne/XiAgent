      required: ["decision", "asset_images"]
      properties:
        decision:
          type: string
          enum: ["finish", "generate_missing"]
        asset_images:
          type: array
          items:
            type: object
            required: ["asset_type", "asset_key", "image_url"]
            properties:
              asset_type:
                type: string
                minLength: 1
              asset_key:
                type: string
                minLength: 1
              full_name:
                type: string
              image_url:
                type: string
                minLength: 1
              asset_id:
                type: string
              source:
                type: string
            additionalProperties: true
        target_asset_key:
          type: string
        prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.asset_image_cards.v1
          variant: grouped_cards
          mode: interactive

  # ===== 自动生成路径：提示词生成 =====

  - id: generate_prompt_v2
    ref: ai.deepseek_structured_json.v1
    name: 生成资产设定提示词
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位资产设定提示词专家。本节点只输出文本提示词和参考图 URL，不输出图像结果、Markdown 图片或 HTML。
          角色资产提示词用于生成稳定角色设定，不用于生成某个剧情镜头。
          角色提示词只能描述服装、外貌、发型、体貌、身份识别特征和必要随身配件。
          角色提示词不得包含动作、姿态、表情、镜头调度、场景气氛、正在发生的剧情、受伤/疲惫/奔跑/打斗等临时状态。
          对比角色设定与默认变体状态，只保留稳定造型差异；临时情景信息只能用于判断应排除哪些内容，不能写入 prompt。
          提示词格式：请将图中角色的xx改成xx，保持风格和其它特征不变。
          必须先输出 think（思考过程），再输出 prompt（最终提示词）。
          对所有角色进行批量处理，不能遗漏任何角色。
      prompt:
        template: |
          请为以下所有需要补图的角色、地点和道具生成图生图修改提示词。

          剧本内容：
          {script}

          角色列表：
          {characters}

          审核确认后的资产列表：
          {approved_assets}

          变体匹配结果（含默认变体状态）：
          {variant_results}

          配件检查结果：
          {accessory_results}

          地点匹配汇总：
          {enriched_scenes}

          道具匹配汇总：
          {enriched_props}

          需要生成图像的资产列表（每项已包含 reference_image_ref）：
          {assets_for_generation}

          返回一个仅包含一个根键的 JSON 对象：
          - prompt_results：数组，每个需要图像的资产一条记录

          每条记录必须包含：
          - full_name：资产名称
          - think：思考过程，逐项对比稳定设定差异，列出要添加/去除/修改的部分；不要把剧情动作、受伤、奔跑、打斗等临时状态当成角色设定
          - prompt：最终文本提示词。角色只写服装、外貌、发型、体貌、身份识别特征和必要随身配件；不得写动作、姿态、表情、场景、剧情、受伤或其他临时状态；不得输出图片、图片链接、Markdown 或 HTML
          - reference_image_ref：结构化参考图对象，必须原样复制对应资产的 reference_image_ref；不得输出任何 URL 字段。

          根层级除 prompt_results 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_asset_storyboard_input.output.script"
          characters:
            from: "$nodes.extract_characters.output.characters"
          approved_assets:
            from: "$nodes.review_assets.output.approved_assets"
          variant_results:
            from: "$nodes.match_variants.output.results"
          accessory_results:
            from: "$nodes.check_accessories.output.results"
          enriched_scenes:
            from: "$nodes.enrich_scenes.output.characters"
          enriched_props:
            from: "$nodes.enrich_props.output.characters"
          assets_for_generation:
            from: "$nodes.filter_assets_for_generation.output.approved_assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["prompt_results"]
      properties:
        prompt_results:
          type: array
          items:
            type: object
            required: ["full_name", "think", "prompt", "reference_image_ref"]
            properties:
              full_name:
                type: string
                minLength: 1
              think:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              reference_image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: prepare_asset_images
    ref: tool.complete_asset_images.v1
    name: 筛选未上传图像
    inputs:
      decision:
        from: "$nodes.upload_images.output.decision"
      prompt_results:
        from: "$nodes.upload_images.output.prompt_results"
      manual_images:
        from: "$nodes.upload_images.output.asset_images"
      target_asset_key:
        from: "$nodes.upload_images.output.target_asset_key"
    outputs:
      type: object
      required: ["asset_images", "missing_prompt_results", "missing_count", "next_action"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_count:
          type: integer
          minimum: 0
        next_action:
          type: string
          enum: ["finish", "generate_missing"]
      additionalProperties: false

  # ===== 生成未上传图像 =====

  - id: generate_missing_asset_images
    ref: ai.runninghub_image_to_image.v2
    name: 生成未上传资产图像
    inputs:
      prompt_results:
        from: "$nodes.prepare_asset_images.output.missing_prompt_results"
      aspect_ratio:
        value: "1:1"
      resolution:
        value: "2k"
    outputs:
      type: object
      required: ["asset_images"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                minLength: 1
              runninghub_task_id:
                type: string
            additionalProperties: true
      additionalProperties: false

  # ===== 合并资产图像（上传/补生成） =====

  - id: merge_completed_asset_images
    ref: tool.complete_asset_images.v1
    name: 合并资产图像
    inputs:
      decision:
        value: "finish"
      prompt_results:
        from: "$nodes.generate_prompt_v2.output.prompt_results"
      manual_images:
        from: "$nodes.prepare_asset_images.output.asset_images"
      auto_images:
        from: "$nodes.generate_missing_asset_images.output.asset_images"
    outputs:
      type: object
      required: ["asset_images", "missing_prompt_results", "missing_count", "next_action"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_prompt_results:
          type: array
          items:
            type: object
            additionalProperties: true
        missing_count:
          type: integer
          minimum: 0
        next_action:
          type: string
          enum: ["finish", "generate_missing"]
      additionalProperties: false

  # ===== 剧本拆分 =====

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.collect_asset_storyboard_input.output.script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色资产分配到段落 =====

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本分镜助手。请根据角色资产图像和剧本段落，判断每个段落中出现的角色和关键道具。
          只包含在叙事段落中实际出现的角色。仅在对话中提及的角色不算。
          使用角色全名与资产列表进行匹配。如果一个角色在多个段落中持续出现，每个段落都要记录。
      prompt:
        template: |
          请为以下剧本段落分配角色资产。

          剧本段落（含段落索引）：
          {segments}

          可用角色资产图像（含全名与结构化图像引用）：
          {asset_images}

          世界背景（原作）：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引（整数，与输入段落对应）
          - characters：该段落中出现的角色数组，每个包含 full_name、image_ref、variant
          - key_props：关键道具数组（字符串，无道具时为空数组）

          根层级除 segment_assignments 外不得包含其他键。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_images:
            from: "$nodes.merge_completed_asset_images.output.asset_images"
          background:
            from: "$nodes.collect_asset_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              characters:
                type: array
                items:
                  type: object
                  required: ["full_name", "image_ref"]
                  properties:
                    full_name:
                      type: string
                      minLength: 1
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    variant:
                      type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 上下文组装 =====

  - id: assemble_storyboard_context
    ref: tool.assemble_storyboard_context.v1
    name: 组装分镜上下文
    inputs:
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      background:
        from: "$nodes.collect_asset_storyboard_input.output.background"
    outputs:
      type: object
      required: ["context_string"]
      properties:
        context_string:
          type: string
          minLength: 1
      additionalProperties: false

  # ===== 分镜描述 =====

  - id: describe_panels
    ref: ai.deepseek_structured_json.v1
    name: 描述分镜画面
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位专业的分镜设计师。
          核心原则：
          - 先读情绪，再选镜头语言。选择能够放大场景核心情绪的拍摄角度、景别与透视。
          - 拒绝默认构图：避免中心对称、平面布局或懒惰对称。
          - 每个分格必须有明确的视觉意图。
          - 不要描写对话、服装或角色的外貌特征。
          - 禁止出现腿部相关描写。标注角色朝向镜头/背向镜头。
          - 仅在场角色可出现在分格中；缺席角色不得被提及。
          - 使用现在时。禁止未来时或"预示"类描写。
          自检清单（在 thinking 中回答）：纵深层次、叙事道具、光影冲突、动态瞬间捕捉、角度潜台词。
      prompt:
        template: |
          为以下所有段落设计分镜。返回一个仅包含一个根键的 JSON 对象：
          - segment_descriptions：段落描述对象数组，按段落顺序排列，每个段落一个

          每个段落描述对象必须包含：
          - index：整数（段落索引，从 0 开始）
          - segment_title：本段落的简短标题
          - thinking：字符串（对本段的自检推理）
          - panels：分格对象数组

          每个分格对象必须包含：
          - description：字符串（分格视觉描述）
          - style：字符串（艺术风格描述）
          - constraints：字符串（技术约束）

          每个分格对象还可以使用以下键：
          - character_focus
          - environment_details
          - shot_type
          - camera_angle
          - composition
          - lighting
          - mood
          - action
          - key_props
          - continuity_notes

          根层级除 segment_descriptions 外不得包含其他键。
          分格对象不得包含上述以外的其他键。

          上下文（含段落文本、角色分配、世界背景）：
          {segments_context}
        vars:
          segments_context:
            from: "$nodes.assemble_storyboard_context.output.context_string"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_descriptions"]
      properties:
        segment_descriptions:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "panels"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              panels:
                type: array
                items:
                  type: object
                  required: ["description", "style", "constraints"]
                  properties:
                    description:
                      type: string
                      minLength: 1
                    style:
                      type: string
                      minLength: 1
                    constraints:
                      type: string
                      minLength: 1
                    character_focus:
                      type: string
                      minLength: 1
                    environment_details:
                      type: string
                      minLength: 1
                    shot_type:
                      type: string
                      minLength: 1
                    camera_angle:
                      type: string
                      minLength: 1
                    composition:
                      type: string
                      minLength: 1
                    lighting:
                      type: string
                      minLength: 1
                    mood:
                      type: string
                      minLength: 1
                    action:
                      type: string
                      minLength: 1
                    key_props:
                      type: string
                      minLength: 1
                    continuity_notes:
                      type: string
                      minLength: 1
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  # ===== 分镜审核 =====

  - id: review_storyboard_prompt
    ref: system.human_approval.v1
    name: 审核分镜提示词
    inputs:
      question:
        template: |
          请审核以下分镜描述。

          段落分镜描述（含分格设计、镜头语言）：
          {segment_descriptions}

          角色资产参考图像：
          {asset_images}

          上下文（段落文本、角色分配、背景）：
          {context}

          请确认分镜描述是否合理，或提供修改意见。

          输出格式（严格 JSON）：
          {{"decision": "approve 或 reject", "corrections": {{"corrected_prompt": "修改后的提示词", "corrected_image_refs": ["修正后的结构化参考图数组"]}}}}
        vars:
          segment_descriptions:
            from: "$nodes.describe_panels.output.segment_descriptions"
          asset_images:
            from: "$nodes.merge_completed_asset_images.output.asset_images"
          context:
            from: "$nodes.assemble_storyboard_context.output.context_string"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved:
        from_user: true
        required: false
        schema:
          type: boolean
      comment:
        from_user: true
        required: false
        schema:
          type: string
      corrections:
        from_user: true
        required: false
        schema:
          type: object
          properties:
            corrected_prompt:
              type: string
            corrected_image_refs:
              type: array
              items:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                additionalProperties: false
          additionalProperties: false
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        corrections:
          type: object
          properties:
            corrected_prompt:
              type: string
            corrected_image_refs:
              type: array
              items:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  # ===== 提取目标分格的参考图 =====

  - id: extract_panel_image_urls
    ref: ai.deepseek_structured_json.v1
    name: 提取分镜参考图
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是分镜数据提取助手。
          请从分镜描述和角色资产分配中提取目标分格的结构化参考图，并保留分格描述信息。
          只返回目标段落和目标分格的数据。
      prompt:
        template: |
          请提取目标分格的结构化参考图和描述信息。

          所有段落的角色资产分配：
          {segment_assignments}

          所有段落的分镜描述：
          {segment_descriptions}

          目标段落索引：{segment_index}
          目标分格索引：{panel_index}

           返回一个仅包含一个根键的 JSON 对象：
           - panel_image_refs：目标分格中出现的角色参考图数组，每个包含 full_name、image_ref、variant
           - image_refs：所有 panel_image_refs 中 image_ref 的结构化对象数组
           - description：目标分格的视觉描述（字符串）
           - style：目标分格的艺术风格（字符串）
           - constraints：目标分格的技术约束（字符串）

           根层级除 panel_image_refs、image_refs、description、style、constraints 外不得包含其他键。
          如果目标段落索引或分格索引超出范围，返回空数组和空字符串。
        vars:
          segment_assignments:
            from: "$nodes.assign_assets_to_segments.output.segment_assignments"
          segment_descriptions:
            from: "$nodes.describe_panels.output.segment_descriptions"
          segment_index:
            from: "$nodes.collect_asset_storyboard_input.output.storyboard_target.segment_index"
          panel_index:
            from: "$nodes.collect_asset_storyboard_input.output.storyboard_target.panel_index"
      max_attempts:
        value: 1
    outputs:
      type: object
      required: ["panel_image_refs", "image_refs", "description", "style", "constraints"]
      properties:
        panel_image_refs:
          type: array
          items:
            type: object
            required: ["full_name", "image_ref"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                additionalProperties: false
              variant:
                type: string
            additionalProperties: false
        image_refs:
          type: array
          items:
            type: object
            required: ["kind"]
            properties:
              kind:
                type: string
                enum: ["asset", "data_uri"]
              asset_id:
                type: string
                minLength: 1
              data:
                type: string
                minLength: 1
              role:
                type: string
            additionalProperties: false
        description:
          type: string
          minLength: 1
        style:
          type: string
          minLength: 1
        constraints:
          type: string
          minLength: 1
      additionalProperties: true

  # ===== 提示词组装 =====

  - id: assemble_prompt_v2
    ref: tool.storyboard_prompt_assembler.v1
    name: 组装生图提示词
    inputs:
      description:
        from: "$nodes.extract_panel_image_urls.output.description"
      style:
        from: "$nodes.extract_panel_image_urls.output.style"
      constraints:
        from: "$nodes.extract_panel_image_urls.output.constraints"
      generation_rules:
        value: |
          风格指令
          参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量、细节丰富、富有张力的漫画。
          - 线条：典型的矢量图风格，干净且流畅，轮廓线利落。
          - 色彩：无复杂渐变，纯色块填充为主，阴影较浅，边缘锐利，阴影偏冷色调，软 cel shading。
          - 角色体型：所有角色都是胶囊形设计（达摩式 / 蛋形），下半身是个球，没有腿。
          - 透视：strict perspective with foreshortening，近大远小，强纵深（depth of field），layered foreground-midground-background composition。
          - 风格标签：digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality, 8k。
          角色一致性约束
          - 保持人物武器和参考完全一致。
          - 人物比例不变。
          - 所有角色为达摩/不倒翁体型：上半身正常比例，下半身为圆润饱满的半球形底部。
          - 完全没有腿部、没有膝盖、没有脚踝、没有足部。
          时代背景约束
          - 时代背景在中国古代，以水浒传为背景。
          - 根据时代背景和当前情景设计环境和物件。
          - 装饰和场景内的物体丰富，并与角色风格一致。
          透视与空间约束
          - 严格遵守近大远小的透视关系。
          - 透视线体现强烈的空间纵深感。
          - 前景遮挡感强烈。
          - 每个分格的消失点必须统一。
          - 多分格页面：采用不规则的梯形与矩形组合排版，打破平庸的视觉节奏。
          场景比例约束
          - 场景建筑比例符合 chibi style（不追求写实建筑比例）。
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, ugly, bad proportions, deformed, realistic, gradient shading, complex textures, red lines, guidelines, nose, legs, feet, ankles, knees, thighs, calves, toes, footwear, shoes, boots, sandals, photorealistic, flat composition, no depth
      image_refs:
        from: "$nodes.extract_panel_image_urls.output.image_refs"
    outputs:
      type: object
      required: ["prompt", "negative_prompt", "image_refs", "aspect_ratio", "resolution"]
      properties:
        prompt:
          type: string
          minLength: 1
        negative_prompt:
          type: string
          minLength: 1
        image_refs:
          type: array
          items:
            type: object
            required: ["kind"]
            properties:
              kind:
                type: string
                enum: ["asset", "data_uri"]
              asset_id:
                type: string
                minLength: 1
              data:
                type: string
                minLength: 1
              role:
                type: string
            additionalProperties: false
        aspect_ratio:
          type: string
          minLength: 1
        resolution:
          type: string
          minLength: 1
      additionalProperties: false

  # ===== 图像生成 =====

  - id: generate_image_v2
    ref: ai.runninghub_image_to_image.v1
    name: 生成分镜图像
    inputs:
      prompt:
        from: "$nodes.assemble_prompt_v2.output.prompt"
      image_refs:
        from: "$nodes.assemble_prompt_v2.output.image_refs"
      aspect_ratio:
        from: "$nodes.assemble_prompt_v2.output.aspect_ratio"
      resolution:
        from: "$nodes.assemble_prompt_v2.output.resolution"
      negative_prompt:
        from: "$nodes.assemble_prompt_v2.output.negative_prompt"
      poll_interval_seconds:
        value: 2
      poll_timeout_seconds:
        value: 720
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
              output_type:
                type: string
                minLength: 1
            additionalProperties: false
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

  # ===== 分镜图像审核 =====

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 审核分镜图像
    inputs:
      question:
        template: |
          请审核生成的分镜图像。

          生成的分镜图像URL：
          {image_url}

          使用的提示词：
          {prompt}

          使用的角色参考图像：
          {reference_images}

          分格视觉描述：
          {description}

          请确认图像是否符合分镜要求，是否需要重新生成或调整。

          输出格式（严格 JSON）：
          {{"decision": "approve 或 reject", "selected_image_url": "选定的图像URL", "revision_notes": "修改说明"}}
        vars:
          image_url:
            from: "$nodes.generate_image_v2.output.image_url"
          prompt:
            from: "$nodes.assemble_prompt_v2.output.prompt"
          reference_images:
            from: "$nodes.extract_panel_image_urls.output.panel_image_refs"
          description:
            from: "$nodes.extract_panel_image_urls.output.description"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved:
        from_user: true
        required: false
        schema:
          type: boolean
      comment:
        from_user: true
        required: false
        schema:
          type: string
      selected_image_url:
        from_user: true
        required: false
        schema:
          type: string
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        selected_image_url:
          type: string
        revision_notes:
          type: string
      additionalProperties: false

