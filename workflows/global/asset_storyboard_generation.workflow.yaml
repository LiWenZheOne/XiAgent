workflow:
  id: asset_storyboard_generation
  version: "1.1.0"
  scope: global
  name: 分镜生成
  description: 从集元数据资产读取集名称、资产目录和原剧本内容，确认后拆分剧本、为分段分配资产并生成分镜图像。
  output_schema:
    type: object
    required: ["decision", "panel_results"]
    properties:
      decision:
        type: string
        enum: ["finish"]
      panel_results:
        type: array
        items:
          type: object
          additionalProperties: true
      revision_notes:
        type: string
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    stages:
      - id: p1_episode
        name: P1 集信息确认
        description: 选择集元数据资产后，直接展示集名称、剧情概括、原剧本和完整资产目录。
        nodes:
          - select_episode_metadata
      - id: p2_segments
        name: P2 分段资产分配
        description: 拆分剧本，并按每个分段分配在场资产。
        nodes:
          - split_script
          - prepare_storyboard_asset_index
          - assign_assets_to_segments
          - resolve_segment_image_refs
          - prepare_segment_storyboard_inputs
      - id: p3_storyboard
        name: P3 分镜生成
        description: 生成分镜描述，并在分镜汇总中审核提示词、参考图和目标分镜图像。
        nodes:
          - describe_panels
          - merge_segment_descriptions
          - review_storyboard_image
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: select_episode_metadata
    ref: tool.episode_metadata_from_asset.v1
    name: 选择集
    inputs:
      episode_asset_id:
        from_user: true
        schema:
          type: string
          minLength: 1
          title: 集信息资产
      no_material:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 禁止材质区分
          default: false
          description: 启用后，分镜画面描述不区分粗糙、丝滑、生锈等材质质感。
      enrich_description:
        from_user: true
        required: false
        schema:
          type: boolean
          title: 丰富画面描述
          default: false
          description: 启用后，在分镜设计中追加空间深度、物理反馈、建筑陈设、颗粒介质和琐碎叙事细节审查。
    outputs:
      type: object
      required: ["episode_name", "episode_summary", "source_script", "asset_catalog", "episode_asset_id"]
      properties:
        episode_name:
          type: string
          minLength: 1
        episode_summary:
          type: string
        source_script:
          type: string
          minLength: 1
        background:
          type: string
        asset_catalog:
          type: object
          additionalProperties: true
        asset_images:
          type: array
          items:
            type: object
        episode_asset_id:
          type: string
          minLength: 1
        storyboard_options:
          type: object
          properties:
            no_material:
              type: boolean
            enrich_description:
              type: boolean
          additionalProperties: false
      additionalProperties: false
    config:
      title: 选择集信息资产
      description: 选择资产库中带“集元数据”标签的集信息资产。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              episode_asset_id:
                control_id: ui.input.asset_picker.v1
                variant: dropdown
                mode: input
                asset_type: text
                filter_tag_names: ["集元数据"]
                placeholder: 请选择集信息资产
                preview_control_id: ui.display.episode_context.v1
      sections:
        input:
          wrapper: false
        output:
          remove: true
        events:
          visible: false

  - id: split_script
    ref: tool.script_split.v1
    name: 拆分剧本
    inputs:
      script:
        from: "$nodes.select_episode_metadata.output.source_script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
            required: ["index", "text", "panel_hint", "panel_count_min", "panel_count_max"]
            properties:
              index:
                type: integer
                minimum: 0
              text:
                type: string
                minLength: 1
              panel_hint:
                type: string
                minLength: 1
              panel_count_min:
                type: integer
                minimum: 1
              panel_count_max:
                type: integer
                minimum: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_storyboard_asset_index
    ref: tool.prepare_storyboard_asset_index.v1
    name: 准备分镜资产索引
    inputs:
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["asset_index"]
      properties:
        asset_index:
          type: object
          required: ["characters", "locations", "props"]
          properties:
            characters:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            locations:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
            props:
              type: array
              items:
                type: object
                required: ["asset_name"]
                properties:
                  asset_name:
                    type: string
                    minLength: 1
                  asset_type:
                    type: string
                    minLength: 1
                  aliases:
                    type: array
                    items:
                      type: string
                  summary:
                    type: string
                  description:
                    type: string
                additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: assign_assets_to_segments
    ref: ai.deepseek_structured_json.v1
    name: 分配段落资产
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是剧本连续性分析助手。请根据完整剧本分段和轻量资产索引，为每个分段判断实际在场或对当前场景有直接影响的角色、地点和关键道具。
          只判断剧情在场关系，不判断是否入画；入画选择交给后续分镜提示词生成步骤。
      prompt:
        template: |
          请为以下剧本段落整理轻量在场资产表。

          剧本段落：
          {segments}

          轻量资产索引：
          {asset_index}

          世界背景：
          {background}

          返回一个仅包含一个根键的 JSON 对象：
          - segment_assignments：数组，每个段落一条记录

          每条记录必须包含：
          - segment_index：段落索引
          - location：本段主要地点，没有则空字符串
          - time：本段时间，没有则空字符串
          - characters：本段实际在场或持续处于同一场景内的角色数组，每个只包含 asset_name、presence
          - key_props：本段实际出现或影响画面的关键道具名称数组

          角色判断规则：
          - presence 表示物理在场状态，取值 present、mentioned_only、absent、uncertain。
          - 角色在上一段进入同一场景、本段未离开，即使本段没有再次点名，也可以判断为 present。
          - 仅在对话中被提及、命令中被派遣、计划或回忆中出现的角色，presence=mentioned_only；如果不会影响当前画面，不要加入 characters。
          - 只使用轻量资产索引中的资产名称，不要创造新角色名、地点名或道具名。
          - 不要输出 reason、visibility、asset_type、asset_tags、asset_id、image_ref 或 image_url；后续工具节点会根据完整资产目录补全。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
          asset_index:
            from: "$nodes.prepare_storyboard_asset_index.output.asset_index"
          background:
            from: "$nodes.select_episode_metadata.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              location_asset:
                type: object
                required: ["asset_type", "asset_name", "image_ref"]
                properties:
                  asset_type:
                    type: string
                    minLength: 1
                  asset_name:
                    type: string
                    minLength: 1
                  asset_tags:
                    type: array
                    items:
                      type: string
                  image_ref:
                    type: object
                    required: ["kind"]
                    properties:
                      kind:
                        type: string
                        enum: ["asset", "data_uri"]
                      asset_id:
                        type: string
                        minLength: 1
                      data:
                        type: string
                        minLength: 1
                      role:
                        type: string
                    additionalProperties: false
                  image_url:
                    type: string
                additionalProperties: false
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_name", "presence"]
                  properties:
                    asset_name:
                      type: string
                      minLength: 1
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              prop_assets:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name", "image_ref"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  - id: resolve_segment_image_refs
    ref: tool.resolve_segment_image_refs.v1
    name: 补全段落参考图
    inputs:
      segment_assignments:
        from: "$nodes.assign_assets_to_segments.output.segment_assignments"
      asset_catalog:
        from: "$nodes.select_episode_metadata.output.asset_catalog"
    outputs:
      type: object
      required: ["segment_assignments"]
      properties:
        segment_assignments:
          type: array
          items:
            type: object
            required: ["segment_index", "characters", "key_props"]
            properties:
              segment_index:
                type: integer
                minimum: 0
              location:
                type: string
              time:
                type: string
              characters:
                type: array
                items:
                  type: object
                  required: ["asset_type", "asset_name"]
                  properties:
                    asset_type:
                      type: string
                      minLength: 1
                    asset_name:
                      type: string
                      minLength: 1
                    asset_tags:
                      type: array
                      items:
                        type: string
                    appearance_description:
                      type: string
                    presence:
                      type: string
                      enum: ["present", "mentioned_only", "absent", "uncertain"]
                    image_ref:
                      type: object
                      required: ["kind"]
                      properties:
                        kind:
                          type: string
                          enum: ["asset", "data_uri"]
                        asset_id:
                          type: string
                          minLength: 1
                        data:
                          type: string
                          minLength: 1
                        role:
                          type: string
                      additionalProperties: false
                    image_url:
                      type: string
                  additionalProperties: false
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_segment_storyboard_inputs
    ref: tool.prepare_segment_storyboard_inputs.v1
    name: 准备分段分镜输入
    inputs:
      source_script:
        from: "$nodes.select_episode_metadata.output.source_script"
      segments:
        from: "$nodes.split_script.output.segments"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_options:
        from: "$nodes.select_episode_metadata.output.storyboard_options"
    outputs:
      type: object
      required: ["items", "shared_context"]
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - index
              - paragraph_text
              - panel_count
              - present_characters
              - location
              - key_props
              - segment_assignment
            properties:
              index:
                type: integer
                minimum: 0
              paragraph_text:
                type: string
                minLength: 1
              panel_count:
                type: string
                minLength: 1
              present_characters:
                type: array
                items:
                  type: string
                  minLength: 1
              location:
                type: string
              key_props:
                type: array
                items:
                  type: string
                  minLength: 1
              segment_assignment:
                type: object
                additionalProperties: true
            additionalProperties: false
        shared_context:
          type: object
          required: ["full_script", "prompt_rules"]
          properties:
            full_script:
              type: string
              minLength: 1
            storyboard_options:
              type: object
              properties:
                no_material:
                  type: boolean
                enrich_description:
                  type: boolean
              additionalProperties: false
            prompt_rules:
              type: object
              required: ["material_rule", "enrich_rule", "material_thinking", "enrich_thinking"]
              properties:
                material_rule:
                  type: string
                enrich_rule:
                  type: string
                material_thinking:
                  type: string
                enrich_thinking:
                  type: string
              additionalProperties: false
          additionalProperties: false
      additionalProperties: false

  - id: describe_panels
    ref: ai.parallel_deepseek_structured_json.v1
    name: 描述分镜画面
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位专业的分镜脚本师。每次只为当前段落输出一段完整、详细、自然的漫画分镜描述。
          必须参考完整剧本理解剧情连续性，但描述内容只能依据当前段落、建议分格数、在场角色、地点和关键道具生成，不得扩写成其他段落剧情。
          描述分镜画面时，只写分段内容、在场角色、地点、道具和每个分格画面中实际出现的事物；不得包含画风、风格关键词、图像生成技术参数、模型参数、质量词或生成指令。
          画面中只能出现本段在场角色，不得描写或提及不在场角色；如果出现复数次要角色，必须先确定数量并编号，再分别描述动作。
      items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      prompt_template:
        value: |
          你是一位专业的分镜脚本师，请基于以下输入为我设计漫画的分镜描述。

          ## 输入
          完整剧本（仅用于理解剧情连续性，不得扩写当前段落之外的剧情）：
          {full_script}

          当前段落索引：{index}
          当前段落：{paragraph_text}
          建议分格数：{panel_count}
          本段在场角色：{present_characters}
          地点：{location}
          关键道具：{key_props}

          ## 要求
          - 只生成分镜描述，不要生成图像，描述时从宏观到微观，确保画面的整体性及合理性。
          - 漫画为一页，可以有多个分格；每个分格大小不要一样，不要平均，要富有设计感。
          - 根据建议分格数设计分格；description 必须先说明一共有几个分格和整体布局，再生成完整、流畅、统一的详细分镜画面描述。
          - 描述中不需要包含对话，不包含角色服装和外貌描写。
          - 不要有任何腿部、脚部、鞋履相关描述，并注意标注角色朝向，例如面对镜头、背对镜头或侧对镜头。
          - 画面中只能出现本段在场角色，不得描写或提及不在场角色。
          - 如果出现复数形式的次要角色，请先确定次要角色数量，并给每个次要角色编号命名，每个次要角色分别描述动作。
          - 严格按建议分格数设计分格；如果建议分格数为 1，只能写“单格整页”或“单个大分格”，不得写“跨页式分格”。
          - 每个分格必须先确定镜头位置、视线方向和空间关系，再描述前景、中景、背景；前景遮挡、人物站位、光线落点和视觉重心必须互相兼容，不能出现镜头角度与画面组织互相矛盾的描述。
          - 不得用“刚说出”“似乎刚陈述”“仿佛回应”等不可见的对话状态代替画面动作；只能描述当前画面中可见的姿态、视线、动作、物件和空间关系。
          - 地点名称中如果包含角色名，例如“某某庄院”“某某宅”“某某村”，应整体视为地点；不得把地点名中的角色名当作入画角色来描写动作或情绪。
          {material_rule}
          {enrich_rule}

          ## 核心原则
          ### 先读情绪，再定镜头
          设计每个镜头前，请依据水浒传对应章节的剧情，判断这场戏的核心情绪和情景，然后选择最能放大该情绪的镜头语言。一定要标注机位、角度、景别，特别强调镜头角度，多使用仰视、俯视、大透视等冲击力较强的镜头，并利用前后景突出透视。

          ### 禁止默认构图
          不得无理由使用正中平视、角色左右对称等缺乏设计感的构图。每个镜头都必须有明确的视觉意图。不要在描述中写预示等未发生的事。

          ## 分镜决策自审清单（写入 thinking）
          请输出简洁、可检查的分镜决策记录，不要写与画面无关的创作闲聊。thinking 用于帮助后续检查 description 是否合理；最终 description 必须只保留自然、完整、可见的画面描述。

          ### A. 整体分格设计
          1. 当前段落的核心剧情动作是什么？观众看完这一页应获得什么信息或情绪？
          2. 建议分格数是多少？本页应该如何排版？请说明阅读顺序，并避免平均切分。
          3. 哪些剧情瞬间必须入格？哪些信息可以省略或合并？
          4. 每个分格分别承担什么叙事功能：建立环境、交代动作、强调反应、突出道具、制造悬念、承接转折，还是收束情绪？
          5. 这些分格之间如何衔接？是动作连续、视线引导、空间方向承接、情绪递进，还是反差切换？

          ### B. 每个分格逐项判断
          对每个分格分别回答以下问题：
          1. 画面目的：这一格为什么存在？它比前一格新增了什么可见信息？
          2. 入画对象：这一格中出现哪些本段在场角色、地点元素和关键道具？不得加入不在场角色。
          3. 角色调度：每个角色的位置、朝向、视线、动作和姿态是什么？如果有复数次要角色，必须编号并分别描述。
          4. 镜头选择：这一格使用什么景别、机位高度和镜头角度？为什么这种镜头最能服务当前情绪或动作？
          5. 空间关系：摄影机位于场景哪一侧？前景、中景、背景分别是什么？遮挡、透视、视线方向和人物站位是否互相兼容？
          6. 构图意图：视觉重心在哪里？是否使用留白、前景遮挡、斜线构图、俯视、仰视或大透视来增强叙事？不得无理由使用正中平视和左右对称。
          7. 动作瞬间：这一格表现的是动作开始、动作中段、动作结果，还是反应瞬间？画面中是否有可见的物理扰动？不得写不可见的对话状态。
          8. 光影与氛围：光源从哪里来？光线能否实际照到主体？明暗如何引导第一眼视觉落点？
          9. 环境细节：除了角色之外，画面中有哪些能说明地点、身份、时代或当前处境的具体陈设？{material_thinking}
          10. 逻辑自检：是否出现不可见的对话状态？是否误把地点名中的角色名当成人物？是否出现腿部、脚部、鞋履描述？是否存在机位、遮挡、光线、人物位置互相矛盾的问题？
          11. 强化审查：{enrich_thinking}

          ### C. 整页统一性检查
          1. 整页分镜是否从宏观到微观推进，既讲清剧情，又有画面节奏？
          2. 每格大小和布局是否有设计感，是否避免机械平均？
          3. 角色、地点、道具是否严格来自当前段落输入？
          4. description 是否能直接作为后续漫画画面提示词使用，且不包含画风、模型参数、质量词或生成技术指令？

          输出一个 JSON 对象，必须包含：
          - index：当前段落索引
          - segment_title：当前段落标题
          - thinking：按照“分镜决策自审清单”输出简洁的分镜决策记录，用于检查画面安排是否合理
          - description：最终的画面提示词，不得少于500字，先说明一共有几个分格和整体布局，然后根据 thinking 的内容生成详细且自然的分镜画面描述文本；描述整体，流畅确保画面完整、内容统一，每格最后描述氛围。
      prompt_fields:
        value: ["index", "paragraph_text", "panel_count", "present_characters", "location", "key_props"]
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "description"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: merge_segment_descriptions
    ref: tool.merge_segment_storyboard_descriptions.v1
    name: 合并分镜描述
    inputs:
      results:
        from: "$nodes.describe_panels.output.results"
    outputs:
      type: object
      required: ["segment_descriptions"]
      properties:
        segment_descriptions:
          type: array
          items:
            type: object
            required: ["index", "segment_title", "thinking", "description"]
            properties:
              index:
                type: integer
                minimum: 0
              segment_title:
                type: string
                minLength: 1
              thinking:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: prepare_storyboard_panel_cards
    ref: tool.prepare_storyboard_panel_cards.v1
    name: 准备分镜汇总卡片
    inputs:
      segment_descriptions:
        from: "$nodes.merge_segment_descriptions.output.segment_descriptions"
      segment_assignments:
        from: "$nodes.resolve_segment_image_refs.output.segment_assignments"
      storyboard_items:
        from: "$nodes.prepare_segment_storyboard_inputs.output.items"
      shared_context:
        from: "$nodes.prepare_segment_storyboard_inputs.output.shared_context"
      generation_rules:
        value: |
          风格指令：参考《罗小黑战记》的线条、色彩逻辑和视觉质感生成高质量、细节丰富、富有张力的漫画；线条采用干净流畅的矢量图风格，轮廓线利落，边缘锐利，阴影较浅且偏冷色调，色彩干净鲜明，无复杂渐变。
          角色一致性：严格参考输入图片中的人物比例、武器、关键服饰和识别特征，所有角色保持胶囊形、达摩式、蛋形或不倒翁体型；上半身为正常卡通比例，下半身为圆润饱满的半球形底部，完全没有腿部、膝盖、脚踝、脚部或鞋履。
          时代背景：中国古代，以水浒传为背景；根据当前情景设计环境、建筑、陈设和物件，使场景细节丰富，并与角色风格一致。
          透视与构图：严格遵守近大远小，使用强透视、明显纵深、前景遮挡、前中后景分层和统一消失点；多分格页面采用不规则梯形与矩形组合排版，打破平均分割和正中平视。
          画面风格关键词：strict perspective with foreshortening, near objects large far objects small, strong depth of field, layered foreground-midground-background composition, digital illustration, chibi style, children's book art style, manhwa style, clean lineart, soft cel shading, vibrant colors, dynamic action atmosphere, masterpiece, best quality.
      negative_prompt:
        value: low quality, bad anatomy, worst quality, text, watermark, signature, ugly, bad proportions, deformed, realistic, gradient shading, complex textures, red lines, guidelines, nose, legs, feet, ankles, knees, thighs, calves, toes, footwear, shoes, boots, sandals, photorealistic, flat composition, no depth
      aspect_ratio:
        value: "16:9"
      resolution:
        value: 2K
    outputs:
      type: object
      required: ["panel_cards"]
      properties:
        panel_cards:
          type: array
          items:
            type: object
            additionalProperties: true
        storyboard_items:
          type: array
          items:
            type: object
            additionalProperties: true
        shared_context:
          type: object
          additionalProperties: true
      additionalProperties: false

  - id: review_storyboard_image
    ref: system.human_approval.v1
    name: 分镜汇总
    inputs:
      question:
        template: |
          请在分镜汇总中检查每张分格卡片，必要时调整提示词、参考图并生成分镜图像。

          分镜卡片：
          {panel_cards}
        vars:
          panel_cards:
            from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      panel_cards:
        from: "$nodes.prepare_storyboard_panel_cards.output.panel_cards"
      storyboard_items:
        from: "$nodes.prepare_storyboard_panel_cards.output.storyboard_items"
      shared_context:
        from: "$nodes.prepare_storyboard_panel_cards.output.shared_context"
      decision:
        from_user: true
        schema:
          type: string
          enum: ["finish"]
      panel_results:
        from_user: true
        schema:
          type: array
          items:
            type: object
            additionalProperties: true
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision", "panel_results"]
      properties:
        decision:
          type: string
          enum: ["finish"]
        panel_results:
          type: array
          items:
            type: object
            additionalProperties: true
        revision_notes:
          type: string
      additionalProperties: false
    ui:
      sections:
        input:
          visible: false
        output:
          visible: false
        events:
          visible: false
      controls:
        interaction:
          control_id: ui.interaction.storyboard_panel_cards.v1
          variant: panel_review
          mode: interactive

edges:
  - from: START
    to: select_episode_metadata
  - from: select_episode_metadata
    to: split_script
  - from: split_script
    to: prepare_storyboard_asset_index
  - from: prepare_storyboard_asset_index
    to: assign_assets_to_segments
  - from: assign_assets_to_segments
    to: resolve_segment_image_refs
  - from: resolve_segment_image_refs
    to: prepare_segment_storyboard_inputs
  - from: prepare_segment_storyboard_inputs
    to: describe_panels
  - from: describe_panels
    to: merge_segment_descriptions
  - from: merge_segment_descriptions
    to: prepare_storyboard_panel_cards
  - from: prepare_storyboard_panel_cards
    to: review_storyboard_image
  - from: review_storyboard_image
    to: END
