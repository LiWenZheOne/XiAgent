  # ===== 分镜图像生成 =====

  - id: prepare_runninghub_images
    ref: tool.runninghub_workflow_images.v1
    inputs:
      line_art_url:
        from: "$nodes.upload_line_art.output.segment_images.0.image_url"
      image_urls:
        from: "$nodes.merge_asset_images_auto.output.asset_images"
    outputs:
      type: object
      required: ["image_urls"]
      properties:
        image_urls:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: generate_storyboard_image
    ref: ai.runninghub_image_to_image.v3
    inputs:
      prompt:
        from: "$nodes.gemini_vision_analysis.output.caption"
      image_urls:
        from: "$nodes.prepare_runninghub_images.output.image_urls"
      node_mapping:
        value:
          images: ["81", "141", "139", "140", "176", "182"]
          text:
            nodeId: "150"
            fieldName: "text"
          select:
            nodeIds: ["190", "191"]
            fieldName: "select"
      poll_interval_seconds:
        value: 2
      poll_timeout_seconds:
        value: 720
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
              output_type:
                type: string
                minLength: 1
            additionalProperties: false
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

  # ===== 分镜图像审核 =====

  - id: review_storyboard_image
    ref: system.human_approval.v1
    inputs:
      question:
        template: |
          请审核生成的分镜图像。

          生成的分镜图像URL：
          {image_url}

          使用的提示词：
          {prompt}

          Gemini 分镜描述（caption）：
          {caption}

          角色参考图像：
          {reference_images}

          请确认图像是否符合分镜要求，是否需要重新生成或调整。

          输出格式（严格 JSON）：
          {{"decision": "approve 或 reject", "selected_image_url": "选定的图像URL", "revision_notes": "修改说明"}}
        vars:
          image_url:
            from: "$nodes.generate_storyboard_image.output.image_url"
          prompt:
            from: "$nodes.gemini_vision_analysis.output.caption"
          caption:
            from: "$nodes.gemini_vision_analysis.output.caption"
          reference_images:
            from: "$nodes.merge_asset_images_auto.output.asset_images"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved:
        from_user: true
        required: false
        schema:
          type: boolean
      comment:
        from_user: true
        required: false
        schema:
          type: string
      selected_image_url:
        from_user: true
        required: false
        schema:
          type: string
      revision_notes:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
        selected_image_url:
          type: string
        revision_notes:
          type: string
      additionalProperties: false

