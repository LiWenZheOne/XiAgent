workflow:
  id: storyboard_from_sketch
  version: "1.0.0"
  scope: global
  name: Storyboard from Sketch
  description: 从剧本中提取角色资产，人工上传分镜线稿，通过 Gemini 视觉分析生成中文分镜描述，再使用 RunningHub 生成最终图像。
  output_schema:
    type: object
    required: ["decision"]
    properties:
      decision:
        type: string
        minLength: 1
      selected_image_url:
        type: string
        minLength: 1
      revision_notes:
        type: string
        minLength: 1
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      tool:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      system:
        controls:
          input:
            control_id: ui.input.schema_form.v1
            variant: default
            mode: input
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v2:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.asset_images"
              image_url_path: image_url
              label_path: full_name
      ai.runninghub_image_to_image.v3:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: collect_sketch_storyboard_input
    ref: system.user_input.v1
    inputs:
      script:
        from_user: true
        schema:
          type: string
          minLength: 1
      background:
        from_user: true
        schema:
          type: string
          minLength: 1
      generate_assets:
        from_user: true
        required: false
        schema:
          type: string
          enum: ["手动上传", "自动生成"]
      template_image_url:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["script", "background"]
      properties:
        script:
          type: string
          minLength: 1
        background:
          type: string
          minLength: 1
        generate_assets:
          type: string
          enum: ["手动上传", "自动生成"]
        template_image_url:
          type: string
      additionalProperties: false
    config:
      title: 填写分镜输入
      description: 收集剧本、世界背景和生成方式。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input

  # ===== P1: 角色资产提取与匹配 =====

  - id: extract_characters
    ref: ai.deepseek_structured_json.v1
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有角色信息。
          世界背景（原作）：{background}。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          2. 逐段区分叙述段与对话段，识别哪些角色满足收录条件。
          3. 对使用代称或非全名称呼的角色，根据原作推断其全名。
          4. 当多个角色被一起称呼时，根据原作和剧情发展拆解为具体角色。
          将你的完整分析过程写入 reasoning 字段。

          叙述 vs 对话：剧本包含叙述段（无前缀，描述已发生的事实）和对话段。
          只有叙述段才构成事实依据。对话中的计划、命令、提及、回忆均不构成角色出场的证据。
          角色收录条件：叙述段中有动作或状态描写，或作为对话段发言者且叙述段中在场。
          当使用代称或非全名称呼时，请根据原作推断角色的全名（如果不是你了解的作品，不需要推断全名。）
          当多个角色被一起称呼时，比如几位好汉，请根据原作和此时的剧情发展记录具体角色，每个角色单独记录。（没有名称的龙套角色不需要单独记录并且合称只作为一个单独角色。）
          资产提取阶段必须直接确定每个角色当前需要的角色变体。角色变体只由稳定服装、稳定外观造型和可穿戴/携带配件决定。
          被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、所在地点、天气、光照、剧情处境等临时状态不是变体依据，必须忽略，不得写入 variant_name、variant_description 或 accessories。
          根据当前情景推断角色可附加的视觉配件，例如口罩、面巾、披风、围巾、斗笠、斗篷、包袱、随身兵器挂件等；只有叙述段显示其正在佩戴、携带、遮挡、披挂或此情景下极可能稳定附着于角色时才记录。
          束缚用绳索、临时镣铐、被绑状态造成的限制物不算角色配件；如需要，可在道具提取中作为道具处理。
          summary 只描述角色的生平背景、身份定位或原作人物背景，不写当前剧情阶段的处境、动作、伤势、被绑、押送、服装或临时状态。
          character_status 只描述当前剧情阶段的身份、处境或状态，不写角色生平背景、长期身份履历或原作人物介绍。
          排除条件：仅在对话中被提及、谈论、派遣、回忆的角色不收录。
        vars:
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有角色信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - characters：角色数组
          - character_names：所有角色的全名数组（仅字符串）

          每个角色对象必须包含：
          - full_name：根据世界背景推断的全名（如"武松"而非"武二郎"），保存时固定使用全名作为资产名
          - aliases：别名列表
          - summary：角色生平背景/身份定位梗概（≤100字）；只写角色在原作或世界背景中的长期身份、经历和人物背景，不写当前剧情状态、动作、伤势、被绑、押送、服装或临时处境
          - character_status：当前剧情阶段该角色的上下文状态；只写此刻/本段剧情中的身份、处境、状态或正在经历的情况，不写生平背景、长期履历或原作人物介绍；该字段仅供理解上下文，不作为变体依据
          - variant_name：从剧本中提取出的角色变体标签，只描述稳定服装/造型/可穿戴或携带配件，如"囚服"、"夜行衣面巾"；如果没有稳定造型差异则填"默认"
          - variant_description：该变体的稳定视觉设定，只写服装、外貌、发型、体貌、身份识别特征和必要随身配件；不得写被绑、受伤、动作、姿态、表情、场景、天气或剧情处境
          - accessories：当前变体包含的稳定可穿戴/携带配件列表（如["面巾", "披风"]，无配件时为空数组；不要把身份、身体特征、普通服装整体、束缚状态或剧情道具写成配件）

          根层级除 reasoning、characters 和 character_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_sketch_storyboard_input.output.script"
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "characters", "character_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "aliases", "summary", "character_status", "variant_name", "variant_description", "accessories"]
            properties:
              full_name:
                type: string
                minLength: 1
              aliases:
                type: array
                items:
                  type: string
              summary:
                type: string
                minLength: 1
              character_status:
                type: string
                minLength: 1
              variant_name:
                type: string
                minLength: 1
              variant_description:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
            additionalProperties: false
        character_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_existing_assets
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_by_name
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_characters.output.character_names"
      asset_type:
        value: "text"
      tags:
        value: ["角色"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: semantic_match_characters
    ref: ai.deepseek_structured_json.v1
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色匹配器，只判断“提取到的角色资产”是否对应“资产库候选角色”中的同一人物。
          工程化匹配原则：
          1. 严格区分输入分区：提取到的角色资产是待匹配对象，资产库候选角色只是候选集合，不得把资产库字段补写成提取结果。
          2. 精确名称匹配已由程序完成；本节点只处理未精确匹配角色的语义匹配。
          3. 只依据全名、别名、绰号、身份、人物梗概和世界背景判断是否同一人；不要依据服装、变体、配件或临时剧情状态判断角色身份。
          4. 必须给出明确 true/false，不存在“无法确定”；证据不足时 matched=false。
      prompt:
        template: |
          请判断以下未匹配角色是否与资产库中已有角色是同一人。

          ## A. 提取到的角色资产（待匹配，来源：剧本）
          {unmatched_characters}

          ## B. 资产库候选角色（只用于匹配，不得改写 A）
          {existing_assets}

          ## C. 匹配准则
          - 一个提取角色最多匹配一个资产库角色。
          - 角色全名、别名、绰号、身份和人物梗概指向同一人物时 matched=true。
          - 只存在服装、变体、配件、场景、动作或临时状态相似时，不得判定为同一人。
          - 资产库没有足够证据时 matched=false，matched_asset_name 为空字符串，matched_asset_id 为空字符串。

          ## D. 输出 JSON
          返回一个仅包含一个根键的 JSON 对象：
          - match_results：数组，每个未匹配角色一条记录

          每条记录必须包含：
          - full_name：角色全名（与输入一致）
          - matched：true 或 false
          - matched_asset_name：匹配到的资产名（matched=true时必填）
          - matched_asset_id：匹配到的资产ID（matched=true时必填）
          - reason：≤50字判断理由

          根层级除 match_results 外不得包含其他键。
        vars:
          unmatched_characters:
            from: "$nodes.extract_characters.output.characters"
          existing_assets:
            from: "$nodes.lookup_existing_assets.output.assets"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["match_results"]
      properties:
        match_results:
          type: array
          items:
            type: object
            required: ["full_name", "matched", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_name:
                type: string
              matched_asset_id:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 角色数据 enrich =====

  - id: enrich_characters
    ref: tool.enrich_characters.v1
    inputs:
      characters:
        from: "$nodes.extract_characters.output.characters"
      matched_by_name:
        from: "$nodes.match_by_name.output.assets"
      semantic_matches:
        from: "$nodes.semantic_match_characters.output.match_results"
      existing_assets:
        from: "$nodes.lookup_existing_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 场景提取管道 =====

  - id: extract_scenes
    ref: ai.deepseek_structured_json.v1
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从剧本中提取所有场景信息。
          世界背景（原作）：{background}。

          思维链要求：在输出最终 JSON 前，你必须先逐步分析并记录你的思考过程：
          1. 判断当前剧本对应原作的哪一回、剧情发展到什么阶段。
          2. 逐段分析剧本，识别每个场景的起始和结束位置。
          3. 为每个场景命名、描述、判定时间特征和地点类型。
          将你的完整分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有场景信息。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - scenes：场景数组
          - scene_names：所有场景的名称数组（仅字符串）

          每个场景对象必须包含：
          - name：场景名称
          - description：场景描述（≤100字）
          - time_of_day：时间特征（如"白天"、"夜晚"、"黄昏"等）
          - location_type：地点类型（如"室内"、"户外"、"宫殿"、"山林"等）

          根层级除 reasoning、scenes 和 scene_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_sketch_storyboard_input.output.script"
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "scenes", "scene_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        scenes:
          type: array
          items:
            type: object
            required: ["name", "description", "time_of_day", "location_type"]
            properties:
              name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              time_of_day:
                type: string
                minLength: 1
              location_type:
                type: string
                minLength: 1
            additionalProperties: false
        scene_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_scene_assets
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["场景"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_scenes_by_name
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_scenes.output.scene_names"
      asset_type:
        value: "text"
      tags:
        value: ["场景"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_scenes
    ref: tool.enrich_characters.v1
    inputs:
      characters:
        from: "$nodes.extract_scenes.output.scenes"
      matched_by_name:
        from: "$nodes.match_scenes_by_name.output.assets"
      existing_assets:
        from: "$nodes.lookup_scene_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["name", "matched"]
            properties:
              name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
            additionalProperties: true
      additionalProperties: false

  # ===== P2: 变体匹配 =====

  - id: match_variants
    ref: ai.parallel_deepseek_structured_json.v1
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色变体匹配器，只负责把“提取到的角色变体资产”匹配到“资产库候选变体”。
          工程化匹配原则：
          1. 严格区分输入分区：variant_name、variant_description、accessories 是提取到的待匹配变体；existing_variants 是资产库候选变体。
          2. 变体是否存在已经由上游 extract_characters 决定；本节点不得根据剧情处境、动作或临时状态新增变体依据。
          3. 只比较稳定服装、稳定外观造型、可穿戴/携带配件和 existing_variants 的 variant、name、metadata.tags。
          4. 被绑起来、被押送、受伤、疲惫、奔跑、打斗、表情、姿态、镜头动作、地点、天气、光照等临时状态必须忽略。
          5. 如果已提取变体无法匹配 existing_variants，才标记 is_new_variant=true，并把 new_variant_name 填为 角色名_已提取变体标签。
      prompt_template:
        value: |
          请为以下已提取角色变体匹配已有资产。

          ## A. 提取到的角色变体资产（待匹配）
          字段来源：full_name、variant_name、variant_description、accessories、character_status。

          ## B. 资产库候选变体
          字段来源：同一 JSON 对象的 existing_variants；每个候选包含 asset_id、name、variant 和 metadata.tags。

          ## C. 输入 JSON
          {item}

          ## D. 匹配准则
          - 请将 A 中的 variant_name、variant_description、accessories 与 B 中的 existing_variants 做语义匹配。
          - character_status 只可作为上下文参考，不能作为新增变体依据。
          - 不得把 existing_variants 中的候选字段写回为提取结果。
          - 如只因被绑、受伤、姿态、表情、动作、天气、场景不同，不得创建新变体。

          ## E. 输出 JSON
          返回一个 JSON 对象：
          - full_name：角色全名
          - accessories：上游已提取的角色当前配件列表，不得自行新增
          - matched_variant：匹配到的变体标签（无匹配时为空字符串）
          - matched_variant_id：匹配到的变体资产ID（无匹配时为null）
          - is_new_variant：上游已提取变体是否未匹配到已有变体资产
          - new_variant_name：is_new_variant=true时必填，格式：角色名_上游variant_name；不得使用被绑、受伤、动作、场景等临时状态命名
          - default_variant_status：角色默认变体的状态描述
          - default_variant_storage_uri：角色默认变体的参考图URL（无参考图时为空字符串）
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "accessories", "matched_variant", "is_new_variant", "default_variant_status", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              accessories:
                type: array
                items:
                  type: string
              matched_variant:
                type: string
              matched_variant_id:
                type: ["string", "null"]
              is_new_variant:
                type: boolean
              new_variant_name:
                type: string
              default_variant_status:
                type: string
                minLength: 1
              default_variant_storage_uri:
                type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  - id: check_accessories
    ref: ai.parallel_deepseek_structured_json.v1
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是资产库角色配件匹配器，只检查“提取到的角色配件”是否已存在于“资产库候选变体/配件”中。
          工程化匹配原则：
          1. 严格区分输入分区：accessories 是上游提取到的待检查配件；existing_variants 是资产库候选变体/配件来源。
          2. 配件是独立变体维度：基础服装是一个变体，基础服装+配件是另一个变体；一个变体只对应一个图像。
          3. 只检查上游已提取配件，不得自行新增配件。
          4. 不得把被绑、受伤、动作、姿态、剧情处境、地点、天气或临时限制物补充为新配件。
      prompt_template:
        value: |
          请检查以下角色的配件状态。

          ## A. 提取到的角色配件（待检查）
          字段来源：accessories。

          ## B. 资产库候选变体/配件
          字段来源：existing_variants 及其 name、variant、metadata.tags。

          ## C. 输入 JSON
          {item}

          ## D. 输出 JSON
          返回一个 JSON 对象：
          - full_name：角色全名
          - has_new_accessories：上游已提取配件中是否有未匹配配件
          - new_accessories：上游已提取但未匹配的配件名称数组，不得自行新增
          - existing_accessories：已有配件名称数组
          - reason：≤50字判断理由
      items:
        from: "$nodes.enrich_characters.output.characters"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["results"]
      properties:
        results:
          type: array
          items:
            type: object
            required: ["full_name", "has_new_accessories", "new_accessories", "existing_accessories", "reason"]
            properties:
              full_name:
                type: string
                minLength: 1
              has_new_accessories:
                type: boolean
              new_accessories:
                type: array
                items:
                  type: string
              existing_accessories:
                type: array
                items:
                  type: string
              reason:
                type: string
                minLength: 1
            additionalProperties: false
      additionalProperties: false

  # ===== 道具提取与匹配 =====

  - id: extract_props
    ref: ai.deepseek_structured_json.v1
    inputs:
      system:
        template: |
          仅返回合法 JSON。你是专业的剧本分析师。请从以下剧本中提取所有关键道具（props）。
          世界背景（原作）：{background}。

          请分析剧本中出现的所有关键道具，包括武器、工具、物品等。
          道具收录条件：在叙述段中被角色使用、持有、提及或具有叙事意义的物品。
          排除条件：仅为背景装饰的无名物品、对话中提及但未实际出现或使用的物品。
          衣服、服装、鞋帽、披风、围巾、面巾、斗笠、斗篷等穿戴类外观元素不作为道具提取；它们属于角色变体或角色配件，只能由角色提取节点写入 variant_name、variant_description 或 accessories。
          只有可从角色身上独立拿取、使用、赠予、争夺或作为剧情实体流转的物件才可作为道具；普通穿着状态不能作为道具。
          如果道具与某个角色有明确持有、使用、携带、赠予或争夺关系，请记录关联角色；没有明确关联时留空或省略。
          将你的分析过程写入 reasoning 字段。
        vars:
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      prompt:
        template: |
          请从以下剧本中提取所有关键道具。

          剧本内容：
          {script}

          返回一个仅包含以下根键的 JSON 对象：
          - reasoning：你的逐步分析过程（字符串，不能为空）
          - props：道具数组
          - prop_names：所有道具名称数组（仅字符串）

          每个道具对象必须包含：
          - full_name：道具名称（如"青龙偃月刀"）
          - description：道具描述（≤100字）
          - category：道具类别（如"武器"、"工具"、"容器"、"书籍/信件"等；不要使用"服装"作为道具类别，普通穿戴类外观元素不进入 props）
          - related_character：关联角色（可选；仅当剧本明确说明某角色持有、使用、携带、赠予或争夺该道具时填写角色名，否则可省略或为空字符串）

          根层级除 reasoning、props 和 prop_names 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_sketch_storyboard_input.output.script"
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["reasoning", "props", "prop_names"]
      properties:
        reasoning:
          type: string
          minLength: 1
        props:
          type: array
          items:
            type: object
            required: ["full_name", "description", "category"]
            properties:
              full_name:
                type: string
                minLength: 1
              description:
                type: string
                minLength: 1
              category:
                type: string
                minLength: 1
              related_character:
                type: string
            additionalProperties: false
        prop_names:
          type: array
          items:
            type: string
            minLength: 1
      additionalProperties: false

  - id: lookup_prop_assets
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: match_props_by_name
    ref: tool.asset_lookup.v1
    inputs:
      scope:
        value: "combined"
      names:
        from: "$nodes.extract_props.output.prop_names"
      asset_type:
        value: "text"
      tags:
        value: ["道具"]
      limit:
        value: 200
    outputs:
      type: object
      required: ["total", "assets"]
      properties:
        total:
          type: integer
          minimum: 0
        assets:
          type: array
          items:
            type: object
            required: ["asset_id", "name"]
            properties:
              asset_id:
                type: string
                minLength: 1
              name:
                type: string
                minLength: 1
              asset_type:
                type: string
              mime_type:
                type: string
              storage_uri:
                type: string
              metadata:
                type: object
              text_content:
                type: string
            additionalProperties: true
      additionalProperties: false

  - id: enrich_props
    ref: tool.enrich_characters.v1
    inputs:
      characters:
        from: "$nodes.extract_props.output.props"
      matched_by_name:
        from: "$nodes.match_props_by_name.output.assets"
      semantic_matches:
        value: []
      existing_assets:
        from: "$nodes.lookup_prop_assets.output.assets"
    outputs:
      type: object
      required: ["characters"]
      properties:
        characters:
          type: array
          items:
            type: object
            required: ["full_name", "matched"]
            properties:
              full_name:
                type: string
                minLength: 1
              matched:
                type: boolean
              matched_asset_id:
                type: ["string", "null"]
              matched_asset_name:
                type: string
              existing_variants:
                type: array
                items:
                  type: object
                  required: ["asset_id", "name", "variant"]
                  properties:
                    asset_id:
                      type: string
                      minLength: 1
                    name:
                      type: string
                      minLength: 1
                    variant:
                      type: string
                      minLength: 1
                    metadata:
                      type: object
            additionalProperties: true
      additionalProperties: false

  # ===== 资产审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          ## 角色资产
          ### A. 提取到的角色资产
          {characters}

          ### B. 资产库角色名称匹配结果
          {match_by_name}

          ### C. 资产库角色语义匹配结果
          {semantic_match}

          ## 角色变体与配件
          ### A. 资产库角色变体匹配结果
          {variant_result}

          ### B. 资产库角色配件匹配结果
          {accessory_result}

          请确认资产匹配是否正确，或提供修改意见。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          match_by_name:
            from: "$nodes.match_by_name.output.assets"
          semantic_match:
            from: "$nodes.semantic_match_characters.output.match_results"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
      decision:
        from_user: true
        schema:
          type: string
          minLength: 1
      approved:
        from_user: true
        required: false
        schema:
          type: boolean
      comment:
        from_user: true
        required: false
        schema:
          type: string
    outputs:
      type: object
      required: ["decision"]
      properties:
        decision:
          type: string
          minLength: 1
      additionalProperties: false

  # ===== 手动上传图像 =====

  - id: upload_images
    ref: system.human_approval.v1
    inputs:
      question:
        template: |
          请为以下角色变体上传/关联图像。

          角色信息：
          {characters}

          变体匹配结果：
          {variant_result}

          配件检查结果：
          {accessory_result}

          图像上传规格：
          - 格式：PNG 或 JPG
          - 建议分辨率：2K（2048×2048 或更高）
          - 宽高比：建议 1:1（正方形）
          - 文件大小：单个文件不超过 10MB

          变体图像命名规范：{{角色名}}_{{变体名}}.

          请为每个角色提供图像 URL。输出格式（严格 JSON）：
           {{"asset_images": [{{"full_name": "...", "image_url": "...", "source": "manual_upload", "variant": "...", "asset_id": "..."}}]}}

          每个对象必须包含 full_name、image_url、source。source 固定为 "manual_upload"。variant 和 asset_id 可选。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
      asset_images:
        from_user: true
        schema:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                enum: ["ai_generated", "manual_upload"]
              runninghub_task_id:
                type: string
            additionalProperties: false
    outputs:
      type: object
      required: ["asset_images"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                enum: ["ai_generated", "manual_upload"]
              runninghub_task_id:
                type: string
            additionalProperties: false
      additionalProperties: false

  # ===== 自动生成路径：提示词生成 =====

  - id: generate_prompt_v2
    ref: ai.deepseek_structured_json.v1
    inputs:
      system:
        value: |
          仅返回合法 JSON。你是一位图像提示词专家。请根据角色当前状态和默认变体状态生成修改提示词。
          对比两者差异，思考哪些特征需要改变、哪些需要保留，不预设哪些特征是固定的。
          提示词格式：请将图中角色的xx改成xx，保持风格和其它特征不变。
          必须先输出 think（思考过程），再输出 prompt（最终提示词）。
          对所有角色进行批量处理，不能遗漏任何角色。
      prompt:
        template: |
          请为以下所有角色生成图生图修改提示词。

          剧本内容：
          {script}

          角色列表：
          {characters}

          变体匹配结果（含默认变体状态）：
          {variant_results}

          配件检查结果：
          {accessory_results}

          返回一个仅包含一个根键的 JSON 对象：
          - prompt_results：数组，每个角色一条记录

          每条记录必须包含：
          - full_name：角色全名
          - think：思考过程，逐项对比差异，列出要添加/去除/修改的部分
          - prompt：最终提示词，格式为"请将图中角色的xx改成xx，保持风格和其它特征不变"
          - reference_image_ref：参考图结构化引用，优先使用已有变体或匹配资产的 asset_id；不得输出参考图 URL 字段。

          根层级除 prompt_results 外不得包含其他键。
        vars:
          script:
            from: "$nodes.collect_sketch_storyboard_input.output.script"
          characters:
            from: "$nodes.extract_characters.output.characters"
          variant_results:
            from: "$nodes.match_variants.output.results"
          accessory_results:
            from: "$nodes.check_accessories.output.results"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["prompt_results"]
      properties:
        prompt_results:
          type: array
          items:
            type: object
            required: ["full_name", "think", "prompt", "reference_image_ref"]
            properties:
              full_name:
                type: string
                minLength: 1
              think:
                type: string
                minLength: 1
              prompt:
                type: string
                minLength: 1
              reference_image_ref:
                type: object
                required: ["kind"]
                properties:
                  kind:
                    type: string
                    enum: ["asset", "data_uri"]
                  asset_id:
                    type: string
                    minLength: 1
                  data:
                    type: string
                    minLength: 1
                  role:
                    type: string
                    minLength: 1
                additionalProperties: false
            additionalProperties: false
      additionalProperties: false

  # ===== 自动生成路径：批量图像生成 =====

  - id: generate_asset_images_v2
    ref: ai.runninghub_image_to_image.v2
    inputs:
      prompt_results:
        from: "$nodes.generate_prompt_v2.output.prompt_results"
    outputs:
      type: object
      required: ["asset_images"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                enum: ["ai_generated", "manual_upload"]
              runninghub_task_id:
                type: string
            additionalProperties: false
      additionalProperties: false

