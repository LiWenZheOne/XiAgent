  # ===== 资产审核 =====

  - id: review_assets
    ref: system.human_approval.v1
    inputs:
      question:
        template: |
          请审核以下资产提取和匹配结果。

          提取的角色：
          {characters}

          精确匹配结果（P1 全名匹配）：
          {match_by_name}

          语义匹配结果（LLM 语义匹配）：
          {semantic_match}

          变体匹配结果（已有变体 vs 当前状态）：
          {variant_result}

          配件检查结果（新增配件识别）：
          {accessory_result}

          请确认资产匹配是否正确，或提供修改意见。
        vars:
          characters:
            from: "$nodes.extract_characters.output.characters"
          match_by_name:
            from: "$nodes.match_by_name.output.assets"
          semantic_match:
            from: "$nodes.semantic_match_characters.output.match_results"
          variant_result:
            from: "$nodes.match_variants.output.results"
          accessory_result:
            from: "$nodes.check_accessories.output.results"
