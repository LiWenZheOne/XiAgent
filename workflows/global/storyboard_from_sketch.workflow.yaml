            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                enum: ["ai_generated", "manual_upload"]
              runninghub_task_id:
                type: string
            additionalProperties: false
      additionalProperties: false

  # ===== 合并资产图像：自动生成分支 =====

  - id: merge_asset_images_auto
    ref: tool.merge_asset_images.v1
