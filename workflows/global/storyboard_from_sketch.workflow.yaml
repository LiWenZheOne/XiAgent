    outputs:
      type: object
      required: ["segment_images"]
      properties:
        segment_images:
          type: array
      additionalProperties: false

  # ===== Gemini 视觉分析 =====

  - id: gemini_vision_analysis
    ref: ai.gemini_vision.v1
    inputs:
      system:
        value: |
          你是一个图像标注助手。你的任务是根据图像生成一段完整的中文描述。

          规则：
          - 禁止描述画风
          - 最终输出必须是一整段不分段的流畅中文自然语言描述
          - 只描述画面的实际内容，不要猜想和预测
          - 按以下思维链逐步分析后输出
          - 全程使用「」代号指代角色（如「角色A」「角色B」）

          ### 思维链
          第零步·漫画分格与布局：
          - 这是一幅描绘什么内容的漫画？
          - 漫画一共有多少个分格？布局是怎样的？
          - 分格之间的关系是什么？

          对于每个分格，进行以下分析：
          第一步·色调与光照：
          - 画面整体是偏暖色调还是冷色调？还是冷暖混合？
          - 画面是明亮的还是昏暗的？对比是否强烈？
          - 能看出光源是什么吗？光从哪个方向照来？

          第二步·时间：
          - 画面中有天空吗？天空是什么颜色？
          - 如果看不到天空，环境光的色温和亮度更像哪个时段？
          - 如果是完全封闭的室内且无法判断，那就根据现有线索给出最合理的推断。

          第三步·场景环境：
          - 这是室内还是室外场景？
          - 墙壁/地面是什么材质和颜色？有哪些物品和道具？
          - 有没有天气或氛围效果？（雾气、飘雪、雨滴、尘土）

          第四步·角色描述：
          - 画面中一共有多少个角色？用「角色A」「角色B」标注代号
          - 对每个角色分析：位置和角度、性别体型、面部特征、服装颜色、配饰、表情、动作、手持物品、与环境互动效果

          第五步·特效：
          - 有没有漫画特有的视觉符号？（速度线、冲击波纹、汗滴符号、愤怒青筋）
          - 有没有光效、火花、烟雾等特殊效果？

          ### 输出格式
          <think>
          （按上述步骤逐一写出详细的分析过程）
          </think>

          <caption>
          将分析结果整合为一整段不分段的流畅中文描述。
          先描述分格情况，使用一句话概括场景及其事件。
          对于每一个分格，说明有几个角色，分别是什么，并联系角色和其代号。
          除了概括阶段外，全程使用「」代号指代角色。
          最后详细描述背景和特效。
          </caption>
      prompt:
        template: |
          世界背景：{background}

          当前段落内容：
          {segment_text}

          请根据上传的分镜线稿图片，按思维链逐步分析并输出描述。
        vars:
          background:
            from: "$nodes.collect_sketch_storyboard_input.output.background"
          segment_text:
            from: "$nodes.split_script.output.segments"
      image_urls:
        from: "$nodes.upload_line_art.output.segment_images"
      max_attempts:
        value: 2
    outputs:
      type: object
      required: ["think", "caption"]
      properties:
        think:
          type: string
        caption:
          type: string
        model:
          type: string
        usage:
          type: object
      additionalProperties: false

  # ===== 提示词组装 v3（已禁用 —— 跳过 assemble_prompt_v3，直接用 Gemini caption 作为最终提示词）=====

  # - id: assemble_prompt_v3
