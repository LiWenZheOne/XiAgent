    outputs:
      type: object
      required: ["asset_images"]
      properties:
        asset_images:
          type: array
          items:
            type: object
            required: ["full_name", "image_url", "source"]
            properties:
              full_name:
                type: string
                minLength: 1
              image_url:
                type: string
                minLength: 1
              variant:
                type: string
              asset_id:
                type: string
              source:
                type: string
                enum: ["ai_generated", "manual_upload"]
              runninghub_task_id:
                type: string
            additionalProperties: false
      additionalProperties: false

  # ===== 剧本拆分 =====

  - id: split_script
    ref: tool.script_split.v1
    inputs:
      script:
        from: "$nodes.collect_sketch_storyboard_input.output.script"
    outputs:
      type: object
      required: ["count", "segments"]
      properties:
        count:
          type: integer
          minimum: 0
        segments:
          type: array
          items:
            type: object
