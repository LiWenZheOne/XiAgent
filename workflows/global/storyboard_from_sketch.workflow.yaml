  # ===== 上传分镜线稿 =====

  - id: upload_line_art
    ref: system.human_approval.v1
    inputs:
      question:
        template: |
          请为以下每个段落上传对应的分镜线稿URL。

          段落列表：
          {segments}

          请为每个段落提供线稿图片URL。输出格式（严格 JSON）：
          {{"segment_images": [{{"segment_index": 0, "image_url": "https://..."}}]}}

          每个段落必须有一条记录。线稿图片建议格式：PNG 或 JPG，黑白线稿。
        vars:
          segments:
            from: "$nodes.split_script.output.segments"
      segment_images:
        from_user: true
        schema:
          type: array
