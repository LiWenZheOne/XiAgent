workflow:
  id: deepseek_echo
  version: "1.1.0"
  scope: global
  name: DeepSeek 偏好画像工作流
  description: 分三段询问用户喜欢的颜色、食物和运动，并使用 DeepSeek 生成性格侧写。
  input_schema:
    type: object
    additionalProperties: false
    properties: {}

nodes:
  - id: ask_color
    ref: system.human_approval.v1
    inputs:
      question:
        value: 请告诉我你喜欢的颜色。
    outputs:
      type: object
      required: ["answer"]
      properties:
        answer:
          type: string
          minLength: 1
      additionalProperties: false

  - id: ask_food
    ref: system.human_approval.v1
    inputs:
      question:
        value: 请告诉我你喜欢的食物。
      favorite_color:
        from: "$nodes.ask_color.output.answer"
    outputs:
      type: object
      required: ["answer"]
      properties:
        answer:
          type: string
          minLength: 1
      additionalProperties: false

  - id: ask_sport
    ref: system.human_approval.v1
    inputs:
      question:
        value: 请告诉我你喜欢的运动。
      favorite_color:
        from: "$nodes.ask_color.output.answer"
      favorite_food:
        from: "$nodes.ask_food.output.answer"
    outputs:
      type: object
      required: ["answer"]
      properties:
        answer:
          type: string
          minLength: 1
      additionalProperties: false

  - id: profile
    ref: ai.deepseek_chat.v1
    inputs:
      system:
        value: 你是一名温和、克制、尊重边界的用户画像分析助手。分析必须基于用户提供的偏好，避免绝对化判断。
      prompt:
        template: |
          请根据用户的三个偏好生成一段中文性格侧写，并最终返回给用户。

          用户喜欢的颜色：{color}
          用户喜欢的食物：{food}
          用户喜欢的运动：{sport}

          输出要求：
          1. 先用一句话总结整体气质。
          2. 再用三点说明可能的性格倾向，每点都要关联一个偏好。
          3. 最后补充一句提醒：这只是基于偏好的轻量画像，不是确定性判断。
        vars:
          color:
            from: "$nodes.ask_color.output.answer"
          food:
            from: "$nodes.ask_food.output.answer"
          sport:
            from: "$nodes.ask_sport.output.answer"
    outputs:
      type: object
      required: ["text", "model", "usage"]
      properties:
        text:
          type: string
        model:
          type: string
        usage:
          type: object
      additionalProperties: false

edges:
  - from: START
    to: ask_color
  - from: ask_color
    to: ask_food
  - from: ask_food
    to: ask_sport
  - from: ask_sport
    to: profile
  - from: profile
    to: END
