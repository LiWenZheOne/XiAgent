workflow:
  id: runninghub_text_to_image_test
  version: "1.0.0"
  scope: global
  name: RunningHub 文生图调用测试
  description: 使用 RunningHub 文生图模型生成图片，并把结果 URL 暴露给测试运行器。
  input_schema:
    type: object
    required: ["prompt", "aspect_ratio", "resolution"]
    properties:
      prompt:
        type: string
        minLength: 1
      aspect_ratio:
        type: string
        minLength: 1
      resolution:
        type: string
        minLength: 1
    additionalProperties: false

nodes:
  - id: generate_image
    ref: ai.runninghub_text_to_image.v1
    inputs:
      prompt:
        from: "$workflow.input.prompt"
      aspect_ratio:
        from: "$workflow.input.aspect_ratio"
      resolution:
        from: "$workflow.input.resolution"
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

edges:
  - from: START
    to: generate_image
  - from: generate_image
    to: END
