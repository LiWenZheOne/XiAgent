workflow:
  id: runninghub_image_to_image_test
  version: "1.0.0"
  scope: global
  name: RunningHub 图生图调用测试
  description: 使用 RunningHub 图生图模型转换输入图片，并把结果 URL 暴露给测试运行器。
  input_schema:
    type: object
    required: ["prompt", "image_urls", "aspect_ratio", "resolution"]
    properties:
      prompt:
        type: string
        minLength: 1
      image_urls:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
      aspect_ratio:
        type: string
        minLength: 1
      resolution:
        type: string
        minLength: 1
    additionalProperties: false
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_candidates.v1
            variant: grid
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url

nodes:
  - id: transform_image
    ref: ai.runninghub_image_to_image.v1
    inputs:
      prompt:
        from: "$workflow.input.prompt"
      image_urls:
        from: "$workflow.input.image_urls"
      aspect_ratio:
        from: "$workflow.input.aspect_ratio"
      resolution:
        from: "$workflow.input.resolution"
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
              output_type:
                type: string
                minLength: 1
            additionalProperties: false
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

edges:
  - from: START
    to: transform_image
  - from: transform_image
    to: END
