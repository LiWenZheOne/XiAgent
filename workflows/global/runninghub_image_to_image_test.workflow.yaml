workflow:
  id: runninghub_image_to_image_test
  version: "1.0.0"
  scope: global
  name: RunningHub 图生图调用测试
  description: 使用 RunningHub 图生图模型转换输入图片，并把结果 URL 暴露给测试运行器。
  ui:
    layout:
      node_io: vertical_stack
      default_collapsed_sections: ["input", "events"]
      default_expanded_sections: ["output"]
    defaults:
      ai:
        controls:
          input:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
          output:
            control_id: ui.display.value.v1
            variant: default
            mode: readonly
      ai.runninghub_image_to_image.v1:
        controls:
          output:
            control_id: ui.display.image_viewer.v1
            variant: grid_modal
            mode: readonly
            bindings:
              items_path: "$node.output.results"
              image_url_path: url
              label_path: text

nodes:
  - id: collect_runninghub_image_input
    ref: system.user_input.v1
    inputs:
      prompt:
        from_user: true
        schema:
          type: string
          minLength: 1
      image_urls:
        from_user: true
        schema:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
      aspect_ratio:
        from_user: true
        schema:
          type: string
          title: 画面比例
          description: RunningHub 图片画面比例，必须从固定比例中选择。
          enum: ["1:1", "16:9", "9:16", "4:3", "3:4", "3:2", "2:3", "5:4", "4:5", "21:9"]
          minLength: 1
      resolution:
        from_user: true
        schema:
          type: string
          title: 清晰度
          description: RunningHub 图片输出清晰度，必须从固定档位中选择。
          enum: ["1k", "2k", "4k"]
          minLength: 1
    outputs:
      type: object
      required: ["prompt", "image_urls", "aspect_ratio", "resolution"]
      properties:
        prompt:
          type: string
          minLength: 1
        image_urls:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        aspect_ratio:
          type: string
          title: 画面比例
          description: RunningHub 图片画面比例，必须从固定比例中选择。
          enum: ["1:1", "16:9", "9:16", "4:3", "3:4", "3:2", "2:3", "5:4", "4:5", "21:9"]
          minLength: 1
        resolution:
          type: string
          title: 清晰度
          description: RunningHub 图片输出清晰度，必须从固定档位中选择。
          enum: ["1k", "2k", "4k"]
          minLength: 1
      additionalProperties: false
    config:
      title: 填写运行输入
      description: 从资产库选择参考图并填写 RunningHub 图生图调用参数。
    ui:
      controls:
        input:
          control_id: ui.input.schema_form.v1
          variant: default
          mode: input
          options:
            fields:
              image_urls:
                control_id: ui.input.asset_image_picker.v1
                variant: thumbnails
                mode: input
                selection_mode: multiple
                upload_scope: project
                collapsed_rows: 1

  - id: transform_image
    ref: ai.runninghub_image_to_image.v1
    inputs:
      prompt:
        from: "$nodes.collect_runninghub_image_input.output.prompt"
      image_urls:
        from: "$nodes.collect_runninghub_image_input.output.image_urls"
      aspect_ratio:
        from: "$nodes.collect_runninghub_image_input.output.aspect_ratio"
      resolution:
        from: "$nodes.collect_runninghub_image_input.output.resolution"
    outputs:
      type: object
      required: ["image_url", "model", "usage", "results"]
      properties:
        image_url:
          type: string
        model:
          type: string
        usage:
          type: object
        results:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                minLength: 1
              text:
                type: string
                minLength: 1
              output_type:
                type: string
                minLength: 1
            additionalProperties: false
        task_id:
          type: string
        status:
          type: string
      additionalProperties: false

edges:
  - from: START
    to: collect_runninghub_image_input
  - from: collect_runninghub_image_input
    to: transform_image
  - from: transform_image
    to: END
